name: Validate Question Bank

on:
  push:
    branches: [main]
    paths:
      - "bank/**"
      - "tools/validate-bank.ts"
  pull_request:
    branches: [main]
    paths:
      - "bank/**"
      - "tools/validate-bank.ts"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm validate:bank
