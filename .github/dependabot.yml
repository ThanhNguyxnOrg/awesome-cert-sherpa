version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "root-workspace"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      dev-tooling:
        patterns:
          - "ajv"
          - "ajv-formats"
          - "fast-glob"
          - "tsx"
          - "yaml"

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "website"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@mdx-js/*"
      ui:
        patterns:
          - "lucide-react"
          - "motion"
          - "clsx"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
