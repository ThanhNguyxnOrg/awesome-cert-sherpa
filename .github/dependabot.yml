version: 2
updates:
  # ── npm packages (monorepo root manages all workspaces) ──────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # ── Production deps — group to reduce PR count ───────────────
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      ui:
        patterns:
          - "lucide-react"
          - "motion"
          - "clsx"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      # ── Dev deps — safe to auto-merge even if major ──────────────
      dev-tooling:
        patterns:
          - "ajv"
          - "ajv-formats"
          - "fast-glob"
          - "tsx"
          - "yaml"
          - "typescript"
          - "vite"
          - "@vitejs/*"
          - "@types/node"

  # ── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
