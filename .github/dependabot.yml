version: 2
updates:
  # ── npm packages (monorepo root manages all workspaces) ──────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@mdx-js/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      ui:
        patterns:
          - "lucide-react"
          - "motion"
          - "clsx"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      dev-tooling:
        patterns:
          - "ajv"
          - "ajv-formats"
          - "fast-glob"
          - "tsx"
          - "yaml"

  # ── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
