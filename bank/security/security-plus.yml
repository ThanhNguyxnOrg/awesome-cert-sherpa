      - "C. Increases network bandwidth by reducing broadcast domains"
      - "D. Replaces endpoint detection and response (EDR) tools"
    answerIndex: 0
    explanation: >-
      Microsegmentation creates granular security boundaries around individual workloads, preventing compromised systems from reaching other resources. It complements firewalls rather than replacing them (B). Bandwidth (C) is a secondary benefit. EDR (D) serves a different detection purpose.
