  - id: "sec701-expand-023"
    difficulty: "easy"
    tags: ["architecture", "concepts", "defense-in-depth"]
    question: "The principle of defense in depth means implementing which approach?"
    choices:
      - "A. Multiple overlapping security layers so that failure of one control does not compromise the entire system"
      - "B. A single, extremely strong firewall at the network perimeter"
      - "C. Relying on one security vendor for all products"
      - "D. Applying the same security control repeatedly at the same layer"
    answerIndex: 0
    explanation: >-
      Defense in depth uses multiple, diverse security layers (network, host, application, data) so that if one layer fails, others still provide protection. A single firewall (B) is a single point of failure. Vendor monoculture (C) creates systemic risk. Repeating the same control (D) does not add diversity.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
