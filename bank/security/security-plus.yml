  - id: "sec701-expand-032"
    difficulty: "medium"
    tags: ["implementation", "wireless", "wpa3"]
    question: "What improvement does WPA3-Personal provide over WPA2-Personal?"
    choices:
      - "A. Simultaneous Authentication of Equals (SAE) replacing the 4-way handshake, providing protection against offline dictionary attacks"
      - "B. Faster wireless speeds through hardware acceleration"
      - "C. Support for more connected devices"
      - "D. Backward compatibility with WEP devices"
    answerIndex: 0
    explanation: >-
      WPA3-Personal uses SAE (Dragonfly handshake) which protects against offline dictionary attacks that WPA2's PSK-based 4-way handshake is vulnerable to. SAE also provides forward secrecy. Speed (B) and device capacity (C) are not security features. WPA3 does not support WEP (D).
