      - "C. To store backup data offsite"
      - "D. To connect remote employees via VPN"
    answerIndex: 0
    explanation: >-
      A DMZ is a network segment that sits between the external internet and the internal network, hosting public-facing services (web servers, mail servers) while protecting internal resources. It is not for internal connectivity (B), backup storage (C), or VPN termination (D).
