      - "A. Differential backup"
      - "B. Full backup"
      - "C. Incremental backup"
      - "D. Snapshot"
    answerIndex: 0
    explanation: >-
      Differential backups copy all changes since the last full backup, growing larger each day. Incremental (C) copies only changes since the last backup of any type. Full backups (B) copy everything. Snapshots (D) capture the entire state at a point in time.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-045"
    difficulty: "hard"
    tags: ["implementation", "automation", "soar"]
    question: "A SOC team implements a SOAR platform. What is the PRIMARY benefit?"
    choices:
      - "A. Automating repetitive incident response workflows and orchestrating tools to reduce response times"
      - "B. Replacing all human analysts with artificial intelligence"
      - "C. Providing antivirus scanning for all endpoints"
      - "D. Encrypting all network traffic automatically"
    answerIndex: 0
    explanation: >-
      SOAR (Security Orchestration, Automation, and Response) automates repetitive tasks (alert triage, enrichment, containment) and orchestrates multiple security tools through playbooks. It augments analysts rather than replacing them (B). It does not provide AV (C) or encrypt traffic (D).
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  # Domain 4: Operations and Incident Response (~15 questions)
  - id: "sec701-expand-046"
    difficulty: "easy"
    tags: ["operations", "incident-response", "phases"]
    question: "After containing a security incident, what is the NEXT step in the incident response process?"
    choices:
      - "A. Eradication — remove the threat and its artifacts from the environment"
      - "B. Preparation — update the incident response plan"
      - "C. Detection — scan for additional indicators"
      - "D. Notification — inform the media"
    answerIndex: 0
    explanation: >-
      After containment, eradication removes the threat (malware, unauthorized accounts, compromised systems) from the environment. Preparation (B) is the first phase and is revisited during lessons learned. Detection (C) is an earlier phase. Media notification (D) is a communication decision, not a core IR step.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-047"
    difficulty: "medium"
    tags: ["operations", "forensics", "chain-of-custody"]
    question: "During a forensic investigation, why is chain of custody documentation critical?"
    choices:
      - "A. It proves that evidence has been handled properly and has not been tampered with, ensuring admissibility"
      - "B. It speeds up the investigation process"
      - "C. It replaces the need for forensic imaging"
      - "D. It is only required for physical evidence, not digital"
    answerIndex: 0
    explanation: >-
      Chain of custody documentation tracks who handled evidence, when, and what was done with it, ensuring its integrity and admissibility in legal proceedings. It does not speed investigations (B) or replace imaging (C). Digital evidence requires the same chain of custody rigor as physical evidence (D).
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-86/final"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-048"
    difficulty: "hard"
    tags: ["operations", "threat-hunting", "proactive"]
    question: "A security team proactively searches their environment for signs of compromise using MITRE ATT&CK techniques, without being triggered by an alert. What is this activity called?"
    choices:
      - "A. Threat hunting"
      - "B. Vulnerability scanning"
      - "C. Penetration testing"
      - "D. Risk assessment"
    answerIndex: 0
    explanation: >-
      Threat hunting is the proactive, hypothesis-driven search for threats that evade existing detection mechanisms. Vulnerability scanning (B) identifies known weaknesses. Penetration testing (C) simulates attacks. Risk assessment (D) evaluates threats and their potential impact from a governance perspective.
    refs:
      - "https://attack.mitre.org/"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-049"
    difficulty: "easy"
    tags: ["operations", "disaster-recovery", "rpo"]
    question: "If an organization's RPO (Recovery Point Objective) is 4 hours, what does this mean?"
    choices:
      - "A. The organization can tolerate losing up to 4 hours of data"
      - "B. Systems must be restored within 4 hours"
      - "C. Backups must be kept for 4 hours only"
      - "D. The network can be down for 4 hours"
    answerIndex: 0
    explanation: >-
      RPO defines the maximum acceptable data loss measured in time. A 4-hour RPO means backups must occur at least every 4 hours. RTO (B) defines the maximum acceptable downtime. RPO does not set backup retention periods (C) or acceptable downtime (D).
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-050"
    difficulty: "medium"
    tags: ["operations", "logging", "siem"]
    question: "A SIEM generates an alert when a single user account authenticates from two different countries within 30 minutes. What type of detection rule is this?"
    choices:
      - "A. Impossible travel detection (behavioral anomaly)"
      - "B. Signature-based detection"
      - "C. Static threshold alert"
      - "D. Scheduled report"
    answerIndex: 0
    explanation: >-
      Impossible travel detection identifies when a user appears to log in from geographically distant locations in a timeframe that makes physical travel impossible, indicating credential compromise. Signature-based detection (B) matches known patterns. Static thresholds (C) trigger on fixed values. Scheduled reports (D) are passive analysis.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-92/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-051"
    difficulty: "hard"
    tags: ["operations", "forensics", "imaging"]
    question: "Before examining a suspect's hard drive, a forensic analyst creates a bit-for-bit copy and generates SHA-256 hashes of both the original and the copy. Why?"
    choices:
      - "A. To verify the forensic image is an exact copy and to preserve evidence integrity for legal proceedings"
      - "B. To compress the data for efficient storage"
      - "C. To encrypt the evidence so others cannot access it"
      - "D. To convert the file system to a different format"
    answerIndex: 0
    explanation: >-
      Matching hashes between the original and copy prove the image is an exact duplicate, establishing evidence integrity. Analysis is performed on the copy to preserve the original. Hashing is not compression (B), encryption (C), or file system conversion (D).
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-86/final"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-052"
    difficulty: "medium"
    tags: ["operations", "business-continuity", "testing"]
    question: "A company conducts a tabletop exercise for their disaster recovery plan. What does this involve?"
    choices:
      - "A. Team members walk through a simulated scenario verbally, discussing their roles and responses"
      - "B. Actually shutting down production systems to test failover"
      - "C. Running automated scripts to test backup restoration"
      - "D. Hiring an external team to attack the network"
    answerIndex: 0
    explanation: >-
      Tabletop exercises are discussion-based simulations where participants walk through a scenario, reviewing procedures and decision-making without disrupting operations. Actual failover testing (B) is a full interruption test. Automated testing (C) is a technical validation. External attacks (D) are penetration tests.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-84/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-053"
    difficulty: "easy"
    tags: ["operations", "scanning", "vulnerability"]
    question: "What is the PRIMARY difference between a vulnerability scan and a penetration test?"
    choices:
      - "A. Vulnerability scans identify known weaknesses automatically, while penetration tests actively exploit vulnerabilities to assess real-world impact"
      - "B. Penetration tests are always automated, vulnerability scans are manual"
      - "C. Vulnerability scans are more expensive than penetration tests"
      - "D. Penetration tests only check for open ports"
    answerIndex: 0
    explanation: >-
      Vulnerability scans use automated tools to identify known vulnerabilities without exploiting them. Penetration tests go further by attempting exploitation to demonstrate actual risk and impact. Pen tests involve significant manual effort (B). Vulnerability scans are typically less expensive (C). Pen tests assess much more than ports (D).
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-115/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-054"
    difficulty: "hard"
    tags: ["operations", "incident-response", "playbook"]
    question: "A SOC analyst receives an alert about potential data exfiltration. The incident response playbook directs them to first verify the alert, then isolate the affected system. Why is verification before isolation the recommended order?"
    choices:
      - "A. Premature isolation of a false positive disrupts business operations unnecessarily, while verification ensures a proportionate response"
      - "B. Isolation must always be the very last step"
      - "C. Verification is only needed for low-severity alerts"
      - "D. The analyst should wait 24 hours before taking any action"
    answerIndex: 0
    explanation: >-
      Verifying the alert prevents unnecessary business disruption from false positives while ensuring genuine threats are handled appropriately. However, for confirmed high-severity threats, isolation may need to be immediate. Isolation (B) is not always last — it follows verification. All severity levels benefit from verification (C). Waiting 24 hours (D) gives attackers more time.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-055"
    difficulty: "medium"
    tags: ["operations", "monitoring", "log-types"]
    question: "Which log source is MOST useful for detecting unauthorized access attempts to a web application?"
    choices:
      - "A. Web server access and error logs"
      - "B. DHCP server logs"
      - "C. Print server logs"
      - "D. DNS cache statistics"
    answerIndex: 0
    explanation: >-
      Web server logs record all HTTP requests including failed authentication attempts, suspicious paths, and error codes that indicate attack activity. DHCP logs (B) track IP assignments. Print server logs (C) record print jobs. DNS statistics (D) show resolution patterns but not web application access.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-92/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-056"
    difficulty: "easy"
    tags: ["operations", "change-management", "process"]
    question: "Before deploying a major software update to production, what should happen FIRST according to change management best practices?"
    choices:
      - "A. The change should be tested in a staging environment and approved through the change advisory board"
      - "B. Deploy directly to production during peak hours for maximum user testing"
      - "C. Skip testing if the vendor certifies the update"
      - "D. Roll back the previous update first"
    answerIndex: 0
    explanation: >-
      Change management requires testing in a non-production environment and obtaining proper approval before deployment. Deploying to production first (B) risks outages. Vendor certification (C) does not replace local testing. Rolling back (D) is not a prerequisite unless there are known issues.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-057"
    difficulty: "hard"
    tags: ["operations", "automation", "scripting"]
    question: "A security team writes a Python script that automatically blocks IP addresses generating more than 100 failed login attempts per minute. What is the PRIMARY risk of this automation?"
    choices:
      - "A. An attacker could trigger the script to block legitimate users' IP addresses as a denial-of-service technique"
      - "B. Python scripts cannot interact with firewalls"
      - "C. Automated blocking is always slower than manual blocking"
      - "D. The script will consume too much memory on the server"
    answerIndex: 0
    explanation: >-
      Automated blocking without safeguards can be weaponized — an attacker can spoof source IPs of legitimate users or business partners to trigger blocks, creating a self-inflicted denial of service. Python can interact with firewall APIs (B). Automation is faster than manual processes (C). Resource usage (D) is typically minimal for such scripts.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-058"
    difficulty: "medium"
    tags: ["operations", "data-destruction", "sanitization"]
    question: "A company is decommissioning SSDs that contained classified data. Why is simple overwriting insufficient for SSDs?"
    choices:
      - "A. SSDs use wear-leveling algorithms that may leave data remnants in inaccessible blocks"
      - "B. SSDs cannot be overwritten at all"
      - "C. Overwriting SSDs takes longer than HDDs"
      - "D. SSDs automatically encrypt all data, making overwriting unnecessary"
    answerIndex: 0
    explanation: >-
      SSD wear-leveling distributes writes across cells, meaning overwrite commands may not reach all physical locations where data was stored. NIST recommends cryptographic erase or physical destruction for SSDs. SSDs can be overwritten (B), but it may not reach all cells. Overwriting time varies (C). Not all SSDs use hardware encryption (D).
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-88/rev-1/final"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-059"
    difficulty: "easy"
    tags: ["operations", "awareness", "training"]
    question: "What is the MOST effective way to train employees to recognize phishing emails?"
    choices:
      - "A. Regular simulated phishing campaigns with immediate feedback"
      - "B. A single annual lecture on email security"
      - "C. Sending a memo about phishing once when hired"
      - "D. Blocking all external emails to prevent phishing"
    answerIndex: 0
    explanation: >-
      Simulated phishing with immediate educational feedback creates a continuous learning cycle that measurably reduces click rates. Annual lectures (B) have low retention. A single memo (C) is insufficient for ongoing threats. Blocking all external email (D) is operationally impractical.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-50/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-060"
    difficulty: "hard"
    tags: ["operations", "incident-response", "containment"]
    question: "During an active ransomware incident, the affected server is still connected to the network and encryption is spreading. What is the MOST critical immediate action?"
    choices:
      - "A. Isolate the infected system from the network to prevent further lateral spread"
      - "B. Begin negotiating with the attacker for the decryption key"
      - "C. Run a full antivirus scan on the infected machine"
      - "D. Restart the server to clear the malware from memory"
    answerIndex: 0
    explanation: >-
      Network isolation stops the ransomware from spreading to other systems, which is the top priority during active encryption. Negotiation (B) does not stop the spread. Antivirus scanning (C) takes too long during active encryption. Restarting (D) may cause data loss and does not prevent network-based propagation.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  # Domain 5: Governance, Risk, and Compliance (~10 questions)
  - id: "sec701-expand-061"
    difficulty: "easy"
    tags: ["governance", "frameworks", "nist"]
    question: "Which framework provides a voluntary set of standards and best practices for managing cybersecurity risk?"
    choices:
      - "A. NIST Cybersecurity Framework (CSF)"
      - "B. PCI DSS"
      - "C. HIPAA"
      - "D. SOX"
    answerIndex: 0
    explanation: >-
      NIST CSF is a voluntary framework with five core functions (Identify, Protect, Detect, Respond, Recover) for managing cybersecurity risk. PCI DSS (B) is mandatory for payment card handlers. HIPAA (C) is mandatory for healthcare. SOX (D) is mandatory for public companies' financial reporting.
    refs:
      - "https://www.nist.gov/cyberframework"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-062"
    difficulty: "medium"
    tags: ["governance", "risk", "assessment"]
    question: "During a risk assessment, the team identifies a threat with high likelihood and high impact but determines that no cost-effective mitigation exists. What is the MOST appropriate risk response?"
    choices:
      - "A. Transfer the risk through cyber insurance"
      - "B. Ignore the risk and hope it does not materialize"
      - "C. Accept the risk without documentation"
      - "D. Implement the most expensive control available"
    answerIndex: 0
    explanation: >-
      When mitigation is not cost-effective for a high-likelihood, high-impact risk, transferring it through insurance shifts the financial burden. Ignoring risk (B) is never appropriate. Acceptance requires formal documentation (C). The most expensive control (D) may not be cost-effective either.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-063"
    difficulty: "hard"
    tags: ["governance", "compliance", "privacy"]
    question: "Under GDPR, a data subject requests that an organization delete all their personal data. The organization has a legal obligation to retain some of that data for tax purposes. What should the organization do?"
    choices:
      - "A. Delete data not subject to legal retention requirements and retain only what is legally required, informing the data subject of the partial fulfillment"
      - "B. Delete all data immediately regardless of legal obligations"
      - "C. Refuse the request entirely because some data must be retained"
      - "D. Anonymize all data instead of deleting any"
    answerIndex: 0
    explanation: >-
      GDPR's right to erasure has exceptions for legal obligations. The organization must delete what it can while retaining only what law requires, transparently informing the data subject. Deleting everything (B) violates tax law. Refusing entirely (C) violates GDPR. Anonymization (D) may be appropriate in some cases but does not fulfill the specific erasure request where deletion is possible.
    refs:
      - "https://gdpr.eu/article-17-right-to-be-forgotten/"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-064"
    difficulty: "easy"
    tags: ["governance", "policies", "aup"]
    question: "What does an Acceptable Use Policy (AUP) define?"
    choices:
      - "A. The rules governing how employees may use organizational IT resources"
      - "B. The technical specifications for network equipment"
      - "C. The salary structure for IT staff"
      - "D. The physical layout of the data center"
    answerIndex: 0
    explanation: >-
      An AUP defines acceptable and prohibited uses of organizational IT resources (computers, networks, email, internet) by employees and contractors. Technical specifications (B), salary structures (C), and data center layouts (D) are separate operational documents.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-065"
    difficulty: "medium"
    tags: ["governance", "risk", "risk-register"]
    question: "What information does a risk register typically contain?"
    choices:
      - "A. Identified risks, their likelihood, impact, current controls, risk owners, and treatment plans"
      - "B. Only a list of past security incidents"
      - "C. Employee names and their access levels"
      - "D. Network diagrams and IP addresses"
    answerIndex: 0
    explanation: >-
      A risk register is a comprehensive document tracking identified risks with their assessed likelihood, impact, existing controls, assigned owners, and planned responses. It is not limited to past incidents (B). Access levels (C) belong to IAM documentation. Network documentation (D) is a separate asset.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-066"
    difficulty: "hard"
    tags: ["governance", "compliance", "audit"]
    question: "An external auditor finds that the organization's access review process exists in policy but has not been executed in 18 months. What type of finding is this?"
    choices:
      - "A. A control deficiency — the control is designed but not operating effectively"
      - "B. A material weakness that requires immediate public disclosure"
      - "C. An observation with no remediation required"
      - "D. A best practice suggestion that can be ignored"
    answerIndex: 0
    explanation: >-
      When a control exists in policy but is not executed, it is a control deficiency — the design exists but operational effectiveness is lacking. Whether it rises to a material weakness (B) depends on its significance to financial reporting. It is more than an observation (C) and cannot be ignored (D) as it represents a gap in the control environment.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-067"
    difficulty: "easy"
    tags: ["governance", "concepts", "cia-triad"]
    question: "Which element of the CIA triad is MOST affected when a DDoS attack makes a website unavailable?"
    choices:
      - "A. Availability"
      - "B. Confidentiality"
      - "C. Integrity"
      - "D. Authentication"
    answerIndex: 0
    explanation: >-
      DDoS attacks overwhelm resources to make services unavailable, directly impacting availability. Confidentiality (B) concerns unauthorized data access. Integrity (C) concerns unauthorized data modification. Authentication (D) is not part of the CIA triad.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-068"
    difficulty: "medium"
    tags: ["governance", "third-party", "vendor-risk"]
    question: "Before engaging a new cloud service provider, what document should the security team review to understand the provider's security controls and compliance posture?"
    choices:
      - "A. The provider's SOC 2 Type II report"
      - "B. The provider's marketing brochure"
      - "C. The provider's employee handbook"
      - "D. The provider's annual revenue report"
    answerIndex: 0
    explanation: >-
      SOC 2 Type II reports provide independent auditor assessment of a service provider's security, availability, processing integrity, confidentiality, and privacy controls over time. Marketing materials (B) are biased. Employee handbooks (C) are internal HR documents. Revenue reports (D) address financial performance, not security.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://www.aicpa.org/topic/audit-assurance/audit-and-assurance-greater-than-soc-2"
    author: "ThanhNguyxn"

  - id: "sec701-expand-069"
    difficulty: "hard"
    tags: ["governance", "regulations", "data-sovereignty"]
    question: "A European company stores customer data in US-based cloud servers. Following the invalidation of Privacy Shield, what PRIMARY concern must the company address?"
    choices:
      - "A. Ensuring a valid legal mechanism for cross-border data transfers, such as Standard Contractual Clauses (SCCs)"
      - "B. Moving all data to US servers since Privacy Shield was replaced by a better agreement"
      - "C. Encrypting data only when it crosses the Atlantic Ocean"
      - "D. Obtaining US citizenship for all European customers"
    answerIndex: 0
    explanation: >-
      After Privacy Shield invalidation (Schrems II), organizations need valid transfer mechanisms like SCCs with supplementary measures to legally transfer personal data from the EU to the US. Privacy Shield was not seamlessly replaced (B). Encryption is important but geographic-specific encryption (C) is not a legal framework. Citizenship (D) is irrelevant.
    refs:
      - "https://gdpr.eu/"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-070"
    difficulty: "medium"
    tags: ["governance", "security-program", "metrics"]
    question: "Which metric BEST measures the effectiveness of a security awareness training program?"
    choices:
      - "A. Reduction in phishing simulation click rates over time"
      - "B. Number of employees who attended the training"
      - "C. Total cost of the training program"
      - "D. Number of security policies published"
    answerIndex: 0
    explanation: >-
      Declining phishing click rates demonstrate behavioral change, which is the actual goal of awareness training. Attendance (B) measures participation, not effectiveness. Cost (C) measures investment, not outcome. Policy count (D) measures documentation volume, not employee awareness.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-50/final"
    author: "ThanhNguyxn"
