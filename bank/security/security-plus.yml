  - id: "sec701-expand-036"
    difficulty: "hard"
    tags: ["implementation", "network", "firewall-rules"]
    question: "A firewall ruleset has an explicit deny-all rule at the bottom and specific allow rules above it. A new service is deployed but its port is not in any allow rule. What happens to traffic for this service?"
    choices:
      - "A. Traffic is blocked by the deny-all rule"
      - "B. Traffic is allowed because new services are automatically trusted"
      - "C. The firewall prompts the administrator to create a rule"
      - "D. Traffic is logged but allowed through"
    answerIndex: 0
    explanation: >-
      Firewalls process rules top-down. If no allow rule matches, the deny-all rule at the bottom blocks the traffic. This is the implicit/explicit deny principle. Firewalls do not auto-trust new services (B), prompt for rules (C), or default to allow-and-log (D).
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-41/rev-1/final"
