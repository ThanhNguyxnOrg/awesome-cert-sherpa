      - "B. SSL/TLS VPN"
      - "C. PPTP"
      - "D. SSH"
    answerIndex: 0
    explanation: >-
      IPSec operates at the network layer (Layer 3) and can encrypt all IP traffic between endpoints. SSL/TLS VPN (B) operates at the transport/application layer. PPTP (C) is a deprecated tunneling protocol. SSH (D) provides encrypted application-layer tunnels, not full network-layer VPN.
    refs:
      - "https://www.comptia.org/certifications/security"
