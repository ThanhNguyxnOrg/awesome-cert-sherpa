  - id: "sec701-expand-024"
    difficulty: "hard"
    tags: ["architecture", "infrastructure", "containers"]
    question: "Compared to virtual machines, what is a PRIMARY security consideration when deploying containerized applications?"
    choices:
      - "A. Containers share the host kernel, so a kernel vulnerability could affect all containers on the host"
      - "B. Containers are completely isolated and need no additional security"
      - "C. Containers cannot run on cloud infrastructure"
      - "D. Container images never contain vulnerabilities"
    answerIndex: 0
    explanation: >-
      Unlike VMs with separate OS kernels, containers share the host kernel. A kernel exploit in one container can potentially compromise all containers and the host. Containers need security controls (B) including image scanning, runtime protection, and network policies. Container images frequently contain vulnerabilities (D) from base images and dependencies.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-190/final"
