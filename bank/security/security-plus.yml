  - id: "sec701-expand-021"
    difficulty: "hard"
    tags: ["architecture", "secure-design", "encryption"]
    question: "An application needs to store sensitive data at rest. The architect proposes full-disk encryption (FDE) as the sole protection. What is the PRIMARY limitation of this approach?"
    choices:
      - "A. FDE only protects against offline attacks — data is accessible in plaintext when the system is running and the disk is unlocked"
      - "B. FDE makes data recovery impossible in case of hardware failure"
      - "C. FDE significantly slows down all disk operations"
      - "D. FDE prevents authorized users from reading their own files"
    answerIndex: 0
    explanation: >-
      Full-disk encryption protects data when the system is powered off or the disk is removed. Once the system boots and the disk is unlocked, all data is accessible in plaintext to any running process. Application-level encryption provides additional protection while the system is running. Modern hardware (C) handles FDE with minimal performance impact.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-111/final"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

