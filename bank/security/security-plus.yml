      - "C. Virtual networks being inherently more secure than physical networks"
      - "D. The inability to take snapshots of virtual machines"
    answerIndex: 0
    explanation: >-
      VM escape is a critical vulnerability where an attacker in a guest VM exploits the hypervisor to access the host or other VMs, breaking the isolation boundary. Performance (B) is an operational concern, not a security issue. Virtual networks (C) require the same security controls as physical ones. Snapshots (D) are a standard hypervisor feature.
