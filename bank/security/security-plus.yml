      - "C. Users are redirected to the certificate authority's website"
      - "D. The server's firewall blocks all incoming connections"
    answerIndex: 0
    explanation: >-
      Expired certificates cause browsers to display prominent security warnings because the identity of the server can no longer be verified as current. The site does not automatically switch to HTTP (B). No redirection to the CA occurs (C). Firewalls are unrelated to certificate expiration (D).
