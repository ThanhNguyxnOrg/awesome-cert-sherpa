      - "A. Least privilege"
      - "B. Availability"
      - "C. Non-repudiation"
      - "D. Obfuscation"
    answerIndex: 0
    explanation: >-
      Least privilege requires users to have only the minimum permissions necessary for their role. A developer should not have full admin access to production databases unless specifically required. Availability (B) concerns uptime. Non-repudiation (C) prevents denial of actions. Obfuscation (D) hides implementation details.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
