  - id: "sec701-expand-039"
    difficulty: "hard"
    tags: ["implementation", "identity", "oauth"]
    question: "In an OAuth 2.0 authorization code flow, what does the authorization server return to the client application FIRST?"
    choices:
      - "A. An authorization code that must be exchanged for an access token"
      - "B. An access token directly"
      - "C. The user's password"
      - "D. A refresh token only"
    answerIndex: 0
    explanation: >-
      In the authorization code flow, the server first returns an authorization code to the client's redirect URI. The client then exchanges this code (with its client secret) for an access token. Returning tokens directly (B) is the implicit flow (less secure). User passwords (C) are never shared with the client. Refresh tokens (D) are issued alongside access tokens, not alone.
