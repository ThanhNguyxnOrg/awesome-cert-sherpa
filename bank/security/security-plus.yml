    question: "A manufacturer deploys IoT sensors with hard-coded default credentials and no firmware update mechanism. What is the MOST significant security concern?"
    choices:
      - "A. The devices cannot be patched and default credentials make them easy targets for botnets"
      - "B. IoT devices consume too much bandwidth"
      - "C. The sensors are too small to be physically secured"
      - "D. IoT protocols are inherently secure"
    answerIndex: 0
    explanation: >-
      Devices with hard-coded credentials and no update mechanism cannot be secured after deployment, making them permanent vulnerabilities and prime botnet targets (e.g., Mirai). Bandwidth (B) and physical size (C) are secondary concerns. IoT protocols (D) vary widely in security.
