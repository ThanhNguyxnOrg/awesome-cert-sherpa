meta:
  category: "security"
  cert: "Security+"
  vendor: "CompTIA"
  version: 1
  description: "Original practice questions for CompTIA Security+ (SY0-701)"
questions:
  - id: "sec701-general-001"
    difficulty: "easy"
    tags: ["cia-triad", "integrity", "security-concepts"]
    question: "A security analyst discovers that a file server stayed online during an incident, but several records were silently altered. Which CIA triad principle was violated?"
    choices: ["A. Integrity", "B. Availability", "C. Confidentiality", "D. Non-repudiation"]
    answerIndex: 0
    explanation: "Integrity ensures data is accurate and unmodified, so unauthorized record changes are an integrity failure even if service stayed up. Availability is not the primary issue because users could still access the server."
    refs: ["https://www.comptia.org/certifications/security", "https://www.nist.gov/cyberframework"]
    author: "ThanhNguyxn"
  - id: "sec701-general-002"
    difficulty: "easy"
    tags: ["non-repudiation", "digital-signatures", "pki"]
    question: "A procurement officer denies approving a high-value wire transfer that appears in the system. Which control provides the strongest non-repudiation evidence of approval?"
    choices: ["A. Encrypting the transfer record with AES", "B. Applying the officer's digital signature to the transaction", "C. Storing only a SHA-256 hash of the PDF", "D. Restricting access with an ACL"]
    answerIndex: 1
    explanation: "Digital signatures use the sender's private key and provide cryptographic proof of origin and intent, supporting non-repudiation. A hash alone can verify integrity but cannot prove which user authorized the action."
    refs: ["https://csrc.nist.gov/projects/cryptographic-standards-and-guidelines", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-general-003"
    difficulty: "medium"
    tags: ["aaa", "identity-access-management", "logging"]
    question: "An organization requires VPN users to authenticate with a smart card and PIN, then logs every privileged command they run. In AAA, what function does the command logging represent?"
    choices: ["A. Authentication", "B. Authorization", "C. Accounting", "D. Federation"]
    answerIndex: 2
    explanation: "Accounting records what users did, when they did it, and from where, which is exactly what command logs provide. Authorization determines what actions are permitted, but it does not by itself create an audit trail."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-general-004"
    difficulty: "hard"
    tags: ["zero-trust", "compensating-controls", "access-control"]
    question: "A legacy internal application cannot support native MFA for six months due to vendor limitations. Which approach is the best compensating control that still aligns with Zero Trust principles?"
    choices: ["A. Move the app to a separate VLAN and keep existing login process", "B. Whitelist office IP ranges and disable remote access", "C. Require password changes every 14 days for all users", "D. Place the app behind a ZTNA gateway that enforces MFA, device posture checks, and least-privilege session access"]
    answerIndex: 3
    explanation: "A ZTNA gateway can enforce strong identity and device verification at access time, providing a practical compensating control until the app is replaced. VLAN segmentation helps reduce exposure, but it does not provide per-session identity verification required by Zero Trust."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-207/final", "https://www.nist.gov/cyberframework"]
    author: "ThanhNguyxn"
  - id: "sec701-threats-001"
    difficulty: "easy"
    tags: ["social-engineering", "smishing", "user-awareness"]
    question: "Employees receive text messages claiming to be from IT, asking them to click a link to re-enroll MFA. What type of social engineering attack is this?"
    choices: ["A. Smishing", "B. Vishing", "C. Shoulder surfing", "D. Tailgating"]
    answerIndex: 0
    explanation: "Smishing is phishing delivered through SMS or text messaging platforms. Vishing uses voice calls, so it does not match a text-based lure."
    refs: ["https://www.cisa.gov/topics/cybersecurity-best-practices", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-threats-002"
    difficulty: "easy"
    tags: ["malware", "worm", "network-attacks"]
    question: "A malicious program spreads automatically across vulnerable hosts without user interaction. Which malware type best fits this behavior?"
    choices: ["A. Trojan", "B. Worm", "C. Rootkit", "D. Logic bomb"]
    answerIndex: 1
    explanation: "A worm is designed to self-replicate and spread over networks by exploiting weaknesses. A trojan usually depends on user execution and does not inherently self-propagate."
    refs: ["https://www.cisa.gov/topics/cybersecurity-best-practices", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-threats-003"
    difficulty: "medium"
    tags: ["threat-actors", "organized-crime", "ransomware"]
    question: "A group steals payment-card data, deploys ransomware, and sells stolen records for profit. Which threat actor category is most likely responsible?"
    choices: ["A. Hacktivist", "B. Insider", "C. Organized crime", "D. Nation-state"]
    answerIndex: 2
    explanation: "Organized crime groups are typically financially motivated and often combine extortion with data monetization. Hacktivists are usually driven by ideological goals and are less focused on sustained profit operations."
    refs: ["https://www.cisa.gov/topics/cybersecurity-best-practices", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-threats-004"
    difficulty: "medium"
    tags: ["dns-poisoning", "network-security", "mitigation"]
    question: "Users at a branch office are intermittently redirected to fake banking sites because DNS responses are being spoofed. Which control most directly mitigates this issue by validating DNS authenticity?"
    choices: ["A. Segmenting user VLANs from printer VLANs", "B. Increasing endpoint anti-malware scan frequency", "C. Enforcing stricter password complexity", "D. Implementing DNSSEC validation on resolvers"]
    answerIndex: 3
    explanation: "DNSSEC provides signed DNS data so resolvers can verify records and reject tampered responses. Network segmentation can limit spread, but it does not cryptographically validate DNS answers."
    refs: ["https://www.cisa.gov/topics/cybersecurity-best-practices", "https://www.nist.gov/cyberframework"]
    author: "ThanhNguyxn"
  - id: "sec701-threats-005"
    difficulty: "medium"
    tags: ["iot-security", "segmentation", "compensating-controls"]
    question: "A critical vulnerability is found in internet-connected cameras, but the vendor patch will not be available for 60 days. What is the best immediate mitigation?"
    choices: ["A. Isolate cameras on a restricted VLAN with ACLs allowing only required management traffic", "B. Increase minimum password length for office email accounts", "C. Disable centralized logging to reduce system load", "D. Rotate backup tapes more frequently"]
    answerIndex: 0
    explanation: "Isolation with strict ACLs reduces attack surface and limits lateral movement while waiting for a vendor fix. Email password policy changes do not directly mitigate a firmware exploitation path in cameras."
    refs: ["https://www.cisa.gov/topics/cybersecurity-best-practices", "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"]
    author: "ThanhNguyxn"
  - id: "sec701-threats-006"
    difficulty: "hard"
    tags: ["password-attacks", "hashing", "authentication"]
    question: "An attacker obtains password hashes and uses large precomputed lookup tables to recover weak passwords quickly. Which attack technique is being used?"
    choices: ["A. Brute-force attack", "B. Rainbow table attack", "C. Pass-the-hash", "D. Credential stuffing"]
    answerIndex: 1
    explanation: "Rainbow table attacks use precomputed hash-to-password mappings to speed up cracking of unsalted or weakly protected hashes. Pass-the-hash reuses stolen hashes for authentication and does not require recovering plaintext passwords."
    refs: ["https://csrc.nist.gov/projects/cryptographic-standards-and-guidelines", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-threats-007"
    difficulty: "hard"
    tags: ["cloud-security", "misconfiguration", "cspm"]
    question: "A team repeatedly exposes object storage buckets due to template mistakes across multiple cloud accounts. Which mitigation most effectively prevents recurrence at scale?"
    choices: ["A. Monthly manual review of all bucket permissions", "B. Quarterly security awareness reminders for developers", "C. Organization-level policy guardrails plus CSPM checks to block public bucket configurations", "D. Increasing encryption key length for bucket data"]
    answerIndex: 2
    explanation: "Preventive guardrails and automated posture checks stop or quickly detect insecure configurations across accounts, which addresses systemic recurrence. Manual monthly reviews are too slow for rapid cloud deployment cycles and are primarily detective."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-architecture-001"
    difficulty: "easy"
    tags: ["cloud-models", "iaas", "shared-responsibility"]
    question: "Which cloud service model requires the customer to secure the guest operating system and applications while the provider manages physical hardware and hypervisor infrastructure?"
    choices: ["A. SaaS", "B. FaaS", "C. PaaS", "D. IaaS"]
    answerIndex: 3
    explanation: "In IaaS, customers are responsible for workloads above the virtualization layer, including OS hardening and patching. In PaaS, the provider manages more of the platform stack, so customer OS management is not the same responsibility."
    refs: ["https://www.comptia.org/certifications/security", "https://www.nist.gov/cyberframework"]
    author: "ThanhNguyxn"
  - id: "sec701-architecture-002"
    difficulty: "medium"
    tags: ["data-security", "data-in-transit", "encryption"]
    question: "A company sends customer records over a TLS-protected API from its CRM to a payment partner. Which data state best describes those records during transfer?"
    choices: ["A. Data in transit", "B. Data at rest", "C. Data in use", "D. Data remanence"]
    answerIndex: 0
    explanation: "Data moving between systems over a network is data in transit, even when protected by TLS. Data at rest refers to information stored on media such as disks, databases, or backups."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-171/rev-2/final", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-architecture-003"
    difficulty: "medium"
    tags: ["disaster-recovery", "site-types", "high-availability"]
    question: "An enterprise needs a disaster recovery site capable of near-immediate failover with fully provisioned systems, and it accepts the highest cost. Which site type should it choose?"
    choices: ["A. Cold site", "B. Hot site", "C. Warm site", "D. Mobile site"]
    answerIndex: 1
    explanation: "A hot site is preconfigured and ready for rapid cutover, providing the shortest recovery time objective. A cold site has minimal infrastructure and requires significant setup time during an event."
    refs: ["https://www.nist.gov/cyberframework", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-architecture-004"
    difficulty: "hard"
    tags: ["data-sovereignty", "compliance", "cloud-architecture"]
    question: "A multinational must ensure EU customer data never leaves approved EU jurisdictions and that cryptographic key control stays with an EU legal entity. Which architecture best satisfies this requirement?"
    choices: ["A. Replicate all customer data to a global multi-region bucket", "B. Transfer raw data to a non-EU analytics region and tokenize later", "C. Store and process data only in EU regions with geofencing and EU-controlled key management", "D. Keep backups encrypted but allow unrestricted cross-region processing"]
    answerIndex: 2
    explanation: "Regional processing with geofencing and locally governed key control directly supports sovereignty and residency constraints. Tokenizing after cross-border transfer still allows sensitive data movement outside the required jurisdiction."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-171/rev-2/final", "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"]
    author: "ThanhNguyxn"
  - id: "sec701-architecture-005"
    difficulty: "hard"
    tags: ["iac-security", "devsecops", "policy-as-code"]
    question: "A DevOps team uses Terraform and wants to stop insecure security group rules before deployment. Which control is most effective?"
    choices: ["A. Perform quarterly penetration tests after production releases", "B. Depend on manual peer review only", "C. Scan only running instances for vulnerabilities", "D. Enforce policy-as-code checks in CI/CD that fail builds on noncompliant IaC"]
    answerIndex: 3
    explanation: "Policy-as-code in CI/CD is preventive and blocks risky infrastructure definitions before they reach production. Post-deployment scanning is important but detective, so it cannot prevent initial exposure."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-001"
    difficulty: "easy"
    tags: ["incident-response", "soc", "detection-analysis"]
    question: "A SOC analyst validates an alert and confirms malicious lateral movement is occurring. In the incident response lifecycle, which phase is this?"
    choices: ["A. Detection and analysis", "B. Eradication", "C. Recovery", "D. Lessons learned"]
    answerIndex: 0
    explanation: "Confirming whether an event is truly an incident is part of detection and analysis. Eradication occurs later and focuses on removing attacker artifacts and root causes."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-002"
    difficulty: "easy"
    tags: ["iam", "sso", "authentication"]
    question: "A company wants users to authenticate once to access multiple approved internal applications without repeated logins. Which IAM capability should be implemented?"
    choices: ["A. Privileged access management", "B. Single sign-on", "C. Kerberos ticket lifetime reduction", "D. Just-in-time admin elevation"]
    answerIndex: 1
    explanation: "Single sign-on enables one identity assertion to be reused across multiple trusted applications. Privileged access management controls high-privilege accounts and does not by itself deliver broad user SSO behavior."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-003"
    difficulty: "medium"
    tags: ["digital-forensics", "chain-of-custody", "evidence-handling"]
    question: "During a legal investigation, an analyst acquires a disk image from a compromised laptop. Which action best preserves chain of custody?"
    choices: ["A. Reboot the laptop to confirm persistence after restart", "B. Share evidence copies via personal cloud storage", "C. Record each evidence transfer with signed timestamps and handler identity", "D. Analyze the original drive directly to save time"]
    answerIndex: 2
    explanation: "Chain of custody requires documented, auditable tracking of who handled evidence, when, and how it was transferred. Rebooting a system can change volatile and system state data, weakening forensic defensibility."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final", "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-004"
    difficulty: "medium"
    tags: ["siem", "soar", "automation", "orchestration"]
    question: "A SOC is overwhelmed by repetitive phishing alerts and wants automatic enrichment, ticket creation, and containment playbooks with analyst approval gates. Which implementation best meets this goal?"
    choices: ["A. Network IDS with expanded signature packs", "B. Endpoint AV with daily full scans", "C. Central syslog server with longer retention", "D. SIEM integrated with SOAR-driven response workflows"]
    answerIndex: 3
    explanation: "A SIEM aggregates and correlates security telemetry, while SOAR automates multi-step response actions through playbooks. A syslog server alone stores logs but does not orchestrate enrichment and response decisions."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-005"
    difficulty: "medium"
    tags: ["secure-baselines", "hardening", "configuration-management"]
    question: "A security engineer needs new Linux servers to remain aligned with a hardened baseline over time. Which approach is most effective?"
    choices: ["A. Enforce baseline configurations with automation and run continuous compliance checks", "B. Allow each admin to tune settings manually per workload", "C. Delay patching until annual maintenance windows", "D. Replace baseline checks with annual penetration testing only"]
    answerIndex: 0
    explanation: "Automated baseline enforcement and recurring compliance validation maintain consistency and reduce configuration drift. Annual penetration tests are valuable but too infrequent to enforce daily hardening standards."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-006"
    difficulty: "hard"
    tags: ["ids-ips", "false-positives", "network-security"]
    question: "After enabling an inline IPS, legitimate business traffic is being blocked by false positives. What is the best immediate action to reduce risk while restoring reliability?"
    choices: ["A. Disable IPS permanently and rely on perimeter firewall rules", "B. Temporarily run in detection mode and tune signatures, thresholds, and allowlists before re-enabling blocking", "C. Increase phishing simulation frequency", "D. Move logs to lower-cost cold storage"]
    answerIndex: 1
    explanation: "Temporary detect mode with structured tuning preserves visibility while reducing operational disruption and improving future blocking quality. Permanently disabling the IPS removes a key preventive control and increases exposure."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-007"
    difficulty: "hard"
    tags: ["xdr", "threat-detection", "telemetry-correlation"]
    question: "Attackers move from a compromised endpoint into cloud workloads using stolen tokens. Which capability best helps detect the full attack chain across environments?"
    choices: ["A. Host firewall rules on user laptops", "B. Weekly vulnerability scans only", "C. XDR that correlates endpoint, identity, network, and cloud telemetry", "D. Offline tape backup rotation"]
    answerIndex: 2
    explanation: "XDR is designed to correlate multi-domain telemetry and surface linked attacker behaviors across endpoint and cloud boundaries. Host firewall controls are important but provide narrow visibility and no broad behavioral correlation."
    refs: ["https://www.nist.gov/cyberframework", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-operations-008"
    difficulty: "hard"
    tags: ["incident-response", "digital-forensics", "ransomware"]
    question: "A ransomware outbreak has been contained on several servers. Before widespread reimaging, which step is most important for forensic integrity and root-cause analysis?"
    choices: ["A. Pay the ransom immediately to reduce downtime", "B. Delete suspicious files and return systems to users", "C. Rebuild all affected hosts without evidence collection", "D. Capture memory and disk forensic images and verify them with cryptographic hashes"]
    answerIndex: 3
    explanation: "Forensic image capture with hash verification preserves evidence integrity for investigation and legal defensibility. Reimaging before evidence collection can destroy critical artifacts needed to identify attacker techniques and prevent recurrence."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final", "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"]
    author: "ThanhNguyxn"
  - id: "sec701-management-001"
    difficulty: "easy"
    tags: ["governance", "policies-standards", "documentation"]
    question: "An organization mandates that all production databases must use AES-256 encryption and MFA for administrative access. Which governance document type is this requirement most likely part of?"
    choices: ["A. Standard", "B. Procedure", "C. Guideline", "D. Runbook"]
    answerIndex: 0
    explanation: "A standard defines mandatory and measurable requirements that systems must meet across the organization. A procedure explains how to perform a task, not what enterprise-wide requirement must be met."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-management-002"
    difficulty: "easy"
    tags: ["risk-management", "risk-tolerance", "governance"]
    question: "The steering committee states that payment platform downtime must not exceed 30 minutes per quarter. Which risk concept does this statement best represent?"
    choices: ["A. Risk appetite", "B. Risk tolerance", "C. Inherent risk", "D. Risk transference"]
    answerIndex: 1
    explanation: "Risk tolerance is a specific, quantified threshold for acceptable deviation or loss. Risk appetite is broader and expresses the overall level of risk an organization is willing to pursue or retain."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-management-003"
    difficulty: "medium"
    tags: ["risk-assessment", "quantitative-risk", "ale"]
    question: "A risk analyst calculates a single loss expectancy (SLE) of 80000 USD for a data breach scenario and an annual rate of occurrence (ARO) of 0.25. What is the annualized loss expectancy (ALE)?"
    choices: ["A. 320000 USD", "B. 80000 USD", "C. 20000 USD", "D. 0.05 USD"]
    answerIndex: 2
    explanation: "ALE is computed as SLE multiplied by ARO, so 80000 x 0.25 equals 20000 USD. The 80000 USD option is only the single event loss and does not account for expected frequency."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final", "https://www.comptia.org/certifications/security"]
    author: "ThanhNguyxn"
  - id: "sec701-management-004"
    difficulty: "medium"
    tags: ["third-party-risk", "vendor-assessment", "compliance"]
    question: "Before onboarding a payroll SaaS provider, which artifact provides the strongest independent evidence that security controls operated effectively over a period of time?"
    choices: ["A. Vendor marketing one-pager", "B. Uptime SLA statement", "C. Self-attested security questionnaire", "D. SOC 2 Type II report"]
    answerIndex: 3
    explanation: "A SOC 2 Type II report includes independent auditor testing of control effectiveness over time, which is stronger than self-assertions. A self-attested questionnaire can support due diligence, but it lacks the same independent assurance."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final", "https://www.cisa.gov/topics/cybersecurity-best-practices"]
    author: "ThanhNguyxn"
  - id: "sec701-management-005"
    difficulty: "hard"
    tags: ["pci-dss", "compliance", "data-protection", "scope-reduction"]
    question: "A retailer wants to reduce PCI-DSS exposure while still processing card payments. Which strategy is most effective?"
    choices: ["A. Use tokenization with strong segmentation of the cardholder data environment", "B. Copy full card data into a central analytics data lake", "C. Store PAN values in plaintext for faster troubleshooting", "D. Rely only on annual security awareness training"]
    answerIndex: 0
    explanation: "Tokenization and strict segmentation reduce where cardholder data exists and can significantly limit PCI-DSS scope. Centralizing full card data in a broad analytics platform increases exposure and expands compliance burden."
    refs: ["https://www.comptia.org/certifications/security", "https://www.nist.gov/cyberframework"]
    author: "ThanhNguyxn"
  - id: "sec701-management-006"
    difficulty: "hard"
    tags: ["risk-register", "prioritization", "gdpr", "governance"]
    question: "An organization has a low tolerance for regulatory penalties. Which risk register entry should be prioritized for immediate treatment?"
    choices: ["A. Rare outage of an internal wiki causing minor productivity loss", "B. Moderate likelihood of GDPR noncompliance due missing retention controls for EU customer data", "C. Frequent office printer malfunctions", "D. Delayed rollout of a noncritical employee portal theme"]
    answerIndex: 1
    explanation: "Given low tolerance for regulatory exposure, a likely GDPR control gap with potentially severe fines should be addressed first. Printer and wiki issues may affect operations, but they do not present comparable regulatory consequences."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final", "https://www.nist.gov/cyberframework"]
    author: "ThanhNguyxn"

  - id: "sec701-extra-001"
    difficulty: "easy"
    tags: ["tls", "certificates", "pki", "web-security"]
    question: "A user reports that a company web portal suddenly shows a browser warning: 'certificate not trusted'. The URL and hostname are correct. What is the best first verification step?"
    choices: ["A. Check the server certificate chain and expiration, including intermediate CA certificates", "B. Disable TLS and fall back to HTTP temporarily", "C. Force users to clear browser cookies to refresh trust settings", "D. Replace the website password policy with longer passwords"]
    answerIndex: 0
    explanation: "A trust warning commonly occurs when the certificate is expired, issued to the wrong subject, or missing intermediate certificates needed to build a chain to a trusted root. Disabling TLS would expose credentials and data in transit, and cookie clearing does not fix certificate validation."
    refs: ["https://www.rfc-editor.org/rfc/rfc5280"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-002"
    difficulty: "easy"
    tags: ["hashing", "passwords", "cryptography"]
    question: "A developer suggests storing user passwords encrypted with AES so they can be decrypted for support calls. What is the best security correction?"
    choices: ["A. Store passwords using a slow salted hash function instead of reversible encryption", "B. Encrypt passwords with RSA using the application's public key", "C. Base64-encode passwords to protect them at rest", "D. Compress passwords before storing to reduce database size"]
    answerIndex: 0
    explanation: "Passwords should be stored as salted hashes using a password hashing scheme so the original value cannot be recovered, reducing impact of database compromise. Reversible encryption enables decryption if keys are exposed, and Base64 is not encryption at all."
    refs: ["https://pages.nist.gov/800-63-3/sp800-63b.html"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-003"
    difficulty: "easy"
    tags: ["pki", "certificate-revocation", "ocsp", "tls"]
    question: "A client must ensure it does not accept a server certificate that was revoked after key compromise. Which PKI mechanism provides near-real-time revocation checking?"
    choices: ["A. OCSP", "B. ECDH", "C. AES-GCM", "D. Diffie-Hellman group selection"]
    answerIndex: 0
    explanation: "OCSP allows a client to query a responder about the revocation status of a specific certificate, enabling timely checking. ECDH and AES-GCM are cryptographic algorithms used in key exchange and encryption, not revocation status validation."
    refs: ["https://www.rfc-editor.org/rfc/rfc6960"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-004"
    difficulty: "easy"
    tags: ["incident-response", "containment", "operations"]
    question: "During an incident, analysts confirm an attacker is actively using a compromised VPN account. The priority is to stop further access immediately while preserving evidence. Which action best fits the containment goal?"
    choices: ["A. Disable the compromised account and revoke active sessions", "B. Rebuild all affected servers before collecting logs", "C. Publish a press release to notify customers", "D. Perform a full lessons-learned meeting immediately"]
    answerIndex: 0
    explanation: "Containment focuses on limiting damage and stopping the attacker from continuing, so disabling the account and revoking sessions is an appropriate immediate step. Rebuilding systems too early can destroy evidence, and lessons learned occurs after eradication and recovery."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-005"
    difficulty: "easy"
    tags: ["iot-security", "segmentation", "network-security"]
    question: "A manufacturing plant adds smart sensors that cannot run endpoint protection and have weak patch support. Which control most directly reduces risk from compromise?"
    choices: ["A. Place the IoT devices in a dedicated network segment with strict allowlist rules", "B. Increase user password complexity on the HR portal", "C. Disable backups to prevent data exfiltration", "D. Allow sensors to access the internet freely for vendor updates"]
    answerIndex: 0
    explanation: "Network segmentation with allowlisted communications limits IoT device reachability and reduces lateral movement if a sensor is compromised. HR password policy changes do not address the sensors' network exposure, and disabling backups increases recovery risk."
    refs: ["https://csrc.nist.gov/publications/detail/nistir/8259a/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-006"
    difficulty: "easy"
    tags: ["social-engineering", "pretexting", "awareness"]
    question: "A caller claims to be a new vendor technician and pressures the receptionist to provide a floor plan and badge procedures for an urgent repair. What social engineering technique is being used?"
    choices: ["A. Pretexting", "B. Tailgating", "C. Shoulder surfing", "D. Dumpster diving"]
    answerIndex: 0
    explanation: "Pretexting uses a fabricated story to build credibility and extract information, which matches an 'urgent technician' narrative. Tailgating involves physically following someone into a restricted area, not eliciting details by phone."
    refs: ["https://www.cisa.gov/resources-tools/resources/avoiding-social-engineering-and-phishing-attacks"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-007"
    difficulty: "easy"
    tags: ["cloud-security", "shared-responsibility", "iaas"]
    question: "A team runs workloads on an IaaS VM platform. Who is typically responsible for patching the guest operating system inside the VM?"
    choices: ["A. The customer", "B. The cloud provider", "C. The ISP", "D. The hypervisor vendor only"]
    answerIndex: 0
    explanation: "In IaaS, customers usually manage the guest OS and applications, including patching and hardening. The provider manages underlying physical infrastructure and the hypervisor, but it does not patch the customer's OS by default."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-144/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-008"
    difficulty: "medium"
    tags: ["tls", "pki", "mutual-tls", "authentication"]
    question: "A financial API must authenticate both the client and the server using certificates during the TLS handshake. Which configuration best meets this requirement?"
    choices: ["A. Mutual TLS (mTLS) with client certificate authentication", "B. TLS with server-only certificates and HTTP Basic Auth for clients", "C. IP allowlisting only with no TLS", "D. SSH port forwarding without TLS"]
    answerIndex: 0
    explanation: "mTLS requires clients to present certificates and prove possession of the private key, providing strong mutual authentication. Basic Auth can be phished or reused and does not provide certificate-based client identity at the transport layer."
    refs: ["https://datatracker.ietf.org/doc/html/rfc8446"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-009"
    difficulty: "medium"
    tags: ["hashing", "passwords", "salting", "credential-security"]
    question: "After a breach, analysts discover the password database used SHA-256 without salts, enabling fast cracking. Which improvement most directly slows offline cracking and prevents identical-hash lookups?"
    choices: ["A. Add a unique per-user salt and use a password hashing function with cost", "B. Switch from SHA-256 to MD5 for compatibility", "C. Encrypt the hashes with a single shared AES key", "D. Store the hashes in a different table name"]
    answerIndex: 0
    explanation: "A unique salt defeats precomputed tables and identical-hash comparisons, and a purpose-built password hashing scheme increases computation cost for attackers. MD5 is weaker, and encrypting hashes with one key creates a single point of compromise without addressing hashing speed."
    refs: ["https://pages.nist.gov/800-63-3/sp800-63b.html"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-010"
    difficulty: "medium"
    tags: ["incident-response", "communications", "legal", "breach-response"]
    question: "A breach involves potential exposure of regulated customer data. The incident commander wants to avoid accidental admissions and preserve privilege while coordinating communications. Which action is most appropriate early in the response?"
    choices: ["A. Engage legal counsel and establish an approved communications plan before broad external statements", "B. Instruct engineers to post technical details on social media for transparency", "C. Immediately wipe affected systems to prevent further data access", "D. Disable all logging to avoid collecting sensitive information"]
    answerIndex: 0
    explanation: "Early legal involvement helps guide notification obligations and supports controlled communications that reduce risk of inconsistent statements. Wiping systems and disabling logging can destroy evidence and reduce visibility needed for containment and scope determination."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-011"
    difficulty: "medium"
    tags: ["digital-forensics", "incident-response", "evidence", "volatile-memory"]
    question: "A suspected memory-resident malware infection is active on a server. You need the best chance to capture in-memory indicators without altering the system more than necessary. What should you do first?"
    choices: ["A. Acquire volatile memory (RAM) before powering down or reimaging", "B. Reboot the server to clear malware and then collect logs", "C. Run disk defragmentation to consolidate files for imaging", "D. Delete suspicious executables to prevent reinfection"]
    answerIndex: 0
    explanation: "Volatile memory contains processes, network connections, and injected code that will be lost on reboot or shutdown, so RAM capture should be prioritized when memory-resident malware is suspected. Rebooting can destroy exactly the evidence needed to understand attacker behavior and persistence."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-86/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-012"
    difficulty: "medium"
    tags: ["cloud-security", "cspm", "casb", "security-tools"]
    question: "Security wants continuous detection of risky cloud configuration changes like public storage buckets and overly permissive IAM policies across multiple accounts. Which tool category best matches this need?"
    choices: ["A. Cloud Security Posture Management (CSPM)", "B. Data Loss Prevention (DLP) for endpoints only", "C. Intrusion Prevention System (IPS) for the office LAN", "D. Full disk encryption on laptops"]
    answerIndex: 0
    explanation: "CSPM focuses on identifying and alerting on cloud misconfigurations and posture drift across accounts, which directly fits bucket exposure and IAM policy issues. Endpoint DLP and disk encryption do not analyze cloud control-plane configurations."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-013"
    difficulty: "medium"
    tags: ["zero-trust", "microsegmentation", "least-privilege"]
    question: "A company is moving from a flat internal network to Zero Trust. They want to reduce implicit trust between application tiers and enforce per-workload access. Which design change best supports this?"
    choices: ["A. Microsegment workloads and enforce identity- and context-based policies for east-west traffic", "B. Increase the number of shared admin accounts to simplify access", "C. Allow any internal IP to reach database ports because it is 'inside'", "D. Disable device posture checks to reduce friction"]
    answerIndex: 0
    explanation: "Zero Trust emphasizes least privilege and explicit verification, and microsegmentation reduces lateral movement by limiting who can talk to what. Shared admin accounts and broad internal allow rules increase blast radius and undermine identity-based access."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-207/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-014"
    difficulty: "medium"
    tags: ["iot-security", "firmware", "supply-chain", "integrity"]
    question: "A fleet of IoT gateways receives firmware updates over the internet. Security wants to ensure devices install only vendor-approved firmware and can detect tampering. What control best achieves this?"
    choices: ["A. Digitally sign firmware updates and verify signatures on-device before installation", "B. Encrypt firmware files with a hardcoded symmetric key shared by all devices", "C. Disable firmware updates entirely to eliminate change", "D. Rely on DNS caching to prevent malicious update domains"]
    answerIndex: 0
    explanation: "Digital signatures provide integrity and authenticity for firmware, allowing the device to reject modified or untrusted images. A hardcoded shared key is a single point of failure, and disabling updates increases long-term vulnerability exposure."
    refs: ["https://csrc.nist.gov/publications/detail/nistir/8259a/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-015"
    difficulty: "hard"
    tags: ["pki", "certificates", "mutual-tls", "troubleshooting"]
    question: "A service-to-service API uses mTLS. After issuing new client certificates, handshakes fail with 'bad certificate' on the server. The CA is trusted and the cert is not expired. What is the most likely certificate-related cause?"
    choices: ["A. The client certificate is missing the Client Authentication extended key usage (EKU)", "B. The client used AES-256 instead of AES-128", "C. The server supports only HTTP/1.1 and the client used HTTP/2", "D. The certificate subject contains too many organizational units"]
    answerIndex: 0
    explanation: "Many TLS stacks validate that a presented client certificate is permitted for client authentication via EKU, and missing or incorrect EKU can cause handshake rejection. Cipher strength and HTTP versions occur at different layers and do not usually produce a certificate usage validation error."
    refs: ["https://www.rfc-editor.org/rfc/rfc5280"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-016"
    difficulty: "hard"
    tags: ["tls", "downgrade", "web-security", "hardening"]
    question: "A penetration test shows clients can be downgraded to legacy TLS versions when connecting to an internal web app, increasing exposure to known weaknesses. Which remediation is most effective?"
    choices: ["A. Disable legacy protocols/cipher suites on the server and enforce modern TLS versions", "B. Increase the RSA key length on the existing legacy TLS configuration only", "C. Add a new DNS CNAME record for the application", "D. Turn off certificate validation on clients to prevent connection failures"]
    answerIndex: 0
    explanation: "Preventing downgrade requires disabling obsolete protocol versions and weak cipher suites so negotiation cannot fall back to insecure options. Increasing key length alone does not fix protocol-level weaknesses, and disabling validation makes active man-in-the-middle attacks easier."
    refs: ["https://datatracker.ietf.org/doc/html/rfc8446"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-017"
    difficulty: "hard"
    tags: ["digital-forensics", "evidence", "integrity", "disk-imaging"]
    question: "An investigator must create a forensic disk image from a suspect workstation in a way that is defensible in court. Which approach is best?"
    choices: ["A. Use a hardware write blocker, create a bit-for-bit image, and verify integrity with cryptographic hashes", "B. Copy only the user's Documents folder to a USB drive to save time", "C. Boot into the installed OS and run cleanup utilities before imaging", "D. Capture screenshots of file listings as the primary evidence"]
    answerIndex: 0
    explanation: "Write blockers prevent modification of source media, and hash-verified bit-for-bit imaging preserves integrity and completeness for forensic analysis. Copying selected files or altering the OS before imaging can omit artifacts and weaken evidence credibility."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-86/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-018"
    difficulty: "hard"
    tags: ["cloud-security", "zero-trust", "identity", "conditional-access"]
    question: "A SaaS app uses SSO and must allow access only from managed devices that meet a security posture baseline. Users should be blocked even with valid passwords if the device is noncompliant. Which control best enforces this?"
    choices: ["A. Identity provider conditional access policies using device compliance signals", "B. Static IP allowlisting for all employee home networks", "C. Disabling MFA to reduce login failures on mobile devices", "D. Encrypting the SaaS database with a longer key"]
    answerIndex: 0
    explanation: "Conditional access at the IdP can evaluate device compliance and context at authentication time and deny access for noncompliant devices, aligning with Zero Trust principles. IP allowlisting is brittle for roaming users and does not validate device posture."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-207/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-019"
    difficulty: "hard"
    tags: ["incident-response", "ransomware", "forensics", "logging"]
    question: "After containing ransomware, leadership demands rapid restoration. The IR lead also wants to prevent reinfection and understand initial access. Which action best balances speed with long-term risk reduction?"
    choices: ["A. Preserve key evidence (images/logs) and determine initial access vector before broad restoration, then restore from known-good backups", "B. Immediately restore all systems from the newest backups without validating them", "C. Pay the ransom to ensure decryptors work before investigating", "D. Disable EDR to avoid performance impact during restoration"]
    answerIndex: 0
    explanation: "Collecting evidence and identifying initial access reduces the chance of restoring into an environment where attackers still have access, while restoring from validated known-good backups supports recovery. Restoring unvalidated backups or disabling EDR can reintroduce malware and remove detection during a high-risk period."
    refs: ["https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"]
    author: "ThanhNguyxn"
  - id: "sec701-extra-020"
    difficulty: "hard"
    tags: ["social-engineering", "email-security", "bec", "dmarc"]
    question: "A finance team is targeted by business email compromise (BEC) using spoofed executive email addresses. Which control most directly helps receiving mail systems reject unauthenticated spoofed messages?"
    choices: ["A. Implement DMARC with alignment, backed by SPF and DKIM", "B. Disable all external email to the finance distribution list", "C. Use HTTP instead of HTTPS for the email portal", "D. Replace MFA with security questions for convenience"]
    answerIndex: 0
    explanation: "DMARC builds on SPF and DKIM to let domain owners publish policies that help receivers detect and reject spoofed messages. Disabling external email is operationally disruptive and does not address authentication, while weakening MFA reduces account security and can worsen BEC risk."
    refs: ["https://datatracker.ietf.org/doc/html/rfc7489"]
    author: "ThanhNguyxn"

  # ── Security+ Expansion: 70 new questions (sec701-expand-001 → sec701-expand-070) ──

  # Domain 1: Threats, Attacks, and Vulnerabilities (~15 questions)
  - id: "sec701-expand-001"
    difficulty: "easy"
    tags: ["threats", "malware", "ransomware"]
    question: "A user opens an email attachment and all files on their workstation become encrypted with a demand for cryptocurrency payment. What type of malware is this?"
    choices:
      - "A. Ransomware"
      - "B. Spyware"
      - "C. Adware"
      - "D. Rootkit"
    answerIndex: 0
    explanation: >-
      Ransomware encrypts victim files and demands payment for the decryption key. Spyware (B) secretly monitors user activity. Adware (C) displays unwanted advertisements. Rootkits (D) hide malicious processes at a deep system level.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-83/rev-1/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-002"
    difficulty: "medium"
    tags: ["threats", "social-engineering", "phishing"]
    question: "An attacker researches a specific executive on LinkedIn and crafts a personalized email pretending to be from their golf club. What type of attack is this?"
    choices:
      - "A. Spear phishing"
      - "B. Vishing"
      - "C. Watering hole attack"
      - "D. Pharming"
    answerIndex: 0
    explanation: >-
      Spear phishing targets specific individuals using personalized information gathered through reconnaissance. Vishing (B) uses voice calls. Watering hole (C) compromises websites the target frequents. Pharming (D) redirects DNS to malicious sites.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-003"
    difficulty: "hard"
    tags: ["threats", "attacks", "supply-chain"]
    question: "An attacker compromises a software vendor's build pipeline and injects malicious code into a legitimate update. Thousands of customers install the tainted update. What type of attack is this?"
    choices:
      - "A. Supply chain attack"
      - "B. On-path (man-in-the-middle) attack"
      - "C. Brute force attack"
      - "D. Denial of service attack"
    answerIndex: 0
    explanation: >-
      A supply chain attack compromises a trusted vendor or supplier to distribute malicious code to downstream customers. This differs from MitM (B) which intercepts communications in transit. Brute force (C) systematically guesses credentials. DoS (D) disrupts service availability.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-004"
    difficulty: "easy"
    tags: ["threats", "vulnerabilities", "cve"]
    question: "What does a CVE identifier represent?"
    choices:
      - "A. A unique identifier for a publicly known cybersecurity vulnerability"
      - "B. A rating of how critical a vulnerability is"
      - "C. A vendor-specific patch number"
      - "D. An encryption algorithm classification"
    answerIndex: 0
    explanation: >-
      CVE (Common Vulnerabilities and Exposures) provides unique identifiers for publicly disclosed security vulnerabilities. CVSS provides severity ratings (B). Patch numbers (C) are vendor-specific. CVE does not relate to encryption algorithms (D).
    refs:
      - "https://cve.mitre.org/"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-005"
    difficulty: "medium"
    tags: ["threats", "attacks", "password"]
    question: "An attacker uses a pre-computed table of hash-to-plaintext mappings to crack stolen password hashes. What is this attack called?"
    choices:
      - "A. Rainbow table attack"
      - "B. Dictionary attack"
      - "C. Credential stuffing"
      - "D. Pass-the-hash attack"
    answerIndex: 0
    explanation: >-
      Rainbow tables contain pre-computed hash chains that map hashes back to plaintext passwords. Dictionary attacks (B) try words from a list. Credential stuffing (C) uses breached username/password pairs across multiple sites. Pass-the-hash (D) uses captured hash directly for authentication without cracking it.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-63b/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-006"
    difficulty: "hard"
    tags: ["threats", "attacks", "xss"]
    question: "A web application stores user-submitted comments without sanitization. When other users view the comments, malicious JavaScript executes in their browsers. What type of XSS is this?"
    choices:
      - "A. Stored (persistent) XSS"
      - "B. Reflected XSS"
      - "C. DOM-based XSS"
      - "D. Server-side request forgery"
    answerIndex: 0
    explanation: >-
      Stored XSS persists the malicious script on the server (in a database), executing it whenever users view the affected content. Reflected XSS (B) requires the victim to click a crafted link. DOM-based XSS (C) manipulates the client-side DOM without server involvement. SSRF (D) tricks the server into making requests to internal resources.
    refs:
      - "https://owasp.org/www-community/attacks/xss/"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-007"
    difficulty: "easy"
    tags: ["threats", "threat-actors", "apt"]
    question: "Which threat actor type is MOST likely to have nation-state funding, advanced capabilities, and long-term strategic objectives?"
    choices:
      - "A. Advanced Persistent Threat (APT)"
      - "B. Script kiddie"
      - "C. Hacktivist"
      - "D. Insider threat (disgruntled employee)"
    answerIndex: 0
    explanation: >-
      APTs are typically nation-state sponsored groups with significant resources, sophisticated tools, and long-term espionage or sabotage goals. Script kiddies (B) use pre-made tools with limited skill. Hacktivists (C) are ideologically motivated. Insider threats (D) are individuals within the organization.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://attack.mitre.org/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-008"
    difficulty: "medium"
    tags: ["threats", "attacks", "dns"]
    question: "An attacker modifies the local hosts file on a victim's computer to redirect a banking website to a fake site. What type of attack is this?"
    choices:
      - "A. Pharming"
      - "B. Phishing"
      - "C. Vishing"
      - "D. Typosquatting"
    answerIndex: 0
    explanation: >-
      Pharming redirects users to fraudulent websites by manipulating DNS resolution, including modifying local hosts files or poisoning DNS caches. Phishing (B) uses deceptive emails. Vishing (C) uses phone calls. Typosquatting (D) registers misspelled domain names.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-009"
    difficulty: "hard"
    tags: ["threats", "attacks", "injection"]
    question: "A penetration tester discovers that a web application passes unsanitized input to an operating system command. What vulnerability is this?"
    choices:
      - "A. Command injection (OS injection)"
      - "B. SQL injection"
      - "C. LDAP injection"
      - "D. XML external entity (XXE) injection"
    answerIndex: 0
    explanation: >-
      Command injection occurs when user input is passed directly to operating system commands, allowing the attacker to execute arbitrary commands. SQL injection (B) targets database queries. LDAP injection (C) targets directory service queries. XXE (D) exploits XML parser features to access files or make server-side requests.
    refs:
      - "https://owasp.org/www-community/attacks/Command_Injection"
      - "https://www.comptia.org/certifications/security"
    author: "ThanhNguyxn"

  - id: "sec701-expand-010"
    difficulty: "medium"
    tags: ["threats", "indicators", "ioc"]
    question: "A security analyst observes unusual outbound traffic to a foreign IP address at 3 AM from a server that normally has no internet access. What is this an example of?"
    choices:
      - "A. An indicator of compromise (IoC)"
      - "B. A routine backup operation"
      - "C. A software update check"
      - "D. Normal network scanning"
    answerIndex: 0
    explanation: >-
      Unexpected outbound traffic from a restricted server to an unknown external IP is a strong indicator of compromise, suggesting possible data exfiltration or command-and-control communication. Backups (B) and updates (C) use known, authorized destinations. Network scanning (D) is typically internal and authorized.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-011"
    difficulty: "easy"
    tags: ["threats", "malware", "trojan"]
    question: "A user downloads what appears to be a free game, but it secretly installs a keylogger. What type of malware is this?"
    choices:
      - "A. Trojan horse"
      - "B. Worm"
      - "C. Logic bomb"
      - "D. Fileless malware"
    answerIndex: 0
    explanation: >-
      A Trojan horse disguises itself as legitimate software while carrying a malicious payload. Worms (B) self-replicate across networks. Logic bombs (C) trigger based on specific conditions. Fileless malware (D) operates entirely in memory without writing to disk.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/detail/sp/800-83/rev-1/final"
    author: "ThanhNguyxn"

  - id: "sec701-expand-012"
    difficulty: "hard"
    tags: ["threats", "attacks", "privilege-escalation"]
    question: "An attacker gains initial access as a low-privilege user and exploits a kernel vulnerability to obtain root access. What type of attack is this?"
    choices:
      - "A. Vertical privilege escalation"
      - "B. Horizontal privilege escalation"
      - "C. Directory traversal"
      - "D. Session hijacking"
    answerIndex: 0
    explanation: >-
      Vertical privilege escalation involves gaining higher privilege levels (e.g., user to root/admin). Horizontal escalation (B) accesses resources of another user at the same privilege level. Directory traversal (C) accesses files outside intended directories. Session hijacking (D) takes over an authenticated session.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://attack.mitre.org/tactics/TA0004/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-013"
    difficulty: "medium"
    tags: ["threats", "attacks", "wireless"]
    question: "An attacker sets up a rogue access point with the same SSID as the corporate Wi-Fi near the office building. What is this attack called?"
    choices:
      - "A. Evil twin attack"
      - "B. Bluesnarfing"
      - "C. Deauthentication attack"
      - "D. War driving"
    answerIndex: 0
    explanation: >-
      An evil twin creates a fake access point mimicking a legitimate network to intercept traffic from connecting users. Bluesnarfing (B) steals data via Bluetooth. Deauthentication (C) forces clients to disconnect from legitimate APs. War driving (D) is passively scanning for wireless networks.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-014"
    difficulty: "easy"
    tags: ["threats", "vulnerabilities", "zero-day"]
    question: "What makes a zero-day vulnerability particularly dangerous?"
    choices:
      - "A. No patch or fix is available because the vendor is unaware of the vulnerability"
      - "B. It only affects systems that are zero days old"
      - "C. It requires zero user interaction to exploit"
      - "D. It can only be exploited on the day it is discovered"
    answerIndex: 0
    explanation: >-
      A zero-day vulnerability has no available patch because the vendor has not yet been notified or had time to develop a fix. The name refers to the vendor having 'zero days' to fix the issue. It does not relate to system age (B), user interaction requirements (C), or a specific exploitation window (D).
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://cve.mitre.org/"
    author: "ThanhNguyxn"

  - id: "sec701-expand-015"
    difficulty: "hard"
    tags: ["threats", "attacks", "cryptographic"]
    question: "An attacker intercepts encrypted traffic and stores it, planning to decrypt it later when quantum computers become available. What is this attack strategy called?"
    choices:
      - "A. Harvest now, decrypt later"
      - "B. Replay attack"
      - "C. Downgrade attack"
      - "D. Birthday attack"
    answerIndex: 0
    explanation: >-
      Harvest now, decrypt later (also called 'store now, decrypt later') involves capturing encrypted data today with the expectation of breaking the encryption with future quantum computing capabilities. Replay (B) retransmits valid messages. Downgrade (C) forces weaker encryption. Birthday attacks (D) exploit hash collision probability.
    refs:
      - "https://www.comptia.org/certifications/security"
      - "https://csrc.nist.gov/projects/post-quantum-cryptography"
    author: "ThanhNguyxn"

  # Domain 2: Architecture and Design (~15 questions)
  - id: "sec701-expand-016"
    difficulty: "easy"
