      - "B. RAID 0"
      - "C. RAID 5"
      - "D. RAID 6"
    answerIndex: 0
    explanation: >-
      RAID 1 mirrors data across two or more disks, providing full redundancy. RAID 0 (B) stripes data for performance but offers no redundancy. RAID 5 (C) uses distributed parity. RAID 6 (D) uses double parity for tolerance of two simultaneous disk failures.
