  - id: "sec701-expand-035"
    difficulty: "medium"
    tags: ["implementation", "endpoint", "edr"]
    question: "How does EDR (Endpoint Detection and Response) differ from traditional antivirus?"
    choices:
      - "A. EDR continuously monitors endpoint activity and provides investigation capabilities, while traditional AV primarily uses signature-based detection"
      - "B. EDR only runs during business hours"
      - "C. Traditional AV provides better detection of zero-day threats"
      - "D. EDR replaces the need for network security controls"
    answerIndex: 0
    explanation: >-
      EDR provides continuous monitoring, behavioral analysis, threat hunting, and forensic investigation capabilities beyond signature-based detection. Traditional AV primarily matches known malware signatures. EDR runs continuously (B). Traditional AV is weaker against zero-days (C). Network controls are still needed alongside EDR (D).
