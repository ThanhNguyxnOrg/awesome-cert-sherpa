  - id: "cissp-expand-049"
    difficulty: "easy"
    tags: ["domain6", "assessment", "audit"]
    question: "What is the PRIMARY purpose of a SOC 2 Type II report?"
    choices:
      - "A. To evaluate the operating effectiveness of controls over a specified period of time"
      - "B. To certify that an organization is compliant with all regulations"
      - "C. To test for specific technical vulnerabilities in software"
      - "D. To evaluate controls at a single point in time only"
    answerIndex: 0
    explanation: >-
      SOC 2 Type II evaluates the design and operating effectiveness of controls over a period (typically 6-12 months). Type I (D) evaluates at a point in time. SOC reports provide assurance but are not compliance certifications (B). Vulnerability testing (C) is a separate activity.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://www.aicpa.org/topic/audit-assurance/audit-and-assurance-greater-than-soc-2"
