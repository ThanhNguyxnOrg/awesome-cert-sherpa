  - id: "cissp-expand-050"
    difficulty: "medium"
    tags: ["domain6", "testing", "code-review"]
    question: "Which software testing approach examines source code without executing the program?"
    choices:
      - "A. Static Application Security Testing (SAST)"
      - "B. Dynamic Application Security Testing (DAST)"
      - "C. Penetration testing"
      - "D. Fuzz testing"
    answerIndex: 0
    explanation: >-
      SAST analyzes source code, bytecode, or binary code without execution, finding vulnerabilities like SQL injection patterns and buffer overflows. DAST (B) tests running applications. Penetration testing (C) tests deployed systems. Fuzz testing (D) sends random inputs to running applications.
    refs:
      - "https://owasp.org/www-community/Source_Code_Analysis_Tools"
      - "https://www.isc2.org/certifications/cissp"
