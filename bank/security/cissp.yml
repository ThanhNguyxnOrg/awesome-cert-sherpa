meta:
  category: "security"
  cert: "CISSP"
  vendor: "ISC2"
  version: 1
  description: "Original practice questions for ISC2 Certified Information Systems Security Professional (CISSP)"
questions:
  - id: "cissp-risk-001"
    difficulty: "easy"
    tags: ["domain1", "risk", "governance", "policy"]
    question: "A regulated company is rolling out a new cloud-based HR system. Several teams want to start using it immediately, but security policies have not been updated to cover cloud data handling. As the security manager, what is the BEST first step?"
    choices:
      - "A. Update the information security policy and supporting standards to address cloud data handling requirements"
      - "B. Deploy a CASB immediately to block all risky cloud activity"
      - "C. Start with penetration testing to find technical weaknesses before updating policies"
      - "D. Allow use and rely on after-the-fact monitoring to detect issues"
    answerIndex: 0
    explanation: >-
      Updating policy and standards establishes governance and defines acceptable behavior before broad adoption, which is management-aligned and scalable. It also enables consistent decisions for data classification, retention, and vendor controls across teams. A CASB can be helpful, but deploying tooling (B) without defined requirements and rules often results in inconsistent enforcement and gaps.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-risk-002"
    difficulty: "medium"
    tags: ["domain1", "risk", "third-party", "contracts"]
    question: "A critical SaaS provider reports a breach that may have exposed your customer data. Legal asks what contract element most directly enables you to verify the provider's controls and response. What should you point to?"
    choices:
      - "A. A right-to-audit clause and defined incident notification timelines"
      - "B. A requirement that the provider uses encryption"
      - "C. A statement that the provider is 'industry compliant'"
      - "D. A service credit clause for downtime"
    answerIndex: 0
    explanation: >-
      A right-to-audit (or independent assessment reporting) and explicit notification timelines provide enforceable mechanisms to verify controls and ensure timely response coordination. Encryption requirements (B) are important but do not, by themselves, grant visibility into whether controls were implemented correctly or how the incident was handled. Service credits (D) address availability and finances, not assurance of security controls.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-risk-003"
    difficulty: "hard"
    tags: ["domain1", "risk", "risk-treatment", "metrics"]
    question: "An enterprise risk committee asks you to justify funding for a new security control by showing it reduces risk in a measurable way. Which approach BEST aligns with effective risk communication at the executive level?"
    choices:
      - "A. Quantify expected risk reduction by comparing current and residual risk using a consistent method and assumptions"
      - "B. Present a detailed list of vulnerabilities discovered in the last scan"
      - "C. Share tool performance benchmarks and throughput metrics"
      - "D. Emphasize that similar companies use the control so it must be necessary"
    answerIndex: 0
    explanation: >-
      Executives need a consistent view of current versus residual risk, including assumptions and uncertainty, to make investment decisions. Vulnerability lists (B) are operationally useful but do not translate directly into business impact or risk reduction without context. Peer comparison (D) can inform decisions but is not evidence of risk reduction for your environment.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-risk-004"
    difficulty: "easy"
    tags: ["domain1", "risk", "ethics", "compliance"]
    question: "During a compliance audit, a manager asks you to 'adjust' evidence to avoid a finding because remediation is already planned. What is the MOST appropriate response?"
    choices:
      - "A. Refuse and escalate through appropriate channels because falsifying audit evidence violates ethics and governance"
      - "B. Adjust the evidence but document the plan to remediate later"
      - "C. Delay providing evidence until remediation is complete"
      - "D. Provide only partial evidence to reduce the auditor's scope"
    answerIndex: 0
    explanation: >-
      Integrity of audit evidence is fundamental to governance and professional ethics, so refusing and escalating is the correct management action. Documenting a remediation plan is appropriate, but it does not justify altering evidence (B). Delaying or limiting evidence (C, D) undermines the audit and increases organizational risk.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-asset-001"
    difficulty: "easy"
    tags: ["domain2", "asset", "data-classification", "handling"]
    question: "A business unit wants to email monthly sales forecasts to an external partner. The data is sensitive but not regulated. What is the BEST control to decide allowable handling and transmission requirements?"
    choices:
      - "A. Apply data classification and map required handling controls to the classification level"
      - "B. Require the partner to sign an NDA and skip technical controls"
      - "C. Block all outbound email attachments by policy"
      - "D. Convert the spreadsheet to PDF to prevent copying"
    answerIndex: 0
    explanation: >-
      Data classification drives consistent handling rules, including approved transmission methods and required protections for a given sensitivity level. An NDA (B) supports accountability but does not provide technical assurance or prevent disclosure. Blocking all attachments (C) is overly restrictive and may not align with business needs.
    refs:
      - "https://www.iso.org/standard/27001"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-asset-002"
    difficulty: "medium"
    tags: ["domain2", "asset", "ownership", "inventory"]
    question: "A company is repeatedly surprised by security incidents involving 'unknown' systems. The CIO asks for a foundational fix that improves accountability across the lifecycle. What should you prioritize?"
    choices:
      - "A. Establish an authoritative asset inventory with assigned asset owners and lifecycle processes"
      - "B. Increase the frequency of vulnerability scanning on known subnets"
      - "C. Deploy an endpoint detection tool to all managed laptops"
      - "D. Require developers to document systems in project wikis"
    answerIndex: 0
    explanation: >-
      An authoritative inventory with clear ownership enables accountability, risk decisions, and consistent onboarding/offboarding of assets. More scanning (B) helps detect issues on known assets but does not solve the root cause of unknown systems and unclear responsibility. Wikis (D) are useful but are not an enforceable, enterprise-wide source of truth.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-asset-003"
    difficulty: "hard"
    tags: ["domain2", "asset", "privacy", "retention"]
    question: "A marketing team wants to retain customer behavioral logs indefinitely 'for future analytics.' There is no clear business owner for the data set. What is the BEST security management action?"
    choices:
      - "A. Require a defined business purpose, assign a data owner, and implement retention/disposal aligned to that purpose"
      - "B. Encrypt the logs at rest and approve indefinite retention"
      - "C. Move the logs to cheaper storage to reduce cost"
      - "D. Mask the logs and allow unlimited collection"
    answerIndex: 0
    explanation: >-
      Retention should be tied to a defined purpose and accountability; assigning a data owner enables decisions about necessity, risk, and disposal. Encryption (B) reduces some exposure but does not address data minimization and governance, so risk may still grow over time. Masking (D) can help, but unlimited collection without purpose still creates unnecessary risk.
    refs:
      - "https://www.iso.org/standard/27001"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-arch-001"
    difficulty: "easy"
    tags: ["domain3", "architecture", "defense-in-depth", "design"]
    question: "A product team proposes relying solely on a web application firewall (WAF) for a new internet-facing portal to meet security goals. As the security architect, what is the BEST response?"
    choices:
      - "A. Require layered controls (secure coding, strong auth, monitoring) because a WAF alone is not sufficient"
      - "B. Approve it because WAFs stop most attacks"
      - "C. Replace the WAF with a next-generation firewall and skip other controls"
      - "D. Delay launch until all legacy applications are retired"
    answerIndex: 0
    explanation: >-
      Defense-in-depth reduces single points of failure, and management-oriented security design expects multiple preventive and detective controls. A WAF can reduce some web attack risk, but it cannot compensate for weak authentication or insecure business logic, making (B) incorrect. Replacing one perimeter tool with another (C) still fails to address application and identity risks.
    refs:
      - "https://owasp.org/"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-arch-002"
    difficulty: "medium"
    tags: ["domain3", "architecture", "crypto", "key-management"]
    question: "A global organization plans to encrypt sensitive database fields and asks how to manage encryption keys to reduce insider risk. Which design is BEST?"
    choices:
      - "A. Centralized key management with separation of duties and strict access controls (e.g., HSM/KMS)"
      - "B. Store keys in the application configuration file alongside the code"
      - "C. Hard-code keys into the database stored procedures"
      - "D. Allow each developer to generate and store their own keys"
    answerIndex: 0
    explanation: >-
      Centralized key management with separation of duties supports consistent policy enforcement, auditing, rotation, and reduced insider risk. Storing keys with code or configs (B) increases the chance of exposure through repositories, backups, or broader access than intended. Developer-managed keys (D) creates inconsistent practices and weak governance.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-arch-003"
    difficulty: "hard"
    tags: ["domain3", "architecture", "resilience", "single-point-of-failure"]
    question: "A security team wants to implement a single centralized authentication service for all applications. Business leadership is concerned about availability impact. What is the BEST architectural guidance?"
    choices:
      - "A. Use centralized authentication but design for high availability and contingency access to avoid a single point of failure"
      - "B. Reject centralization and keep separate credentials for each application"
      - "C. Centralize authentication and accept planned outages during maintenance windows"
      - "D. Replace authentication with IP-based allowlists to reduce complexity"
    answerIndex: 0
    explanation: >-
      Centralization improves governance and access control consistency, but must be engineered for resilience (redundancy, failover, monitored dependencies) to meet availability needs. Keeping separate credentials (B) increases administrative burden and weakens centralized control, creating more risk. IP allowlists (D) do not provide identity assurance and fail in remote and cloud scenarios.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-arch-004"
    difficulty: "easy"
    tags: ["domain3", "architecture", "threat-modeling", "requirements"]
    question: "A program manager asks why security is requesting threat modeling during the design phase rather than after development. What is the BEST justification?"
    choices:
      - "A. Early threat modeling identifies design-level risks and reduces rework cost by influencing requirements before coding"
      - "B. Threat modeling replaces the need for security testing later"
      - "C. Threat modeling is required only for highly classified systems"
      - "D. Threat modeling primarily helps select a coding language"
    answerIndex: 0
    explanation: >-
      Threat modeling early helps shape requirements and architecture to address risks when changes are cheaper and more effective. It does not eliminate the need for security testing (B), because implementation flaws and configuration issues still occur. Limiting it to classified systems (C) misunderstands its value as a general risk management practice.
    refs:
      - "https://owasp.org/"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-net-001"
    difficulty: "easy"
    tags: ["domain4", "network", "segmentation", "least-privilege"]
    question: "A hospital network includes medical devices that cannot be patched quickly. Leadership wants a risk-reducing control that minimizes blast radius without disrupting operations. What is the BEST recommendation?"
    choices:
      - "A. Network segmentation with tightly controlled communications and monitoring for the device network"
      - "B. Disable all network access for the devices and switch to manual processes"
      - "C. Increase Wi-Fi transmit power to reduce connection drops"
      - "D. Allow devices to access the internet directly to receive updates"
    answerIndex: 0
    explanation: >-
      Segmentation limits lateral movement and reduces exposure while allowing required operational communications. Disabling all access (B) is not realistic for clinical operations and may increase patient risk. Direct internet access (D) expands the attack surface and increases risk for hard-to-patch devices.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-net-002"
    difficulty: "medium"
    tags: ["domain4", "network", "vpn", "remote-access"]
    question: "A company expands remote work and needs to ensure confidentiality and integrity of traffic over untrusted networks. What is the BEST management-level control choice?"
    choices:
      - "A. Require secure remote access using strong authentication and encrypted tunnels with defined configuration standards"
      - "B. Allow remote access only during business hours"
      - "C. Rely on employees' home router firewalls for protection"
      - "D. Block all remote access and mandate on-site work"
    answerIndex: 0
    explanation: >-
      Encrypted tunnels and strong authentication provide confidentiality and integrity, while standards ensure consistent secure configurations and oversight. Limiting hours (B) may reduce exposure time but does not protect traffic from interception or tampering. Home routers (C) are inconsistent and not under enterprise control, so they do not meet assurance needs.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-net-003"
    difficulty: "hard"
    tags: ["domain4", "network", "zero-trust", "architecture"]
    question: "An organization is moving to a zero trust strategy. A business leader asks what changes most directly reduce implicit trust inside the corporate network. What is the BEST answer?"
    choices:
      - "A. Enforce continuous verification based on identity, device posture, and least-privilege access to specific resources"
      - "B. Replace internal IP ranges with a new addressing scheme"
      - "C. Increase perimeter firewall rules to block more ports"
      - "D. Require users to change passwords every 30 days"
    answerIndex: 0
    explanation: >-
      Zero trust focuses on eliminating implicit trust by verifying access decisions continuously and scoping access to resources rather than networks. Changing IP schemes (B) is operational and does not change trust assumptions or access decisions. Frequent password rotation (D) may not improve security and can increase risky user behavior if not risk-based.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-net-004"
    difficulty: "medium"
    tags: ["domain4", "network", "dns", "availability"]
    question: "A distributed denial-of-service (DDoS) attack targets your public DNS and intermittently disrupts customer access. Which action is BEST to improve resilience while preserving business availability?"
    choices:
      - "A. Use redundant authoritative DNS providers with DDoS protection and tested failover"
      - "B. Disable DNSSEC to reduce overhead during attacks"
      - "C. Move DNS to a single on-prem server for tighter control"
      - "D. Block all traffic from countries with the highest attack volume"
    answerIndex: 0
    explanation: >-
      Redundancy across providers and DDoS-capable infrastructure improves availability and reduces single points of failure. Disabling DNSSEC (B) may reduce validation overhead but weakens integrity protections and is not a resilience strategy. A single on-prem DNS server (C) increases fragility and is easier to overwhelm.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-iam-001"
    difficulty: "easy"
    tags: ["domain5", "iam", "least-privilege", "provisioning"]
    question: "A new employee joins the finance team. The hiring manager asks for 'full access' to all finance applications to avoid delays. What is the BEST access management approach?"
    choices:
      - "A. Grant role-based access aligned to job duties and require approvals for any exceptions"
      - "B. Grant administrator access temporarily and remove it after the first month"
      - "C. Clone access from a senior employee to ensure the new hire can work"
      - "D. Grant access to everything and rely on monitoring to catch misuse"
    answerIndex: 0
    explanation: >-
      Role-based access supports least privilege and consistent provisioning aligned to business duties, reducing excess access risk. Cloning from a senior employee (C) commonly propagates accumulated privileges and creates segregation-of-duties issues. Relying on monitoring (D) is detective and does not prevent unauthorized actions.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-iam-002"
    difficulty: "medium"
    tags: ["domain5", "iam", "mfa", "risk-based-auth"]
    question: "An executive team complains that multi-factor authentication (MFA) slows them down, and requests an exemption for corporate email. What is the BEST risk-based response?"
    choices:
      - "A. Keep MFA for email and implement adaptive controls (trusted devices, phishing-resistant factors) to reduce friction"
      - "B. Exempt executives because they are trusted employees"
      - "C. Replace MFA with longer passwords to compensate"
      - "D. Disable MFA but increase security awareness training"
    answerIndex: 0
    explanation: >-
      Email is a high-value target, and phishing-resistant or adaptive MFA can maintain strong assurance while improving usability. Trusting a group (B) is not a security control and increases organizational risk because executives are often targeted. Longer passwords and training (C, D) do not provide the same protection against credential replay and phishing.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.nist.gov/identity-access-management"
    author: "ThanhNguyxn"

  - id: "cissp-iam-003"
    difficulty: "hard"
    tags: ["domain5", "iam", "federation", "sso"]
    question: "Your organization adopts single sign-on (SSO) federation for dozens of SaaS apps. A security leader worries about 'one credential to rule them all.' What is the BEST compensating management control?"
    choices:
      - "A. Strengthen the identity provider with phishing-resistant MFA, continuous monitoring, and strong incident response playbooks"
      - "B. Disable SSO and require separate passwords for each SaaS app"
      - "C. Allow password reuse to make separate logins manageable"
      - "D. Require users to change SSO passwords weekly"
    answerIndex: 0
    explanation: >-
      Centralizing identity can improve control, but it concentrates risk, so hardening the identity provider and monitoring for anomalous sign-ins is essential. Disabling SSO (B) often increases password fatigue and weakens governance across apps. Weekly password changes (D) do not address phishing and can increase insecure user behavior.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-iam-004"
    difficulty: "hard"
    tags: ["domain5", "iam", "privileged-access", "pim"]
    question: "A cloud engineering team uses permanent administrative roles for convenience. An internal audit finds excessive standing privilege and poor traceability. What is the BEST remediation plan?"
    choices:
      - "A. Implement privileged access management with just-in-time elevation, approvals, and centralized logging"
      - "B. Require admins to sign an acceptable use policy annually"
      - "C. Move admin accounts to a shared mailbox to simplify management"
      - "D. Keep permanent roles but rotate passwords more frequently"
    answerIndex: 0
    explanation: >-
      Just-in-time privileged access reduces exposure from standing privileges and improves traceability through approvals and centralized audit logs. Policies (B) are important but do not provide technical enforcement or detailed accountability. Shared accounts (C) directly reduce accountability and typically violate audit requirements.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-test-001"
    difficulty: "easy"
    tags: ["domain6", "testing", "audit", "assurance"]
    question: "A security manager needs to demonstrate that access reviews are happening and are effective. What evidence is MOST appropriate for an auditor?"
    choices:
      - "A. Documented access review records showing reviewers, dates, decisions, and follow-up actions"
      - "B. A statement from IT that reviews are performed"
      - "C. A network diagram of the identity infrastructure"
      - "D. The last penetration test report"
    answerIndex: 0
    explanation: >-
      Review records provide objective evidence of control operation and effectiveness, including accountability and remediation actions. A statement (B) is not sufficient assurance because it is not independently verifiable. Pen test results (D) can support overall security but do not prove periodic access review execution.
    refs:
      - "https://www.iso.org/standard/27001"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-test-002"
    difficulty: "medium"
    tags: ["domain6", "testing", "vulnerability-management", "risk"]
    question: "A vulnerability scan reports hundreds of findings. The CISO asks which process best ensures remediation focuses on business risk rather than raw counts. What do you recommend?"
    choices:
      - "A. Prioritize remediation using asset criticality, exploitability, exposure, and compensating controls"
      - "B. Fix vulnerabilities strictly in order of CVSS score"
      - "C. Remediate the newest findings first to keep reports clean"
      - "D. Ignore findings that do not have public exploits"
    answerIndex: 0
    explanation: >-
      Risk-based prioritization combines technical severity with business context, improving outcomes and resource allocation. CVSS alone (B) is incomplete because it may not reflect real exposure or asset importance. Ignoring non-public exploits (D) is risky because exploitability can change and attackers may have private capabilities.
    refs:
      - "https://nvd.nist.gov/"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-test-003"
    difficulty: "hard"
    tags: ["domain6", "testing", "pentest", "scope"]
    question: "A business unit requests a penetration test of a production payment system next week, but change freezes and peak season traffic are expected. What is the BEST security management decision?"
    choices:
      - "A. Negotiate scope and timing to reduce operational risk, and use a staged approach (test in pre-prod, limited prod validation)"
      - "B. Run the full test in production to get the most realistic results"
      - "C. Cancel testing entirely because it is too risky"
      - "D. Replace the test with a vulnerability scan only"
    answerIndex: 0
    explanation: >-
      A staged approach balances assurance with availability by reducing disruption while still providing meaningful findings. Full production testing (B) can create unacceptable operational risk and may violate change control processes. A scan-only approach (D) does not provide the same depth as a controlled penetration test and may miss logic issues.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-secops-001"
    difficulty: "easy"
    tags: ["domain7", "secops", "incident-response", "triage"]
    question: "A SOC analyst detects suspicious PowerShell activity on a user workstation and wants to immediately wipe the device. What is the BEST initial incident response action from a management perspective?"
    choices:
      - "A. Preserve evidence and follow the incident response playbook, including containment steps appropriate to the suspected impact"
      - "B. Wipe the device immediately to eliminate the threat"
      - "C. Ignore it unless antivirus also triggers"
      - "D. Publicly notify customers before confirming scope"
    answerIndex: 0
    explanation: >-
      Following the incident response process preserves evidence, enables accurate scoping, and supports coordinated containment and eradication. Immediate wiping (B) can destroy forensic data needed to understand root cause and whether lateral movement occurred. Premature notification (D) can create unnecessary harm and is not appropriate without validated impact and stakeholder coordination.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-secops-002"
    difficulty: "medium"
    tags: ["domain7", "secops", "logging", "monitoring"]
    question: "After a ransomware incident, leadership asks why detection was late. The SOC claims logs were missing from key servers. What is the BEST long-term fix?"
    choices:
      - "A. Define logging requirements, ensure centralized collection and retention, and monitor log source health"
      - "B. Purchase a new SIEM and assume it will solve logging gaps"
      - "C. Increase the number of SOC analysts without changing processes"
      - "D. Disable encryption to make logs easier to access"
    answerIndex: 0
    explanation: >-
      Logging requirements and centralized collection with health monitoring address both governance and operational assurance that telemetry is complete and reliable. Buying a SIEM (B) without defining sources, retention, and onboarding processes often recreates the same gaps. Disabling encryption (D) weakens confidentiality and is not required to achieve log visibility.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-secops-003"
    difficulty: "hard"
    tags: ["domain7", "secops", "bcdr", "rto-rpo"]
    question: "A business impact analysis (BIA) identifies a customer portal with a 4-hour RTO and a 15-minute RPO. The IT director proposes nightly backups to meet both. What is the BEST assessment?"
    choices:
      - "A. Nightly backups cannot meet a 15-minute RPO; you need more frequent replication or backup strategies aligned to the RPO"
      - "B. Nightly backups meet the RPO if restores are fast"
      - "C. RTO and RPO are interchangeable, so nightly backups are sufficient"
      - "D. Remove the RPO requirement to reduce cost"
    answerIndex: 0
    explanation: >-
      RPO is the maximum acceptable data loss window, and nightly backups imply up to ~24 hours of loss, which fails a 15-minute RPO. Restore speed affects RTO, not the amount of data lost, making (B) incorrect. Changing requirements (D) is a business decision that must be justified by risk acceptance, not convenience.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-secops-004"
    difficulty: "medium"
    tags: ["domain7", "secops", "change-management", "operations"]
    question: "Operations wants to apply emergency patches directly to production to address a high-profile vulnerability. The change advisory board (CAB) worries about outages. What is the BEST management approach?"
    choices:
      - "A. Use an expedited emergency change process with risk assessment, testing where feasible, approvals, and backout plans"
      - "B. Block all patching until the next regular maintenance window"
      - "C. Patch immediately with no approvals to reduce exposure time"
      - "D. Accept the risk and focus only on detection"
    answerIndex: 0
    explanation: >-
      Emergency change procedures balance speed and control by requiring risk evaluation, appropriate approvals, and rollback planning. Blocking changes (B) may leave critical exposure unaddressed for too long, increasing risk. Skipping approvals and planning (C) can create significant availability and integrity impacts that are avoidable.
    refs:
      - "https://csrc.nist.gov/publications/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  - id: "cissp-sdlc-001"
    difficulty: "easy"
    tags: ["domain8", "sdlc", "requirements", "security-by-design"]
    question: "A product owner says security requirements can be added after the MVP ships. What is the BEST management-level response?"
    choices:
      - "A. Integrate security requirements into the backlog now because late changes increase cost and risk"
      - "B. Agree, because security is primarily a testing activity"
      - "C. Skip requirements and rely on a WAF"
      - "D. Require developers to sign a policy acknowledging secure coding"
    answerIndex: 0
    explanation: >-
      Security requirements influence architecture and design, and addressing them early reduces rework and prevents predictable risk. Treating security as only testing (B) is incorrect because many controls are design decisions, not test artifacts. Policy sign-offs (D) do not replace technical and process controls.
    refs:
      - "https://owasp.org/"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-sdlc-002"
    difficulty: "medium"
    tags: ["domain8", "sdlc", "supply-chain", "dependencies"]
    question: "A development team frequently adds open-source libraries without review. A recent incident involved a vulnerable dependency. What is the BEST program-level control?"
    choices:
      - "A. Establish a software supply chain policy with approved sources, dependency review, and continuous monitoring for vulnerabilities"
      - "B. Ban all open-source software"
      - "C. Allow any library if developers promise to update quickly"
      - "D. Run a penetration test once per year"
    answerIndex: 0
    explanation: >-
      A supply chain program sets governance for acquisition and maintenance and enables ongoing visibility into dependency risk. Banning all open source (B) is typically impractical and can increase cost without eliminating risk. Annual testing (D) is too infrequent to manage continuously changing dependency vulnerabilities.
    refs:
      - "https://nvd.nist.gov/"
      - "https://owasp.org/"
    author: "ThanhNguyxn"

  - id: "cissp-sdlc-003"
    difficulty: "hard"
    tags: ["domain8", "sdlc", "secure-design", "abuse-cases"]
    question: "A team is building an API used by partners. You discover that the functional requirements omit misuse scenarios such as credential stuffing and excessive data scraping. What is the BEST corrective action?"
    choices:
      - "A. Add abuse cases and security acceptance criteria to requirements and test plans"
      - "B. Assume partners are trusted and focus on performance"
      - "C. Block all partner access until after launch"
      - "D. Rely solely on rate limiting after incidents occur"
    answerIndex: 0
    explanation: >-
      Abuse cases translate attacker behavior into concrete requirements and testable acceptance criteria, enabling preventive controls like auth strength, throttling, and monitoring. Assuming trust (B) ignores the likelihood of compromised partner credentials and automated attacks. Rate limiting alone (D) is helpful but incomplete if authentication and authorization are weak.
    refs:
      - "https://owasp.org/"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-sdlc-004"
    difficulty: "hard"
    tags: ["domain8", "sdlc", "devsecops", "ci-cd"]
    question: "A DevOps team wants to speed releases by removing manual security gates. What is the BEST management-aligned alternative that maintains assurance?"
    choices:
      - "A. Automate security checks in CI/CD with defined thresholds, and require risk-based exceptions with approvals"
      - "B. Remove all gates and rely on production monitoring"
      - "C. Require developers to email the security team before each deploy"
      - "D. Freeze releases until security staffing increases"
    answerIndex: 0
    explanation: >-
      Automated checks with clear thresholds preserve consistent assurance while supporting delivery speed, and exception handling keeps governance intact. Relying only on monitoring (B) is reactive and allows preventable issues into production. Email-based approvals (C) do not scale and often lack auditable, consistent decision criteria.
    refs:
      - "https://owasp.org/"
      - "https://www.iso.org/standard/27001"
    author: "ThanhNguyxn"

  # ── CISSP Expansion: 70 new questions (cissp-expand-001 → cissp-expand-070) ──

  # Domain 1: Security and Risk Management (~10 questions)
  - id: "cissp-expand-001"
    difficulty: "easy"
    tags: ["domain1", "governance", "security-policy"]
    question: "An organization's board of directors asks who bears ULTIMATE accountability for information security. Who is it?"
    choices:
      - "A. Senior management / executive leadership"
      - "B. The Chief Information Security Officer (CISO)"
      - "C. The internal audit department"
      - "D. The IT operations team"
    answerIndex: 0
    explanation: >-
      Senior management holds ultimate accountability for information security because they set organizational direction, approve budgets, and accept residual risk. The CISO (B) is responsible for execution but reports to senior leadership. Audit (C) provides assurance but does not own security outcomes.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-002"
    difficulty: "medium"
    tags: ["domain1", "risk-management", "quantitative"]
    question: "An asset valued at $500,000 has a 25% exposure factor for fire and an annualized rate of occurrence (ARO) of 0.1. What is the annualized loss expectancy (ALE)?"
    choices:
      - "A. $12,500"
      - "B. $50,000"
      - "C. $125,000"
      - "D. $500,000"
    answerIndex: 0
    explanation: >-
      SLE = Asset Value × EF = $500,000 × 0.25 = $125,000. ALE = SLE × ARO = $125,000 × 0.1 = $12,500. Option B incorrectly multiplies AV by ARO without applying EF. Option C is the SLE, not the ALE.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-003"
    difficulty: "hard"
    tags: ["domain1", "risk-management", "risk-treatment"]
    question: "After a risk assessment, management decides the cost of mitigating a specific risk exceeds the potential loss. They document this decision and proceed without additional controls. What risk treatment strategy is this?"
    choices:
      - "A. Risk acceptance"
      - "B. Risk avoidance"
      - "C. Risk transference"
      - "D. Risk mitigation"
    answerIndex: 0
    explanation: >-
      When management formally acknowledges a risk and decides not to implement controls because the cost outweighs the benefit, this is risk acceptance. Risk avoidance (B) would eliminate the activity entirely. Risk transference (C) shifts impact to a third party such as insurance.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-39/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-004"
    difficulty: "medium"
    tags: ["domain1", "legal", "compliance", "privacy"]
    question: "Under GDPR, a company collects user data in Germany and processes it using a cloud provider in the US. Who is the data controller?"
    choices:
      - "A. The company that determines the purposes and means of processing"
      - "B. The US cloud provider hosting the data"
      - "C. The German data protection authority"
      - "D. The end users whose data is collected"
    answerIndex: 0
    explanation: >-
      The data controller is the entity that determines the purposes and means of processing personal data. The cloud provider (B) is the data processor. The supervisory authority (C) enforces compliance but does not control data. Data subjects (D) are the individuals whose data is processed.
    refs:
      - "https://gdpr.eu/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-005"
    difficulty: "easy"
    tags: ["domain1", "ethics", "isc2-code"]
    question: "An ISC2 member discovers a colleague is fabricating compliance reports. According to the ISC2 Code of Ethics, what should the member do FIRST?"
    choices:
      - "A. Report the behavior through appropriate channels"
      - "B. Confront the colleague privately and ask them to stop"
      - "C. Ignore it since it is not the member's direct responsibility"
      - "D. Post about it on social media to raise awareness"
    answerIndex: 0
    explanation: >-
      The ISC2 Code of Ethics requires members to act honorably and report unethical behavior through proper channels. Private confrontation (B) does not ensure accountability. Ignoring it (C) violates the duty to protect society and the profession.
    refs:
      - "https://www.isc2.org/ethics"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-006"
    difficulty: "hard"
    tags: ["domain1", "bcp", "business-impact-analysis"]
    question: "During a business impact analysis, the finance department states their ERP system has a maximum tolerable downtime (MTD) of 24 hours, and recovery takes 8 hours. What is the Recovery Time Objective (RTO)?"
    choices:
      - "A. Must be less than or equal to 24 hours, and the current 8-hour recovery meets it"
      - "B. Exactly 24 hours"
      - "C. 32 hours (MTD plus recovery time)"
      - "D. Cannot be determined without the Recovery Point Objective"
    answerIndex: 0
    explanation: >-
      RTO must be less than or equal to MTD to ensure the system is recovered before the maximum tolerable downtime is exceeded. Since recovery takes 8 hours and MTD is 24 hours, the RTO is met. Option C incorrectly adds the two values. RPO (D) is a separate metric for data loss tolerance.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-007"
    difficulty: "medium"
    tags: ["domain1", "security-awareness", "training"]
    question: "Which security awareness approach is MOST effective at reducing phishing susceptibility across an organization?"
    choices:
      - "A. Simulated phishing campaigns with immediate feedback and targeted training for those who fail"
      - "B. Annual compliance-focused presentations to all employees"
      - "C. Distributing security policy documents via email"
      - "D. Posting security tips on the company intranet"
    answerIndex: 0
    explanation: >-
      Simulated phishing with immediate feedback creates a measurable, behavior-changing learning loop. Annual presentations (B) typically have low retention and do not address individual weaknesses. Passive methods like email distribution (C) and intranet posts (D) lack engagement and accountability.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-50/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-008"
    difficulty: "easy"
    tags: ["domain1", "governance", "security-roles"]
    question: "Who is typically responsible for classifying data in an organization?"
    choices:
      - "A. The data owner (usually a business manager)"
      - "B. The database administrator"
      - "C. The security operations center analyst"
      - "D. The help desk technician"
    answerIndex: 0
    explanation: >-
      Data owners, typically business managers or executives, classify data based on its value, sensitivity, and regulatory requirements. Database administrators (B) are custodians who implement technical controls. SOC analysts (C) monitor for threats but do not determine classification levels.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-60/vol-1-rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-009"
    difficulty: "hard"
    tags: ["domain1", "risk-management", "frameworks"]
    question: "An organization operating in both the US financial and healthcare sectors needs a unified risk management framework. Which approach BEST addresses both regulatory environments?"
    choices:
      - "A. Map controls from NIST CSF to both GLBA and HIPAA requirements using a common control framework"
      - "B. Implement HIPAA controls only, since they are the most restrictive"
      - "C. Use PCI DSS as the sole framework since it covers financial data"
      - "D. Create entirely separate security programs for each business unit"
    answerIndex: 0
    explanation: >-
      NIST CSF provides a flexible, industry-agnostic framework that can map to multiple regulatory requirements including GLBA and HIPAA. Using only HIPAA (B) ignores financial-specific requirements. PCI DSS (C) addresses payment card data, not all financial or health regulations. Separate programs (D) create inefficiency and inconsistency.
    refs:
      - "https://www.nist.gov/cyberframework"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-010"
    difficulty: "medium"
    tags: ["domain1", "legal", "investigation"]
    question: "During a forensic investigation, which type of evidence is MOST likely to be challenged as unreliable in court?"
    choices:
      - "A. Oral testimony from a witness recalling events from memory"
      - "B. Original hard drive with documented chain of custody"
      - "C. Forensic image with cryptographic hash verification"
      - "D. Server logs collected and preserved per standard procedures"
    answerIndex: 0
    explanation: >-
      Oral testimony based on memory is considered the least reliable because human recall is subjective and prone to error. Original evidence with chain of custody (B) and forensically verified images (C) provide the strongest evidentiary support. Properly preserved logs (D) are considered reliable documentary evidence.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-86/final"
    author: "ThanhNguyxn"

  # Domain 2: Asset Security (~8 questions)
  - id: "cissp-expand-011"
    difficulty: "easy"
    tags: ["domain2", "data-classification", "labeling"]
    question: "A government agency classifies a document as 'Secret.' What does this classification level typically indicate?"
    choices:
      - "A. Unauthorized disclosure could cause serious damage to national security"
      - "B. The document is available to the general public"
      - "C. The document contains routine internal communications"
      - "D. Unauthorized disclosure could cause exceptionally grave damage"
    answerIndex: 0
    explanation: >-
      In government classification, 'Secret' means unauthorized disclosure could cause serious damage to national security. 'Top Secret' (D) indicates exceptionally grave damage. 'Unclassified' or public documents (B) have no expected damage from disclosure.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://www.archives.gov/isoo"
    author: "ThanhNguyxn"

  - id: "cissp-expand-012"
    difficulty: "medium"
    tags: ["domain2", "data-lifecycle", "retention"]
    question: "A company's legal department requires retaining email records for 7 years. The IT team proposes deleting emails after 3 years to save storage costs. What is the BEST course of action?"
    choices:
      - "A. Retain emails for 7 years to meet legal and regulatory requirements"
      - "B. Delete after 3 years and accept the storage savings"
      - "C. Archive emails to tape and delete from primary storage after 1 year"
      - "D. Let individual users decide how long to keep their emails"
    answerIndex: 0
    explanation: >-
      Legal and regulatory retention requirements take precedence over cost considerations. Failing to retain records for the required period (B) exposes the organization to legal liability and compliance penalties. Archiving to tape (C) could work if it satisfies the 7-year requirement, but the question specifies deletion after a shorter period.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-88/rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-013"
    difficulty: "hard"
    tags: ["domain2", "data-protection", "encryption", "cloud"]
    question: "A healthcare organization stores PHI in a public cloud. Which encryption strategy BEST protects data while maintaining operational flexibility?"
    choices:
      - "A. Client-side encryption with customer-managed keys (BYOK) before uploading to the cloud"
      - "B. Rely solely on the cloud provider's default server-side encryption"
      - "C. Encrypt only data in transit and leave data at rest unencrypted"
      - "D. Use the cloud provider's key management with provider-managed keys exclusively"
    answerIndex: 0
    explanation: >-
      Client-side encryption with customer-managed keys ensures the cloud provider cannot access plaintext data, providing the strongest protection for PHI. Default server-side encryption (B) means the provider holds the keys. Encrypting only in transit (C) leaves stored data exposed to insider threats or breaches at the provider.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-144/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-014"
    difficulty: "easy"
    tags: ["domain2", "data-handling", "sanitization"]
    question: "Before donating old company laptops to a charity, what is the MINIMUM data sanitization method that should be used?"
    choices:
      - "A. Overwriting the entire disk with a secure erase utility"
      - "B. Deleting files and emptying the recycle bin"
      - "C. Formatting the hard drive with a quick format"
      - "D. Removing the operating system and reinstalling a fresh copy"
    answerIndex: 0
    explanation: >-
      Secure erase/overwriting ensures data cannot be recovered using standard forensic tools. Simply deleting files (B) or quick formatting (C) only removes file system references while the actual data remains recoverable. Reinstalling the OS (D) does not address previously written data sectors.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-88/rev-1/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-015"
    difficulty: "medium"
    tags: ["domain2", "data-states", "dlp"]
    question: "A DLP solution is configured to monitor email attachments but employees are uploading sensitive files to personal cloud storage via web browsers. What additional DLP capability is needed?"
    choices:
      - "A. Endpoint DLP that monitors and controls file transfers at the workstation level"
      - "B. Stronger email gateway rules"
      - "C. Network DLP on the mail server only"
      - "D. A policy reminder sent quarterly to all employees"
    answerIndex: 0
    explanation: >-
      Endpoint DLP monitors all data egress points on the workstation including web uploads, USB transfers, and cloud sync clients. Strengthening email rules (B) or mail server DLP (C) only addresses email channels. Policy reminders (D) are a compensating awareness control but do not technically prevent unauthorized transfers.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-016"
    difficulty: "hard"
    tags: ["domain2", "privacy", "data-minimization"]
    question: "A marketing team wants to collect customers' social security numbers during online registration for a loyalty program. As the security advisor, what principle should you emphasize?"
    choices:
      - "A. Data minimization — collect only what is necessary for the stated purpose"
      - "B. Collect everything and restrict access through role-based controls"
      - "C. Collect the SSNs but store them in a separate encrypted database"
      - "D. Allow collection only if users explicitly consent"
    answerIndex: 0
    explanation: >-
      Data minimization dictates that only data necessary for the specific purpose should be collected. SSNs are not needed for a loyalty program. While consent (D) is important, collecting unnecessary sensitive data creates risk regardless of consent. Encrypting unnecessary data (C) still creates a liability if breached.
    refs:
      - "https://gdpr.eu/article-5-how-to-process-personal-data/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-017"
    difficulty: "medium"
    tags: ["domain2", "asset-management", "scoping"]
    question: "During an asset inventory, the security team discovers 200 unmanaged IoT devices on the corporate network. What is the FIRST priority?"
    choices:
      - "A. Identify and classify the devices, then segment them from critical network resources"
      - "B. Immediately disconnect all 200 devices"
      - "C. Install endpoint protection software on each IoT device"
      - "D. Add them to the existing VLAN without further assessment"
    answerIndex: 0
    explanation: >-
      Identification and classification are prerequisites to applying appropriate controls. Immediate disconnection (B) may disrupt legitimate business operations. Most IoT devices cannot run endpoint protection (C). Adding them to existing VLANs (D) without assessment could expose critical systems to unmanaged risk.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-183/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-018"
    difficulty: "easy"
    tags: ["domain2", "data-roles", "custodian"]
    question: "What is the PRIMARY responsibility of a data custodian?"
    choices:
      - "A. Implementing and maintaining the technical controls that protect data"
      - "B. Determining data classification levels"
      - "C. Approving data access requests from business units"
      - "D. Defining data retention policies"
    answerIndex: 0
    explanation: >-
      Data custodians are responsible for the day-to-day technical protection of data, including backups, access control implementation, and encryption. Classification (B) and access approval (C) are data owner responsibilities. Retention policies (D) are set by management with legal input.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-18/rev-1/final"
    author: "ThanhNguyxn"

  # Domain 3: Security Architecture and Engineering (~10 questions)
  - id: "cissp-expand-019"
    difficulty: "medium"
    tags: ["domain3", "security-models", "bell-lapadula"]
    question: "The Bell-LaPadula model enforces which security property?"
    choices:
      - "A. Confidentiality — no read up, no write down"
      - "B. Integrity — no write up, no read down"
      - "C. Availability — ensuring systems remain operational"
      - "D. Non-repudiation — proving the origin of data"
    answerIndex: 0
    explanation: >-
      Bell-LaPadula focuses on confidentiality with 'no read up' (Simple Security Property) and 'no write down' (Star Property) rules. The Biba model (B) addresses integrity. Availability (C) and non-repudiation (D) are separate security objectives not addressed by Bell-LaPadula.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-expand-020"
    difficulty: "hard"
    tags: ["domain3", "cryptography", "pki"]
    question: "A certificate authority's root private key is compromised. What is the MOST critical immediate action?"
    choices:
      - "A. Revoke the root certificate and all subordinate certificates, then reissue from a new root"
      - "B. Rotate only the certificates that are about to expire"
      - "C. Notify affected users and wait for the certificates to expire naturally"
      - "D. Issue a new CRL but keep the existing root certificate active"
    answerIndex: 0
    explanation: >-
      A compromised root key means all certificates in the hierarchy are untrustworthy. Complete revocation and reissuance from a new root is required. Waiting for natural expiry (C) leaves all communications vulnerable. Issuing a CRL (D) while keeping the compromised root active provides no real security since the attacker can sign new certificates.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-57/part-1/rev-5/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-021"
    difficulty: "easy"
    tags: ["domain3", "cryptography", "symmetric"]
    question: "Which is a characteristic of symmetric encryption?"
    choices:
      - "A. The same key is used for both encryption and decryption"
      - "B. Different keys are used for encryption and decryption"
      - "C. It is primarily used for digital signatures"
      - "D. It does not require key management"
    answerIndex: 0
    explanation: >-
      Symmetric encryption uses a single shared key for both encryption and decryption, making it fast but requiring secure key distribution. Asymmetric encryption (B) uses key pairs. Digital signatures (C) typically use asymmetric cryptography. All encryption requires key management (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-175b/rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-022"
    difficulty: "medium"
    tags: ["domain3", "secure-design", "defense-in-depth"]
    question: "An architect proposes a single next-generation firewall as the sole security control for the data center perimeter. What is the PRIMARY concern?"
    choices:
      - "A. It creates a single point of failure with no defense in depth"
      - "B. Next-generation firewalls are too expensive for data centers"
      - "C. Firewalls cannot inspect encrypted traffic"
      - "D. The firewall will slow down all network traffic"
    answerIndex: 0
    explanation: >-
      Relying on a single control violates defense in depth. If that firewall is bypassed or misconfigured, there are no additional layers to detect or prevent threats. Cost (B) is not the primary security concern. Modern NGFWs can inspect encrypted traffic with TLS inspection (C). Performance impact (D) is a consideration but not the primary security issue.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-41/rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-023"
    difficulty: "hard"
    tags: ["domain3", "cryptography", "hashing"]
    question: "A developer stores user passwords using MD5 without salt. What is the PRIMARY vulnerability?"
    choices:
      - "A. Pre-computed rainbow table attacks can quickly reverse the hashes"
      - "B. MD5 produces hashes that are too short to store"
      - "C. MD5 encryption can be decrypted with the right key"
      - "D. Unsalted MD5 hashes consume too much storage space"
    answerIndex: 0
    explanation: >-
      MD5 without salt is vulnerable to rainbow table attacks where pre-computed hash-to-plaintext mappings enable rapid password recovery. MD5 is a hash function not encryption, so it cannot be 'decrypted' (C). The hash length (B) and storage (D) are not the primary security concerns — the lack of collision resistance and salting are.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-132/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-024"
    difficulty: "medium"
    tags: ["domain3", "security-models", "zero-trust"]
    question: "Which principle is MOST central to a Zero Trust architecture?"
    choices:
      - "A. Never trust, always verify — authenticate and authorize every access request regardless of network location"
      - "B. Trust internal users by default and verify external users"
      - "C. Use VPN tunnels to extend the trusted network perimeter"
      - "D. Implement firewalls at the network boundary only"
    answerIndex: 0
    explanation: >-
      Zero Trust eliminates implicit trust based on network location. Every access request must be authenticated, authorized, and continuously validated. Trusting internal users (B) is the traditional perimeter model that Zero Trust replaces. VPNs (C) and boundary firewalls (D) are perimeter-based controls.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-207/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-025"
    difficulty: "easy"
    tags: ["domain3", "physical-security", "controls"]
    question: "Which physical security control is classified as a DETERRENT?"
    choices:
      - "A. Security cameras in visible locations with warning signs"
      - "B. A mantrap at the building entrance"
      - "C. A motion-activated alarm system"
      - "D. A backup power generator"
    answerIndex: 0
    explanation: >-
      Visible cameras and warning signs deter potential intruders by making them aware they will be observed. A mantrap (B) is a preventive control. Alarms (C) are detective controls. Backup generators (D) are compensating/recovery controls for availability.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-116/rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-026"
    difficulty: "hard"
    tags: ["domain3", "secure-design", "trusted-computing"]
    question: "What is the PRIMARY function of a Trusted Platform Module (TPM) in endpoint security?"
    choices:
      - "A. Provide hardware-based secure storage for cryptographic keys and platform integrity measurements"
      - "B. Serve as a hardware firewall for network traffic filtering"
      - "C. Replace software-based antivirus with hardware-based malware detection"
      - "D. Encrypt all network communications automatically"
    answerIndex: 0
    explanation: >-
      A TPM is a hardware security module that securely stores cryptographic keys, certificates, and platform configuration registers (PCRs) for integrity measurement. It does not filter network traffic (B), replace antivirus (C), or automatically encrypt network communications (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-155/draft"
    author: "ThanhNguyxn"

  - id: "cissp-expand-027"
    difficulty: "medium"
    tags: ["domain3", "site-planning", "facility"]
    question: "When selecting a site for a new data center, which factor is MOST important from a security perspective?"
    choices:
      - "A. Proximity to natural hazards, crime rates, and utility redundancy"
      - "B. Proximity to the CEO's office for convenience"
      - "C. Having the largest possible parking lot"
      - "D. Being located in the most expensive real estate area"
    answerIndex: 0
    explanation: >-
      Site selection must consider natural disaster risk (flood zones, earthquake faults), local crime statistics, and availability of redundant utilities (power, connectivity). Executive convenience (B), parking (C), and real estate cost (D) are not primary security considerations.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-028"
    difficulty: "hard"
    tags: ["domain3", "cryptography", "key-management"]
    question: "An organization uses AES-256 for data encryption. The encryption keys are stored in plaintext on the same server as the encrypted data. What is the PRIMARY risk?"
    choices:
      - "A. An attacker who compromises the server gains access to both encrypted data and the decryption keys"
      - "B. AES-256 is too slow for the server hardware"
      - "C. The keys will expire and data will become permanently inaccessible"
      - "D. AES-256 has known vulnerabilities that make key storage irrelevant"
    answerIndex: 0
    explanation: >-
      Storing encryption keys alongside encrypted data eliminates the protection encryption provides. If the server is compromised, the attacker has everything needed to decrypt the data. AES-256 is computationally efficient (B) and has no known practical vulnerabilities (D). Key expiration (C) is a management issue, not the primary risk here.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-57/part-1/rev-5/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  # Domain 4: Communication and Network Security (~10 questions)
  - id: "cissp-expand-029"
    difficulty: "easy"
    tags: ["domain4", "network", "osi-model"]
    question: "At which OSI layer do routers primarily operate?"
    choices:
      - "A. Layer 3 — Network"
      - "B. Layer 2 — Data Link"
      - "C. Layer 4 — Transport"
      - "D. Layer 7 — Application"
    answerIndex: 0
    explanation: >-
      Routers operate at Layer 3 (Network) of the OSI model, making forwarding decisions based on IP addresses. Switches operate at Layer 2 (B). Transport layer (C) deals with TCP/UDP segments. Application layer (D) handles protocols like HTTP and SMTP.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-expand-030"
    difficulty: "medium"
    tags: ["domain4", "network-attacks", "mitm"]
    question: "An attacker on the same network segment sends forged ARP replies to associate their MAC address with the default gateway's IP. What attack is this?"
    choices:
      - "A. ARP spoofing / ARP poisoning"
      - "B. DNS cache poisoning"
      - "C. SYN flood attack"
      - "D. VLAN hopping"
    answerIndex: 0
    explanation: >-
      ARP spoofing sends fake ARP messages to link the attacker's MAC address with a legitimate IP, enabling man-in-the-middle interception. DNS poisoning (B) corrupts DNS cache entries. SYN flooding (C) is a DoS attack. VLAN hopping (D) exploits trunk port configurations to access other VLANs.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-54/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-031"
    difficulty: "hard"
    tags: ["domain4", "network-security", "tls"]
    question: "During a TLS 1.3 handshake, which improvement over TLS 1.2 MOST significantly reduces connection establishment time?"
    choices:
      - "A. 1-RTT handshake (and 0-RTT for resumed sessions) by combining key exchange and parameters in fewer messages"
      - "B. Using longer encryption keys by default"
      - "C. Requiring client certificates for all connections"
      - "D. Removing support for all cipher suites except AES"
    answerIndex: 0
    explanation: >-
      TLS 1.3 reduces the handshake to one round trip (1-RTT) and supports 0-RTT for session resumption, significantly improving performance. TLS 1.2 requires 2-RTT. Key length (B) affects security, not speed. Client certificates (C) are optional. TLS 1.3 removes weak ciphers but still supports multiple strong suites (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://www.rfc-editor.org/rfc/rfc8446"
    author: "ThanhNguyxn"

  - id: "cissp-expand-032"
    difficulty: "medium"
    tags: ["domain4", "network-security", "vpn"]
    question: "What is the PRIMARY difference between a site-to-site VPN and a remote access VPN?"
    choices:
      - "A. Site-to-site connects entire networks together, while remote access connects individual users to a network"
      - "B. Site-to-site uses encryption but remote access does not"
      - "C. Remote access VPNs are always faster than site-to-site"
      - "D. Site-to-site VPNs cannot traverse the internet"
    answerIndex: 0
    explanation: >-
      Site-to-site VPNs establish encrypted tunnels between network gateways, connecting entire networks. Remote access VPNs connect individual endpoints (laptops, phones) to a corporate network. Both use encryption (B). Performance depends on configuration, not type (C). Both commonly traverse the internet (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-77/rev-1/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-033"
    difficulty: "easy"
    tags: ["domain4", "network", "dns"]
    question: "What is the PRIMARY purpose of DNSSEC?"
    choices:
      - "A. To authenticate DNS responses and ensure they have not been tampered with"
      - "B. To encrypt all DNS queries and responses"
      - "C. To speed up DNS resolution times"
      - "D. To replace DNS with a more modern protocol"
    answerIndex: 0
    explanation: >-
      DNSSEC adds digital signatures to DNS records, allowing resolvers to verify that responses are authentic and unmodified. DNSSEC does not encrypt queries (B) — DNS over HTTPS (DoH) or DNS over TLS (DoT) provide encryption. It does not improve speed (C) and is an extension to DNS, not a replacement (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-81/rev-2/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-034"
    difficulty: "hard"
    tags: ["domain4", "network-security", "microsegmentation"]
    question: "An organization implements microsegmentation in their data center. What is the PRIMARY security benefit?"
    choices:
      - "A. Limiting lateral movement by enforcing granular access policies between individual workloads"
      - "B. Eliminating the need for network firewalls entirely"
      - "C. Improving network bandwidth by reducing broadcast traffic"
      - "D. Simplifying network management by reducing the number of VLANs"
    answerIndex: 0
    explanation: >-
      Microsegmentation creates fine-grained security zones around individual workloads or applications, preventing attackers from moving laterally after initial compromise. Firewalls (B) are still needed for perimeter and macro-level controls. Bandwidth improvement (C) is a side effect, not the primary purpose. Microsegmentation often increases complexity (D), not simplicity.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-207/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-035"
    difficulty: "medium"
    tags: ["domain4", "wireless", "security"]
    question: "Which wireless security protocol provides the STRONGEST protection for enterprise Wi-Fi networks?"
    choices:
      - "A. WPA3-Enterprise with 192-bit security mode"
      - "B. WPA2-Personal with a strong passphrase"
      - "C. WEP with 128-bit key"
      - "D. Open network with a captive portal"
    answerIndex: 0
    explanation: >-
      WPA3-Enterprise with 192-bit mode provides the strongest wireless security using CNSA-approved algorithms and individualized data encryption. WPA2-Personal (B) uses a shared key vulnerable to offline attacks. WEP (C) has been broken for years. Open networks (D) provide no encryption regardless of captive portal use.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://www.wi-fi.org/discover-wi-fi/security"
    author: "ThanhNguyxn"

  - id: "cissp-expand-036"
    difficulty: "easy"
    tags: ["domain4", "network", "protocols"]
    question: "Which protocol provides reliable, connection-oriented data delivery at the transport layer?"
    choices:
      - "A. TCP (Transmission Control Protocol)"
      - "B. UDP (User Datagram Protocol)"
      - "C. ICMP (Internet Control Message Protocol)"
      - "D. ARP (Address Resolution Protocol)"
    answerIndex: 0
    explanation: >-
      TCP provides reliable, ordered, connection-oriented delivery with error checking and retransmission. UDP (B) is connectionless and does not guarantee delivery. ICMP (C) is used for diagnostics and error reporting at the network layer. ARP (D) resolves IP addresses to MAC addresses at the data link layer.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-expand-037"
    difficulty: "hard"
    tags: ["domain4", "network-security", "ids-ips"]
    question: "A network IDS generates excessive false positives, causing analysts to ignore alerts. What is this phenomenon called, and what is the BEST remediation?"
    choices:
      - "A. Alert fatigue — tune detection rules, create baselines, and implement alert prioritization"
      - "B. False negative overload — increase the sensitivity of all detection rules"
      - "C. Signature staleness — update signatures and increase logging verbosity"
      - "D. Analyst burnout — hire more SOC analysts to review all alerts"
    answerIndex: 0
    explanation: >-
      Excessive false positives cause alert fatigue where analysts become desensitized and miss real threats. The solution is tuning rules to the environment, establishing baselines, and prioritizing alerts by risk. Increasing sensitivity (B) would worsen the problem. Adding analysts (D) addresses staffing but not the root cause of poor signal-to-noise ratio.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-94/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-038"
    difficulty: "medium"
    tags: ["domain4", "network", "email-security"]
    question: "Which combination of email security protocols BEST prevents spoofing and ensures message integrity?"
    choices:
      - "A. SPF, DKIM, and DMARC working together"
      - "B. TLS encryption on the mail server only"
      - "C. S/MIME for all internal emails"
      - "D. POP3 with SSL/TLS"
    answerIndex: 0
    explanation: >-
      SPF validates sending servers, DKIM provides cryptographic message signing, and DMARC enforces alignment policies between the two. Together they provide comprehensive anti-spoofing protection. TLS (B) encrypts transport but doesn't prevent spoofing. S/MIME (C) provides end-to-end encryption and signing but is not typically deployed organization-wide. POP3S (D) secures mailbox access but not message authenticity.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-177/rev-1/final"
    author: "ThanhNguyxn"

  # Domain 5: Identity and Access Management (~8 questions)
  - id: "cissp-expand-039"
    difficulty: "easy"
    tags: ["domain5", "iam", "authentication"]
    question: "Which authentication factor category does a fingerprint scan belong to?"
    choices:
      - "A. Something you are (biometric)"
      - "B. Something you have (possession)"
      - "C. Something you know (knowledge)"
      - "D. Somewhere you are (location)"
    answerIndex: 0
    explanation: >-
      Fingerprint scans are biometric authentication, categorized as 'something you are.' Smart cards and tokens (B) are 'something you have.' Passwords and PINs (C) are 'something you know.' GPS-based authentication (D) is 'somewhere you are.'
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-63/3/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-040"
    difficulty: "medium"
    tags: ["domain5", "iam", "access-control-models"]
    question: "A hospital needs to ensure that doctors can only access patient records in their own department during their scheduled shifts. Which access control model BEST supports this?"
    choices:
      - "A. Attribute-based access control (ABAC) using department, role, and time attributes"
      - "B. Discretionary access control (DAC) where each doctor sets their own permissions"
      - "C. Mandatory access control (MAC) with security labels"
      - "D. Role-based access control (RBAC) with static role assignments"
    answerIndex: 0
    explanation: >-
      ABAC evaluates multiple attributes (department, role, time of day) dynamically to make access decisions. DAC (B) allows users to control access to their own resources, which is inappropriate for regulated health data. MAC (C) uses fixed security labels. Static RBAC (D) cannot enforce time-based constraints without additional policy layers.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-162/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-041"
    difficulty: "hard"
    tags: ["domain5", "iam", "federation"]
    question: "An organization implements SAML-based SSO with a cloud provider. The cloud provider acts as the Service Provider (SP). Where does the user authenticate?"
    choices:
      - "A. At the organization's Identity Provider (IdP)"
      - "B. At the cloud provider's login page"
      - "C. At a shared authentication server managed by both parties"
      - "D. Authentication is not needed with SAML federation"
    answerIndex: 0
    explanation: >-
      In SAML federation, the Identity Provider (IdP) authenticates users and issues assertions to the Service Provider (SP). The SP relies on the IdP's assertion rather than authenticating users directly. There is no shared authentication server (C). SAML still requires authentication — it just centralizes where it happens (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-63c/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-042"
    difficulty: "medium"
    tags: ["domain5", "iam", "privileged-access"]
    question: "What is the PRIMARY purpose of a Privileged Access Management (PAM) solution?"
    choices:
      - "A. Control, monitor, and audit the use of privileged accounts and credentials"
      - "B. Provide password reset capabilities for all users"
      - "C. Replace multi-factor authentication for administrators"
      - "D. Manage employee onboarding and offboarding workflows"
    answerIndex: 0
    explanation: >-
      PAM solutions secure privileged credentials in vaults, enforce just-in-time access, record sessions, and provide audit trails for administrative actions. Password resets (B) are a help desk function. PAM complements MFA rather than replacing it (C). Onboarding/offboarding (D) is handled by identity governance solutions.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-043"
    difficulty: "easy"
    tags: ["domain5", "iam", "accountability"]
    question: "Which practice BEST ensures individual accountability for actions taken on a shared system?"
    choices:
      - "A. Assigning unique user accounts with individual credentials to each person"
      - "B. Using a single shared admin account with a strong password"
      - "C. Implementing role-based access without individual logins"
      - "D. Allowing anonymous access with activity logging"
    answerIndex: 0
    explanation: >-
      Individual accountability requires unique, identifiable user accounts so that every action can be traced to a specific person. Shared accounts (B) prevent attribution of specific actions. Role-based access without individual logins (C) and anonymous access (D) both undermine accountability.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-044"
    difficulty: "hard"
    tags: ["domain5", "iam", "kerberos"]
    question: "In a Kerberos authentication environment, what does the Ticket Granting Ticket (TGT) allow a user to do?"
    choices:
      - "A. Request service tickets from the Ticket Granting Service without re-entering credentials"
      - "B. Directly access any service on the network without additional tickets"
      - "C. Bypass the Key Distribution Center for faster authentication"
      - "D. Encrypt all network traffic between the client and server"
    answerIndex: 0
    explanation: >-
      The TGT is obtained after initial authentication and allows the user to request service-specific tickets from the TGS without re-authenticating. The TGT does not grant direct access to services (B) — a service ticket is still needed. The KDC cannot be bypassed (C). Kerberos authenticates users but does not encrypt all traffic (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/"
    author: "ThanhNguyxn"

  - id: "cissp-expand-045"
    difficulty: "medium"
    tags: ["domain5", "iam", "mfa"]
    question: "A user logs in with a password and then receives a push notification on their registered smartphone to approve. How many authentication factors are used?"
    choices:
      - "A. Two factors — something you know (password) and something you have (smartphone)"
      - "B. One factor — only the password matters"
      - "C. Three factors — password, phone, and push notification"
      - "D. Two factors — something you know and something you are"
    answerIndex: 0
    explanation: >-
      The password is 'something you know' and the smartphone receiving the push notification is 'something you have,' making this two-factor authentication. The push notification is the mechanism for the possession factor, not a separate factor. Biometrics (D) would require a fingerprint or face scan, which is not described here.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-63b/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-046"
    difficulty: "easy"
    tags: ["domain5", "iam", "authorization"]
    question: "What is the principle of least privilege?"
    choices:
      - "A. Users should be granted only the minimum permissions necessary to perform their job functions"
      - "B. Users should have administrator access to troubleshoot their own issues"
      - "C. All users should have equal access to prevent discrimination"
      - "D. Permissions should be granted permanently to avoid repeated access requests"
    answerIndex: 0
    explanation: >-
      Least privilege limits user permissions to the absolute minimum needed for their role, reducing the blast radius of compromised accounts. Admin access for troubleshooting (B) violates least privilege. Equal access (C) ignores separation of duties and need-to-know. Permanent grants (D) prevent timely revocation when roles change.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  # Domain 6: Security Assessment and Testing (~8 questions)
  - id: "cissp-expand-047"
    difficulty: "medium"
    tags: ["domain6", "assessment", "vulnerability-scanning"]
    question: "A vulnerability scan reports a critical CVE on a production server, but the security team confirms the vulnerable software version is not actually installed. What type of result is this?"
    choices:
      - "A. False positive"
      - "B. False negative"
      - "C. True positive"
      - "D. True negative"
    answerIndex: 0
    explanation: >-
      A false positive occurs when a scanner incorrectly identifies a vulnerability that does not actually exist. A false negative (B) is when a real vulnerability is missed. A true positive (C) correctly identifies a real vulnerability. A true negative (D) correctly reports no vulnerability.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-115/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-048"
    difficulty: "hard"
    tags: ["domain6", "assessment", "penetration-testing"]
    question: "During a penetration test, the tester gains initial access and then moves from a workstation to a domain controller by exploiting trust relationships. What technique is this?"
    choices:
      - "A. Lateral movement / pivoting"
      - "B. Social engineering"
      - "C. Denial of service"
      - "D. Passive reconnaissance"
    answerIndex: 0
    explanation: >-
      Lateral movement involves using initial access to traverse the network and reach higher-value targets like domain controllers. Social engineering (B) targets humans, not systems. DoS (C) disrupts availability rather than gaining access. Passive reconnaissance (D) is information gathering without direct interaction.
