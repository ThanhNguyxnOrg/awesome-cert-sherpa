  - id: "cissp-expand-051"
    difficulty: "hard"
    tags: ["domain6", "assessment", "metrics"]
    question: "An organization measures its Mean Time to Detect (MTTD) at 200 days. What does this metric indicate and what should be the priority?"
    choices:
      - "A. Threats take an average of 200 days to discover — improving detection capabilities is critical"
      - "B. The organization resolves incidents in 200 days on average"
      - "C. Systems are unavailable for 200 days per year"
      - "D. Patches are applied within 200 days of release"
    answerIndex: 0
    explanation: >-
      MTTD measures the average time between a threat occurring and its detection. 200 days is extremely high, indicating poor detection capabilities. Mean Time to Respond (B) measures resolution time. System availability (C) is measured by uptime/downtime metrics. Patch cadence (D) is a separate vulnerability management metric.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-052"
    difficulty: "medium"
    tags: ["domain6", "testing", "coverage"]
    question: "A security team performs vulnerability scans quarterly but only on internet-facing systems. What is the MOST significant gap in their assessment program?"
    choices:
      - "A. Internal systems and lateral movement paths are not assessed"
      - "B. Quarterly scanning is too frequent for most organizations"
      - "C. Internet-facing systems do not need scanning since they have firewalls"
      - "D. Vulnerability scanning provides too many results to be useful"
    answerIndex: 0
    explanation: >-
      Only scanning internet-facing systems ignores internal threats, insider risks, and lateral movement paths that attackers use after initial compromise. Quarterly scanning (B) is often considered the minimum, not too frequent. Firewalls (C) do not eliminate the need for scanning. Scan results (D) are manageable with proper prioritization.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-115/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-053"
    difficulty: "easy"
    tags: ["domain6", "assessment", "log-review"]
    question: "What is the PRIMARY purpose of reviewing system logs as part of security assessment?"
    choices:
      - "A. To detect anomalies, policy violations, and indicators of compromise"
      - "B. To measure application performance and response times"
      - "C. To verify that backups completed successfully"
      - "D. To generate compliance reports for auditors only"
    answerIndex: 0
    explanation: >-
      Security log review identifies anomalous behavior, unauthorized access attempts, policy violations, and signs of active compromise. Performance monitoring (B) and backup verification (C) are operational functions. While logs support compliance (D), their primary security purpose is threat detection and investigation.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-92/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-054"
    difficulty: "hard"
    tags: ["domain6", "assessment", "bug-bounty"]
    question: "An organization launches a public bug bounty program. What is the MOST important prerequisite?"
    choices:
      - "A. Having a mature vulnerability management process to triage, prioritize, and remediate reported findings efficiently"
      - "B. Ensuring all systems are fully patched before the program starts"
      - "C. Limiting the program to internal employees only"
      - "D. Offering the highest bounties in the industry to attract researchers"
    answerIndex: 0
    explanation: >-
      A bug bounty program generates findings that must be triaged and remediated. Without a mature vulnerability management process, reports pile up and researchers lose trust. Systems can never be 'fully patched' (B). Internal-only programs (C) are not public bug bounties. Bounty amounts (D) matter less than organizational readiness to act on findings.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  # Domain 7: Security Operations (~8 questions)
  - id: "cissp-expand-055"
    difficulty: "easy"
    tags: ["domain7", "operations", "incident-response"]
    question: "What is the correct order of the NIST incident response lifecycle phases?"
    choices:
      - "A. Preparation → Detection & Analysis → Containment, Eradication & Recovery → Post-Incident Activity"
      - "B. Detection → Containment → Preparation → Recovery"
      - "C. Eradication → Detection → Recovery → Preparation"
      - "D. Containment → Analysis → Preparation → Post-Incident Activity"
    answerIndex: 0
    explanation: >-
      NIST SP 800-61 defines four phases: Preparation, Detection & Analysis, Containment/Eradication/Recovery, and Post-Incident Activity (lessons learned). Preparation always comes first to establish capabilities. Detection must precede containment. Post-incident review comes last.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-056"
    difficulty: "medium"
    tags: ["domain7", "operations", "forensics"]
    question: "An investigator needs to collect evidence from a running server suspected of compromise. In what order should volatile evidence be collected?"
    choices:
      - "A. Memory (RAM) first, then network connections, running processes, and finally disk"
      - "B. Disk first, then memory, since disk data is more important"
      - "C. Network logs first, then shut down the server and image the disk"
      - "D. Take a screenshot and then reboot the server to collect clean-state data"
    answerIndex: 0
    explanation: >-
      The order of volatility dictates collecting the most volatile evidence first. RAM contents disappear when power is lost, so memory must be captured before anything else. Network state and running processes are also volatile. Disk data (B) is non-volatile and should be collected last. Rebooting (D) destroys volatile evidence.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-86/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-057"
    difficulty: "hard"
    tags: ["domain7", "operations", "disaster-recovery"]
    question: "An organization maintains a warm site for disaster recovery. A catastrophic event destroys the primary data center. What should the team expect regarding recovery at the warm site?"
    choices:
      - "A. The warm site has hardware and connectivity but requires data restoration and system configuration before becoming operational"
      - "B. The warm site is immediately operational with current data and applications"
      - "C. The warm site only provides office space and desks, with no IT equipment"
      - "D. The warm site requires 6+ months to procure and set up equipment"
    answerIndex: 0
    explanation: >-
      A warm site has pre-installed hardware and network connectivity but typically needs current data to be restored from backups and systems to be configured. A hot site (B) is immediately operational. A cold site (C) has basic facilities but no equipment. Equipment procurement delays (D) describe a cold site scenario.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-058"
    difficulty: "medium"
    tags: ["domain7", "operations", "change-management"]
    question: "A developer pushes an urgent patch to production without following the change management process, and it causes a service outage. What type of change was this?"
    choices:
      - "A. An unauthorized change that bypassed required approvals and testing"
      - "B. A standard change with pre-approved procedures"
      - "C. An emergency change with proper authorization"
      - "D. A routine maintenance window change"
    answerIndex: 0
    explanation: >-
      A change deployed without following the change management process, regardless of urgency, is unauthorized. Even emergency changes (C) require expedited approval through defined procedures. Standard changes (B) have pre-approved, low-risk procedures. Routine maintenance (D) follows scheduled processes.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-059"
    difficulty: "easy"
    tags: ["domain7", "operations", "patch-management"]
    question: "What is the FIRST step in an effective patch management process?"
    choices:
      - "A. Inventory all systems and identify which need patching"
      - "B. Apply all available patches immediately to all systems"
      - "C. Wait for vendors to automatically push patches"
      - "D. Test patches in production to see if they cause issues"
    answerIndex: 0
    explanation: >-
      Effective patch management starts with a complete asset inventory to identify what needs patching. Applying all patches immediately (B) without testing risks service disruption. Waiting for automatic updates (C) is passive and unreliable. Testing in production (D) risks outages — patches should be tested in a staging environment first.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-40/rev-4/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-060"
    difficulty: "hard"
    tags: ["domain7", "operations", "siem"]
    question: "An organization's SIEM correlates events from firewalls, IDS, and endpoint agents. What BEST describes the value of this correlation?"
    choices:
      - "A. Combining events from multiple sources reveals attack patterns that individual sources cannot detect alone"
      - "B. SIEM eliminates the need for individual security tools"
      - "C. Correlation reduces the total number of log events stored"
      - "D. SIEM replaces the need for human security analysts"
    answerIndex: 0
    explanation: >-
      SIEM correlation connects related events across sources to detect complex attack chains. A firewall block + IDS alert + endpoint file modification together tell a story that no single source reveals. SIEM does not replace individual tools (B) or analysts (D). Correlation adds context but does not reduce stored events (C).
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-92/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-061"
    difficulty: "medium"
    tags: ["domain7", "operations", "backup"]
    question: "An organization performs a full backup on Sunday, and incremental backups Monday through Saturday. On Thursday, the system fails. How many backup sets are needed for full restoration?"
    choices:
      - "A. Four — Sunday's full backup plus Monday, Tuesday, and Wednesday incrementals"
      - "B. One — only Sunday's full backup"
      - "C. Two — Sunday's full and Wednesday's incremental only"
      - "D. Seven — all backups for the entire week"
    answerIndex: 0
    explanation: >-
      Incremental backups capture only changes since the last backup. To restore, you need the last full backup (Sunday) plus all subsequent incrementals (Monday, Tuesday, Wednesday). Differential backups would only need the last full plus the most recent differential (C), but incrementals require all in sequence.
    refs:
      - "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-062"
    difficulty: "easy"
    tags: ["domain7", "operations", "separation-of-duties"]
    question: "Why should the person who requests a new user account NOT be the same person who approves and creates it?"
    choices:
      - "A. Separation of duties prevents any single individual from having unchecked control over a critical process"
      - "B. It ensures faster account creation through parallelism"
      - "C. It is required only by HIPAA and no other regulation"
      - "D. It reduces the number of accounts that need to be created"
    answerIndex: 0
    explanation: >-
      Separation of duties ensures no single person can initiate and complete a critical action, reducing the risk of fraud, errors, and abuse. It does not necessarily speed up processes (B). It is a general security principle in many frameworks, not just HIPAA (C). It does not reduce account volume (D).
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
    author: "ThanhNguyxn"

  # Domain 8: Software Development Security (~8 questions)
  - id: "cissp-expand-063"
    difficulty: "medium"
    tags: ["domain8", "sdlc", "secure-coding"]
    question: "A web application directly concatenates user input into SQL queries. What vulnerability does this create?"
    choices:
      - "A. SQL injection"
      - "B. Cross-site scripting (XSS)"
      - "C. Cross-site request forgery (CSRF)"
      - "D. Buffer overflow"
    answerIndex: 0
    explanation: >-
      Directly concatenating user input into SQL queries allows attackers to inject malicious SQL commands. XSS (B) involves injecting scripts into web pages. CSRF (C) tricks authenticated users into making unintended requests. Buffer overflows (D) occur when data exceeds allocated memory bounds.
    refs:
      - "https://owasp.org/www-community/attacks/SQL_Injection"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-064"
    difficulty: "hard"
    tags: ["domain8", "sdlc", "threat-modeling"]
    question: "A development team uses STRIDE to perform threat modeling on a new microservices application. Which threat category addresses the risk of a user denying they performed a transaction?"
    choices:
      - "A. Repudiation"
      - "B. Spoofing"
      - "C. Tampering"
      - "D. Information Disclosure"
    answerIndex: 0
    explanation: >-
      In STRIDE, Repudiation is the threat of a user denying they performed an action, countered by logging and digital signatures. Spoofing (B) involves impersonating another entity. Tampering (C) is unauthorized modification of data. Information Disclosure (D) is unauthorized access to data.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://owasp.org/www-community/Threat_Modeling"
    author: "ThanhNguyxn"

  - id: "cissp-expand-065"
    difficulty: "easy"
    tags: ["domain8", "sdlc", "testing"]
    question: "A tester is given the application's source code and full documentation before testing. What type of testing is this?"
    choices:
      - "A. White-box testing (full knowledge)"
      - "B. Black-box testing (zero knowledge)"
      - "C. Gray-box testing (partial knowledge)"
      - "D. Regression testing"
    answerIndex: 0
    explanation: >-
      White-box testing provides the tester with complete access to source code, architecture, and documentation. Black-box (B) provides no internal knowledge. Gray-box (C) provides partial information. Regression testing (D) verifies that changes have not broken existing functionality, regardless of knowledge level.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-115/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-066"
    difficulty: "medium"
    tags: ["domain8", "sdlc", "api-security"]
    question: "A REST API returns detailed error messages including stack traces and database schema information in production. What security principle does this violate?"
    choices:
      - "A. Fail securely — errors should not reveal internal implementation details"
      - "B. Defense in depth — multiple layers of API gateways are needed"
      - "C. Least privilege — the API has too many permissions"
      - "D. Separation of duties — developers should not deploy to production"
    answerIndex: 0
    explanation: >-
      Detailed error messages in production reveal internal architecture, enabling reconnaissance for targeted attacks. Applications should fail securely by returning generic error messages to users while logging details internally. This is an information disclosure issue, not a privilege (C) or deployment process (D) problem.
    refs:
      - "https://owasp.org/www-project-web-security-testing-guide/"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-067"
    difficulty: "hard"
    tags: ["domain8", "sdlc", "supply-chain"]
    question: "A software company discovers that a widely-used open-source library included in their product has a known backdoor. What supply chain security practice would have BEST mitigated this risk?"
    choices:
      - "A. Software composition analysis (SCA) with continuous monitoring of dependencies for known vulnerabilities"
      - "B. Only using proprietary software with no open-source components"
      - "C. Trusting all packages from major package registries without verification"
      - "D. Manually reviewing every line of code in all open-source dependencies"
    answerIndex: 0
    explanation: >-
      SCA tools automatically inventory dependencies and cross-reference them against vulnerability databases, providing continuous monitoring. Avoiding all open source (B) is impractical and does not eliminate supply chain risk from proprietary vendors. Blind trust (C) is the opposite of secure supply chain practice. Manual review of all code (D) is impractical at scale.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-218/final"
    author: "ThanhNguyxn"

  - id: "cissp-expand-068"
    difficulty: "medium"
    tags: ["domain8", "database-security", "injection"]
    question: "What is the MOST effective defense against SQL injection attacks?"
    choices:
      - "A. Use parameterized queries (prepared statements) for all database interactions"
      - "B. Validate input by checking for SQL keywords and blocking them"
      - "C. Use stored procedures without parameterization"
      - "D. Implement a web application firewall as the sole defense"
    answerIndex: 0
    explanation: >-
      Parameterized queries separate SQL logic from user input, making injection structurally impossible. Keyword filtering (B) can be bypassed with encoding and alternative syntax. Unparameterized stored procedures (C) can still be vulnerable. WAFs (D) provide a defense layer but should not be the sole protection.
    refs:
      - "https://owasp.org/www-community/attacks/SQL_Injection"
      - "https://www.isc2.org/certifications/cissp"
    author: "ThanhNguyxn"

  - id: "cissp-expand-069"
    difficulty: "easy"
    tags: ["domain8", "sdlc", "maturity"]
    question: "In the Capability Maturity Model Integration (CMMI), at which level are processes documented, standardized, and integrated across the organization?"
    choices:
      - "A. Level 3 — Defined"
      - "B. Level 1 — Initial"
      - "C. Level 2 — Managed"
      - "D. Level 5 — Optimizing"
    answerIndex: 0
    explanation: >-
      CMMI Level 3 (Defined) means processes are documented, standardized, and consistent across the organization. Level 1 (B) is ad hoc and unpredictable. Level 2 (C) has managed processes at the project level but not standardized. Level 5 (D) focuses on continuous process optimization.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://cmmiinstitute.com/"
    author: "ThanhNguyxn"

  - id: "cissp-expand-070"
    difficulty: "hard"
    tags: ["domain8", "sdlc", "ai-security"]
    question: "A company deploys a machine learning model that makes loan approval decisions. An adversary subtly modifies training data to bias the model against certain demographics. What type of attack is this?"
    choices:
      - "A. Data poisoning attack"
      - "B. Model inversion attack"
      - "C. Denial of service attack"
      - "D. Brute force attack"
    answerIndex: 0
    explanation: >-
      Data poisoning involves manipulating training data to corrupt the model's behavior, introducing biased or incorrect outputs. Model inversion (B) extracts sensitive training data from a deployed model. DoS (C) disrupts availability. Brute force (D) systematically tries all possible inputs to find valid credentials or keys.
    refs:
      - "https://www.isc2.org/certifications/cissp"
      - "https://csrc.nist.gov/publications/detail/sp/800-218/final"
    author: "ThanhNguyxn"
