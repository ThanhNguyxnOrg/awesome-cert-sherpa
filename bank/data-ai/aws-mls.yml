    question: "A regulated team must ensure that only approved models can be deployed to production. They want an auditable workflow where a model is registered after training, evaluated, and then requires a manual approval step before deployment automation runs. Which SageMaker capability best meets this requirement?"
    choices:
      - "A. SageMaker Model Registry with an approval status gate integrated into a CI/CD pipeline."
      - "B. Store model artifacts in an open S3 bucket so anyone can deploy quickly."
      - "C. Use AWS Glue to copy the model to multiple buckets and assume that implies approval."
      - "D. Disable CloudTrail so deployments cannot be changed after the fact."
    answerIndex: 0
    explanation: "Model Registry supports model versioning, metadata, and an approval status that can be used as a control point before automated deployment proceeds, creating an auditable release process. Option B is incorrect because making artifacts broadly accessible undermines least privilege and does not enforce an approval workflow."
