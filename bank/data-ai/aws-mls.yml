      - "D. Publish model metrics to CloudWatch and increase the endpoint instance size if metrics look worse."
    answerIndex: 0
    explanation: "Production variants with weights enable controlled traffic shifting and quick rollback by adjusting weights back to 100/0, which supports A/B or canary deployments. Option B is incorrect because a full replacement introduces higher risk and rollback is slower and more error-prone than changing variant weights on an existing endpoint."
