  - id: "mls-deploy-006"
    difficulty: "easy"
    tags: ["async-inference", "spiky-traffic", "large-payloads", "sagemaker"]
    question: "A model endpoint receives unpredictable bursts of requests and some requests include large payloads that may take several seconds to process. The team wants to avoid request timeouts and handle backpressure. Which SageMaker inference option is best?"
    choices:
      - "A. SageMaker Asynchronous Inference to queue requests and return results when ready."
      - "B. Batch Transform because it requires manual start/stop for every request."
      - "C. Serverless endpoints with a hard-coded 50 MB synchronous request body limit for all cases."
      - "D. Running inference only inside AWS Glue jobs to ensure queueing."
    answerIndex: 0
    explanation: "Asynchronous Inference is designed for long-running inference and spiky traffic by queueing requests and providing outputs asynchronously, which reduces client timeouts. Option D is incorrect because Glue is an ETL service and is not intended as an online inference mechanism with request/response semantics."
    refs:
      - "https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html"
      - "https://docs.aws.amazon.com/sagemaker/latest/dg/"
    author: "ThanhNguyxn"
