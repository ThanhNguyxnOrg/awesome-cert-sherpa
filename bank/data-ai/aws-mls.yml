    difficulty: "medium"
    tags: ["multi-model-endpoints", "cost-optimization", "hosting", "sagemaker"]
    question: "A company serves thousands of small customer-specific models (one per tenant). Traffic per tenant is low and unpredictable. The team wants to reduce hosting cost and avoid thousands of separate endpoints. What should they use?"
    choices:
      - "A. SageMaker multi-model endpoints to host many models behind a single endpoint and load models on demand."
      - "B. One real-time endpoint per tenant to isolate traffic and keep each model always loaded."
      - "C. Train a separate model per request and delete it after returning a prediction."
      - "D. Use AWS Glue to deploy models into the Glue Data Catalog for online inference."
    answerIndex: 0
    explanation: "Multi-model endpoints let you host many models behind one endpoint and dynamically load them as needed, which is cost-effective for many low-traffic models. Option B is incorrect because maintaining thousands of always-on endpoints typically increases cost and management overhead significantly."
