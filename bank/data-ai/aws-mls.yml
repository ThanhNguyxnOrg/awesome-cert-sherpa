  - id: "mls-deploy-003"
    difficulty: "hard"
    tags: ["ab-testing", "production-variants", "canary", "sagemaker-endpoints"]
    question: "A team wants to compare a new model to the current production model using real user traffic. They need to route 10% of requests to the new model, measure performance, and roll back instantly if errors increase. Which SageMaker deployment feature should they use?"
    choices:
      - "A. Configure a single SageMaker endpoint with multiple production variants and set variant weights (for example, 90/10) for traffic shifting."
      - "B. Replace the production endpoint with the new model and keep a copy of the old model artifact in S3 for manual rollback."
      - "C. Use Batch Transform on a small sample and assume it represents production traffic patterns."
      - "D. Publish model metrics to CloudWatch and increase the endpoint instance size if metrics look worse."
    answerIndex: 0
    explanation: "Production variants with weights enable controlled traffic shifting and quick rollback by adjusting weights back to 100/0, which supports A/B or canary deployments. Option B is incorrect because a full replacement introduces higher risk and rollback is slower and more error-prone than changing variant weights on an existing endpoint."
    refs:
      - "https://docs.aws.amazon.com/sagemaker/latest/dg/deploy-model.html"
      - "https://docs.aws.amazon.com/sagemaker/latest/dg/"
    author: "ThanhNguyxn"

  - id: "mls-deploy-004"
    difficulty: "medium"
    tags: ["model-monitor", "data-drift", "monitoring", "cloudwatch"]
    question: "After deploying a model, a team worries that production feature distributions may drift from training data, causing degraded accuracy. They want automated monitoring that captures data, compares to a baseline, and publishes alerts. What should they use?"
    choices:
      - "A. SageMaker Model Monitor with baseline constraints and a monitoring schedule that publishes metrics to Amazon CloudWatch."
      - "B. AWS Glue crawlers to detect drift by updating the table schema daily."
      - "C. Amazon S3 Lifecycle rules to move old inference logs to Glacier."
      - "D. Amazon Kinesis Data Firehose to compress logs before storing them."
    answerIndex: 0
    explanation: "Model Monitor can establish baselines from training data, run scheduled monitoring jobs, and emit drift and constraint metrics to CloudWatch for alerting. Option B is incorrect because schema inference does not measure statistical drift in feature values or detect shifts in distributions that affect model performance."
    refs:
      - "https://docs.aws.amazon.com/sagemaker/latest/dg/model-monitor.html"
      - "https://docs.aws.amazon.com/sagemaker/latest/dg/"
    author: "ThanhNguyxn"

