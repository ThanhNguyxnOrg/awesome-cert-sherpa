    question: "A team wants to compare a new model to the current production model using real user traffic. They need to route 10% of requests to the new model, measure performance, and roll back instantly if errors increase. Which SageMaker deployment feature should they use?"
    choices:
      - "A. Configure a single SageMaker endpoint with multiple production variants and set variant weights (for example, 90/10) for traffic shifting."
