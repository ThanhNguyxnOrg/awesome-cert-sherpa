  - id: "tf-extra-002"
    difficulty: "easy"
    tags: ["workspaces", "state", "cli"]
    question: "You want to keep separate state instances for dev and prod using the same configuration directory. Which Terraform CLI feature provides this capability?"
    choices:
      - "A. CLI workspaces"
      - "B. terraform console"
      - "C. terraform fmt"
      - "D. provider aliases"
    answerIndex: 0
    explanation: "Workspaces allow multiple distinct state snapshots for the same configuration, commonly used for environment separation. Provider aliases create multiple provider instances, but they do not create separate state instances by themselves."
    refs:
