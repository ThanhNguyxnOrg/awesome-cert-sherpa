      - "C. Store prod state locally and dev state remotely"
      - "D. Disable state locking in prod to reduce complexity"
    answerIndex: 0
    explanation: "Workspaces are best when the configuration is the same and only the state differs; if the desired topology and providers differ substantially, separate roots reduce complexity and risk. Disabling locking or mixing local/remote state patterns increases operational risk and does not solve configuration divergence."
