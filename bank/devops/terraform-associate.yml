    question: "A Terraform run crashed and left the remote state locked. Another engineer wants to immediately run force-unlock. What is the key risk to consider before doing this?"
    choices:
      - "A. A still-running operation could be writing state, and force-unlock could allow concurrent writes"
      - "B. force-unlock permanently deletes all state"
      - "C. force-unlock changes provider versions automatically"
      - "D. force-unlock re-creates all resources"
    answerIndex: 0
    explanation: "Force-unlocking should be done only when you are sure no other Terraform operation is active, because concurrent state writes can corrupt state. It does not delete state or recreate infrastructure by itself, but it removes the safety barrier against concurrency."
    refs:
      - "https://developer.hashicorp.com/terraform/language/state/locking"
      - "https://developer.hashicorp.com/terraform/cli/commands/force-unlock"
