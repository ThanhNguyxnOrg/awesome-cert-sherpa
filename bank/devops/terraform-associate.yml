  - id: "tf-extra-003"
    difficulty: "easy"
    tags: ["state", "locking", "concurrency"]
    question: "Two engineers run Terraform at the same time and one run fails with an error indicating the state is locked. What does state locking prevent?"
    choices:
      - "A. Concurrent state writes that can corrupt or overwrite updates"
      - "B. Providers from being downloaded"
      - "C. HCL configuration from being formatted"
      - "D. Modules from having outputs"
    answerIndex: 0
    explanation: "State locking prevents multiple operations from writing state simultaneously, which can lead to lost updates and broken infrastructure tracking. It does not affect provider downloads or formatting operations."
    refs:
      - "https://developer.hashicorp.com/terraform/language/state/locking"
    author: "ThanhNguyxn"

  - id: "tf-extra-004"
    difficulty: "easy"
    tags: ["for_each", "count", "addressing"]
    question: "A resource uses count with a list, and inserting a new list element causes many destroy/create changes due to index shifts. Which change most directly improves instance address stability?"
    choices:
      - "A. Switch from count to for_each with stable keys"
      - "B. Add depends_on to all resources"
      - "C. Run terraform taint on every resource"
      - "D. Use terraform refresh-only before every apply"
    answerIndex: 0
    explanation: "for_each uses keys for identity, so changing collection order does not remap instances like count indexes do. depends_on and refresh-only do not change how instances are addressed in state and therefore do not prevent index churn."
    refs:
      - "https://developer.hashicorp.com/terraform/language/meta-arguments/for_each"
      - "https://developer.hashicorp.com/terraform/language/meta-arguments/count"
    author: "ThanhNguyxn"

