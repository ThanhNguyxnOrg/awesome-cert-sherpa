      - "D. nfs"
    answerIndex: 0
    explanation: "A projected volume maps several existing volume sources (Secrets, ConfigMaps, serviceAccountToken, downwardAPI) into a single directory. emptyDir is empty at creation and hostPath mounts a node directory."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/projected-volumes/"
    author: "ThanhNguyxn"

  - id: "cka-expand-050"
    difficulty: "hard"
    tags: ["networking", "ingress", "path-matching"]
    question: "An Ingress defines pathType: Exact with path '/api'. Which requests match this rule?"
    choices:
      - "A. Only requests with path exactly '/api'"
      - "B. Requests with paths '/api', '/api/', and '/api/v1'"
      - "C. Requests with paths starting with '/api'"
      - "D. Requests with path '/api' case-insensitively"
    answerIndex: 0
    explanation: "pathType: Exact matches the URL path exactly and is case-sensitive. Only '/api' matches — not '/api/', '/api/v1', or '/API'. Use pathType: Prefix for prefix-based matching."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/ingress/#path-types"
    author: "ThanhNguyxn"

  - id: "cka-expand-051"
    difficulty: "medium"
    tags: ["workloads", "pod", "security-context"]
    question: "You need to ensure a container runs as a non-root user. Which Pod spec field enforces this?"
    choices:
      - "A. spec.containers[*].securityContext.runAsNonRoot: true"
      - "B. spec.containers[*].securityContext.privileged: false"
      - "C. spec.containers[*].securityContext.readOnlyRootFilesystem: true"
      - "D. spec.containers[*].resources.limits.user: non-root"
    answerIndex: 0
    explanation: "runAsNonRoot: true instructs the kubelet to validate that the container does not run as UID 0 (root). If the container attempts to run as root, it fails. privileged: false restricts capabilities but does not prevent root."
    refs:
      - "https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod"
    author: "ThanhNguyxn"

  - id: "cka-expand-052"
    difficulty: "hard"
    tags: ["cluster-architecture", "scheduling", "affinity"]
    question: "A Pod spec has requiredDuringSchedulingIgnoredDuringExecution node affinity for label 'zone=us-east-1a'. No nodes have this label. What happens?"
    choices:
      - "A. The Pod remains Pending indefinitely until a matching node is available"
      - "B. The Pod is scheduled to a random node and the affinity is ignored"
      - "C. The Pod fails with a validation error"
      - "D. The scheduler removes the affinity rule and schedules normally"
    answerIndex: 0
    explanation: "requiredDuringSchedulingIgnoredDuringExecution is a hard requirement. The scheduler will not place the Pod on any node that does not match, so it stays Pending. preferredDuringScheduling would allow fallback."
    refs:
      - "https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity"
    author: "ThanhNguyxn"

  - id: "cka-expand-053"
    difficulty: "easy"
    tags: ["workloads", "secret", "configuration"]
    question: "Which command creates a Secret named 'db-creds' with a key 'password' and value 'S3cret!' imperatively?"
    choices:
      - "A. kubectl create secret generic db-creds --from-literal=password=S3cret!"
      - "B. kubectl create secret tls db-creds --password=S3cret!"
      - "C. kubectl apply secret db-creds --data password=S3cret!"
      - "D. kubectl set secret db-creds password S3cret!"
    answerIndex: 0
    explanation: "kubectl create secret generic creates an Opaque Secret with key-value pairs provided via --from-literal. The tls type requires cert and key files. The apply and set commands do not support this syntax."
    refs:
      - "https://kubernetes.io/docs/tasks/configmap-secret/managing-secret-using-kubectl/#create-a-secret"
    author: "ThanhNguyxn"

  - id: "cka-expand-054"
    difficulty: "medium"
    tags: ["troubleshooting", "node", "drain"]
    question: "You need to perform maintenance on a node. Which command safely evicts all Pods and marks the node unschedulable?"
    choices:
      - "A. kubectl drain <node> --ignore-daemonsets --delete-emptydir-data"
      - "B. kubectl cordon <node>"
      - "C. kubectl delete node <node>"
      - "D. kubectl taint node <node> maintenance=true:NoExecute"
    answerIndex: 0
    explanation: "kubectl drain evicts all Pods (respecting PDBs), cordons the node, and marks it unschedulable. --ignore-daemonsets is needed because DaemonSet Pods cannot be evicted. kubectl cordon only prevents new Pods without evicting existing ones."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/safely-drain-node/"
    author: "ThanhNguyxn"

  - id: "cka-expand-055"
    difficulty: "hard"
    tags: ["cluster-architecture", "pdb", "availability"]
    question: "A Deployment has 3 replicas and a PodDisruptionBudget with minAvailable: 2. You attempt to drain a node running 2 of these Pods. What happens?"
    choices:
      - "A. Only one Pod is evicted; the second eviction is blocked until the first Pod is rescheduled and Ready"
      - "B. Both Pods are evicted simultaneously"
      - "C. The drain command fails immediately without evicting any Pods"
      - "D. Both Pods are evicted and the PDB is violated"
    answerIndex: 0
    explanation: "The PDB ensures at least 2 Pods remain available. With 3 total replicas and 2 on the drained node, only 1 can be evicted initially. The drain blocks on the second Pod until the first is rescheduled and Ready, maintaining the PDB constraint."
    refs:
      - "https://kubernetes.io/docs/concepts/workloads/pods/disruptions/#pod-disruption-budgets"
    author: "ThanhNguyxn"

  - id: "cka-expand-056"
    difficulty: "medium"
    tags: ["workloads", "horizontal-pod-autoscaler", "scaling"]
    question: "An HPA targets 50% average CPU utilization for a Deployment with current average utilization at 80%. What does the HPA do?"
    choices:
      - "A. Increases the replica count to bring the average CPU utilization closer to 50%"
      - "B. Decreases the replica count to save resources"
      - "C. Sends an alert but takes no scaling action"
      - "D. Vertically scales the Pods by increasing CPU limits"
    answerIndex: 0
    explanation: "When current utilization (80%) exceeds the target (50%), the HPA calculates the desired replicas using the formula: desiredReplicas = ceil(currentReplicas * (currentUtilization / targetUtilization)) and scales up."
    refs:
      - "https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/#algorithm-details"
    author: "ThanhNguyxn"

  - id: "cka-expand-057"
    difficulty: "easy"
    tags: ["cluster-architecture", "label", "selector"]
    question: "Which kubectl command shows all Pods with the label 'env=production' across all namespaces?"
    choices:
      - "A. kubectl get pods -l env=production -A"
      - "B. kubectl find pods --label env=production"
      - "C. kubectl search pods env=production --all"
      - "D. kubectl list pods --selector env=production --global"
    answerIndex: 0
    explanation: "kubectl get pods -l env=production -A lists Pods matching the label selector across all namespaces. -l is the label selector flag and -A (or --all-namespaces) searches across all namespaces."
    refs:
      - "https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/#label-selectors"
    author: "ThanhNguyxn"

  - id: "cka-expand-058"
    difficulty: "hard"
    tags: ["networking", "service", "external-traffic"]
    question: "A NodePort Service has externalTrafficPolicy: Local. What happens when a request arrives at a node that has no matching Pods?"
    choices:
      - "A. The request is dropped and the client receives no response"
      - "B. The request is forwarded to a node that has matching Pods"
      - "C. The Service returns a 503 error"
      - "D. kube-proxy load-balances to all Pods in the cluster"
    answerIndex: 0
    explanation: "With externalTrafficPolicy: Local, kube-proxy only routes to Pods on the local node. If no local Pods exist, the request is dropped. This preserves the client source IP but requires proper load balancer health checks."
    refs:
      - "https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip"
    author: "ThanhNguyxn"

  - id: "cka-expand-059"
    difficulty: "medium"
    tags: ["storage", "pvc", "volume-expansion"]
    question: "A StorageClass has allowVolumeExpansion: true. After increasing a PVC's requested storage from 10Gi to 20Gi, the PV size increases but the filesystem inside the Pod still shows 10Gi. What is needed?"
    choices:
      - "A. The Pod must be restarted to trigger filesystem resize for some storage drivers"
      - "B. Run resize2fs manually inside the container"
      - "C. Delete and recreate the PV with the larger size"
      - "D. Nothing — the filesystem will resize automatically within seconds"
    answerIndex: 0
    explanation: "Some CSI drivers require the Pod to be restarted (or the volume to be re-attached) to trigger filesystem expansion. The PV size increases immediately but the filesystem resize may require a Pod restart depending on the driver."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/persistent-volumes/#expanding-persistent-volumes-claims"
    author: "ThanhNguyxn"

  - id: "cka-expand-060"
    difficulty: "hard"
    tags: ["troubleshooting", "cluster-architecture", "static-pods"]
    question: "A static Pod managed by the kubelet has been modified in /etc/kubernetes/manifests/ but the changes are not reflected in the running Pod. What should you check?"
    choices:
      - "A. Verify the kubelet's --pod-manifest-path points to the correct directory and check kubelet logs for errors"
      - "B. Run kubectl apply -f to force-update the static Pod"
      - "C. Delete the mirror Pod in the API server to trigger re-creation"
      - "D. Restart the kube-scheduler to re-evaluate the Pod"
    answerIndex: 0
    explanation: "The kubelet watches the manifest directory and should detect file changes. If changes are not reflected, verify the staticPodPath configuration and check kubelet logs. kubectl apply does not manage static Pods — they are kubelet-managed."
    refs:
      - "https://kubernetes.io/docs/tasks/configure-pod-container/static-pod/"
    author: "ThanhNguyxn"
