      - "C. A nodeSelector for dedicated=batch only"
      - "D. A PodDisruptionBudget with maxUnavailable: 1"
    answerIndex: 0
    explanation: "NoExecute tolerations support tolerationSeconds, which controls how long a Pod may remain on a tainted node before eviction. NoSchedule does not evict running Pods, and nodeSelector alone does not implement time-bound eviction behavior."
