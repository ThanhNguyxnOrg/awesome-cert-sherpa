meta:
  category: "devops"
  cert: "CKA"
  vendor: "CNCF"
  version: 1
  description: "Original practice questions for Certified Kubernetes Administrator (CKA)"
questions:
  - id: "cka-v1-d1-001"
    difficulty: "medium"
    tags: ["rbac", "authorization", "namespace"]
    question: "A platform team wants developers in namespace team-a to view Pods and Pod logs but not modify any resources. What is the safest configuration?"
    choices:
      - "A. Create a Role in team-a with get/list/watch on pods and pods/log, then bind it with a RoleBinding."
      - "B. Create a ClusterRoleBinding that grants cluster-admin to the developer group."
      - "C. Add developers to the system:masters group for temporary access."
      - "D. Disable RBAC and rely on namespace naming conventions."
    answerIndex: 0
    explanation: "A namespaced Role plus RoleBinding provides least-privilege access scoped to team-a. It gives read-only access to pods and logs without cluster-wide permissions. Options B and C are over-privileged, and D removes an essential security control."
    refs:
      - "https://kubernetes.io/docs/reference/access-authn-authz/rbac/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d1-002"
    difficulty: "easy"
    tags: ["kubeadm", "cluster-bootstrap", "node-join"]
    question: "A new worker node fails to join because the bootstrap token used yesterday has expired. What should the administrator do next?"
    choices:
      - "A. Generate a new kubeadm token on the control plane and rerun kubeadm join with the current discovery-token-ca-cert-hash."
      - "B. Copy /etc/kubernetes/admin.conf to the worker and restart kubelet."
      - "C. Run kubeadm reset on the control plane and recreate the cluster."
      - "D. Delete the Node object and wait for automatic bootstrap."
    answerIndex: 0
    explanation: "kubeadm join requires a valid bootstrap token for discovery and TLS bootstrapping. Creating a fresh token and re-running join is the standard recovery path. Copying admin kubeconfig to workers bypasses proper node bootstrap and is insecure."
    refs:
      - "https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/#join-nodes"
    author: "ThanhNguyxn"

  - id: "cka-v1-d1-003"
    difficulty: "hard"
    tags: ["kubeadm", "ha", "control-plane"]
    question: "In a kubeadm HA cluster, kubelets still point to one control-plane node IP. When that node fails, node-to-API communication breaks. What should be fixed?"
    choices:
      - "A. Configure a stable controlPlaneEndpoint backed by a load balancer and ensure kubeconfigs use that endpoint."
      - "B. Expose kube-apiserver as NodePort on each control-plane node."
      - "C. Run kubectl proxy on every worker and target localhost."
      - "D. Increase etcd election timeout and leave kubelet configs unchanged."
    answerIndex: 0
    explanation: "HA control planes require one stable API endpoint, typically a load balancer DNS name. kubelets and admins should target that endpoint so single-node failure does not break control-plane access. NodePort and ad-hoc proxies are not a correct HA design for the Kubernetes API."
    refs:
      - "https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d1-004"
    difficulty: "hard"
    tags: ["helm", "kustomize", "release-management"]
    question: "Your team deploys a third-party Helm chart but must inject a consistent production security patch without forking upstream templates. Which approach is most maintainable?"
    choices:
      - "A. Fork the chart repository and edit chart templates directly for each release."
      - "B. Keep Helm for chart upgrades and apply a Kustomize overlay as a post-render step for environment patches."
      - "C. Use kubectl edit on live resources after every helm install."
      - "D. Render manifests once and stop upgrading the chart."
    answerIndex: 1
    explanation: "Using Helm for packaging plus Kustomize overlays keeps upgrade flow clean while applying controlled environment-specific changes. This reduces drift from upstream chart updates. Forking templates or manual live edits increases long-term maintenance risk."
    refs:
      - "https://kubernetes.io/docs/concepts/cluster-administration/manage-deployment/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d1-005"
    difficulty: "medium"
    tags: ["csi", "storageclass", "dynamic-provisioning"]
    question: "A PVC using StorageClass fast-ssd stays Pending with event 'waiting for a volume to be created, either by external provisioner or manually created by system administrator'. What is the best action?"
    choices:
      - "A. Verify the CSI provisioner/controller for that StorageClass is installed and running, and that the provisioner name matches."
      - "B. Restart kube-scheduler to rebind the PVC."
      - "C. Change the application Service from ClusterIP to NodePort."
      - "D. Cordon all worker nodes and recreate the Deployment."
    answerIndex: 0
    explanation: "That event usually indicates the external volume provisioner is missing, misconfigured, or not matching the StorageClass provisioner field. Checking CSI controller and node components is the correct path. Scheduler and Service settings do not create persistent volumes."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/storage-classes/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d1-006"
    difficulty: "medium"
    tags: ["cni", "network-plugin", "node-troubleshooting"]
    question: "After adding a new worker node, every Pod scheduled there remains in ContainerCreating with network plugin initialization errors. What should you do first?"
    choices:
      - "A. Confirm the CNI plugin is installed correctly on that node and its DaemonSet is Running cluster-wide."
      - "B. Delete CoreDNS Pods to force DNS regeneration."
      - "C. Change kube-proxy mode from iptables to userspace."
      - "D. Restart kube-controller-manager on all control-plane nodes."
    answerIndex: 0
    explanation: "Pod sandbox networking is initialized by the CNI plugin on each node. If binaries, config, or CNI DaemonSet state is broken, pods cannot start networking and stay in ContainerCreating. DNS or controller-manager restarts do not resolve node-local CNI initialization."
    refs:
      - "https://kubernetes.io/docs/concepts/extend-kubernetes/compute-storage-net/network-plugins/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d1-007"
    difficulty: "medium"
    tags: ["cri", "containerd", "kubelet"]
    question: "A node migrated from Docker to containerd becomes NotReady, and kubelet logs show runtime service connection failures. What is the likely fix?"
    choices:
      - "A. Point kubelet to the containerd CRI socket and restart kubelet."
      - "B. Re-enable dockershim and leave containerd unchanged."
      - "C. Change cluster DNS domain from cluster.local to local.cluster."
      - "D. Remove imagePullSecrets from all namespaces."
    answerIndex: 0
    explanation: "kubelet communicates with the runtime through CRI, so the runtime endpoint must match containerd after migration. Restarting kubelet applies the corrected endpoint configuration. Dockershim is deprecated and not the right recovery path."
    refs:
      - "https://kubernetes.io/docs/concepts/architecture/cri/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d1-008"
    difficulty: "hard"
    tags: ["crd", "operator", "controllers"]
    question: "Database backup requests are repeatedly handled by manual scripts. The platform team wants a Kubernetes-native, declarative workflow for this operation. What should they implement?"
    choices:
      - "A. Define a Backup custom resource with a CRD and run an Operator/controller that reconciles Backup objects into real backup jobs."
      - "B. Store backup commands in a ConfigMap and ask admins to run them manually."
      - "C. Add backup aliases to every engineer's shell profile."
      - "D. Patch the API server binary whenever backup logic changes."
    answerIndex: 0
    explanation: "CRDs extend the API, and operators implement reconciliation logic to continuously enforce desired state. This pattern is reliable, repeatable, and auditable for operational workflows like backups. Manual scripts and workstation conventions are not robust cluster automation."
    refs:
      - "https://kubernetes.io/docs/tasks/extend-kubernetes/custom-resources/custom-resource-definitions/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d2-001"
    difficulty: "easy"
    tags: ["deployment", "rollout", "rollback"]
    question: "A Deployment rollout in production introduces 500 errors right after an image update. What is the fastest safe rollback action?"
    choices:
      - "A. Run kubectl rollout undo on the Deployment in the affected namespace."
      - "B. Delete the newest ReplicaSet and manually scale older pods."
      - "C. Restart all worker node kubelets to clear cached images."
      - "D. Delete the namespace and redeploy from scratch."
    answerIndex: 0
    explanation: "Deployment rollout history enables immediate rollback to the previous stable ReplicaSet. kubectl rollout undo is the intended and safest command for this scenario. Deleting resources manually can cause unnecessary downtime and inconsistency."
    refs:
      - "https://kubernetes.io/docs/concepts/workloads/controllers/deployment/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d2-002"
    difficulty: "medium"
    tags: ["configmap", "secret", "pod-lifecycle"]
    question: "An app reads DB_PASSWORD from a Secret via environment variables. After rotating the Secret, the running Pods still use the old password. What should the admin do?"
    choices:
      - "A. Update the Secret and restart the Pods (or rollout restart the Deployment) so containers read the new env value."
      - "B. Wait; kubelet automatically rewrites running process environment variables from Secrets."
      - "C. Convert the Secret to a ConfigMap for instant hot reload."
      - "D. Recreate the Service to force Secret refresh."
    answerIndex: 0
    explanation: "Environment variables sourced from Secrets are set at container startup and are not live-updated in running processes. Restarting Pods is required for env-based secret consumption. Secret volumes can update files, but this specific pattern still needs a restart."
    refs:
      - "https://kubernetes.io/docs/concepts/configuration/secret/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d2-003"
    difficulty: "medium"
    tags: ["hpa", "metrics-server", "autoscaling"]
    question: "An HPA shows 'unknown' CPU utilization and never scales a busy Deployment. Which fix is most likely required?"
    choices:
      - "A. Install/verify metrics-server and ensure the target Pods have CPU requests set."
      - "B. Increase maxSurge on the Deployment strategy."
      - "C. Add a PodDisruptionBudget to the namespace."
      - "D. Convert the Deployment into a DaemonSet."
    answerIndex: 0
    explanation: "HPA depends on resource metrics and compares usage to requested CPU values. Without metrics-server or proper resource requests, utilization cannot be calculated correctly. Rollout strategy and PDB settings do not fix missing autoscaling inputs."
    refs:
      - "https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d2-004"
    difficulty: "hard"
    tags: ["scheduling", "node-affinity", "pod-anti-affinity"]
    question: "Compliance requires payment Pods to run only on nodes labeled pci=true and to avoid colocating replicas on the same node. Which scheduling setup meets both requirements?"
    choices:
      - "A. Use required nodeAffinity for pci=true and required podAntiAffinity on app=payment with topologyKey kubernetes.io/hostname."
      - "B. Use only nodeSelector pci=true and rely on default spreading."
      - "C. Taint all non-PCI nodes with NoExecute and remove requests/limits."
      - "D. Set priorityClassName to system-cluster-critical."
    answerIndex: 0
    explanation: "Required nodeAffinity enforces strict node eligibility, and required podAntiAffinity enforces separation of replicas by host. Together they satisfy both compliance and availability intent. nodeSelector alone cannot guarantee anti-colocation behavior."
    refs:
      - "https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d2-005"
    difficulty: "easy"
    tags: ["taints", "tolerations", "gpu"]
    question: "GPU nodes are tainted dedicated=gpu:NoSchedule, and a machine-learning Job remains Pending. What change should be made to the Job spec?"
    choices:
      - "A. Add a matching toleration for dedicated=gpu:NoSchedule and constrain scheduling to GPU nodes with selector or affinity."
      - "B. Remove the taint from all GPU nodes to simplify scheduling."
      - "C. Set imagePullPolicy to Always to bypass taints."
      - "D. Move the Job to kube-system so taints are ignored."
    answerIndex: 0
    explanation: "NoSchedule taints block pods unless they include matching tolerations. Adding toleration plus placement constraints is the standard dedicated-node pattern for special hardware. Removing taints globally weakens workload isolation."
    refs:
      - "https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d3-001"
    difficulty: "medium"
    tags: ["dns", "coredns", "service-discovery"]
    question: "A Pod cannot resolve kubernetes.default.svc.cluster.local, while the API server is reachable by IP. What should be checked first?"
    choices:
      - "A. CoreDNS Pod health and the kube-dns Service/endpoints in kube-system."
      - "B. Change the app Service type from ClusterIP to LoadBalancer."
      - "C. Restart etcd to rebuild DNS records."
      - "D. Add static DNS entries to each worker node /etc/hosts."
    answerIndex: 0
    explanation: "Cluster DNS resolution depends on CoreDNS and the kube-dns service endpoints. Verifying those components quickly identifies most name-resolution failures. Service type changes and host file hacks do not address root DNS component issues."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/dns-debugging-resolution/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d3-002"
    difficulty: "hard"
    tags: ["networkpolicy", "ingress", "namespace-isolation"]
    question: "A backend namespace has a default-deny ingress policy. You must allow traffic only from frontend Pods labeled app=web to backend Pods on TCP 8080. What is correct?"
    choices:
      - "A. Create a NetworkPolicy selecting backend Pods with an ingress rule from namespace/pod selectors and port 8080."
      - "B. Change backend Service to NodePort so frontend can reach it."
      - "C. Enable hostNetwork on backend Pods to bypass policy evaluation."
      - "D. Delete kube-proxy to force direct Pod routing."
    answerIndex: 0
    explanation: "With default deny in place, explicit allow rules are required. A NetworkPolicy with proper pod and namespace selectors on port 8080 provides minimal, targeted access. Service type and hostNetwork changes do not replace policy-based segmentation."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/network-policies/"
    author: "ThanhNguyxn"

  - id: "cka-extra-001"
    difficulty: "easy"
    tags: ["kubeadm", "upgrade", "control-plane"]
    question: "You need to upgrade a kubeadm cluster from v1.29 to v1.30. Which component on the control-plane node must be upgraded first before any other cluster component?"
    choices:
      - "A. kubeadm itself must be upgraded first, then used to plan and apply the control-plane upgrade."
      - "B. Upgrade kubelet on all worker nodes before touching the control plane."
      - "C. Upgrade CoreDNS manually before running any kubeadm commands."
      - "D. Replace the etcd binary directly and restart the systemd unit."
    answerIndex: 0
    explanation: "The documented upgrade sequence requires upgrading the kubeadm binary first, then running kubeadm upgrade plan and apply. This ensures the tool itself understands the target version before modifying control-plane static pod manifests. Worker kubelet upgrades come after the control plane is upgraded."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/kubeadm/kubeadm-upgrade/"
    author: "ThanhNguyxn"

  - id: "cka-extra-002"
    difficulty: "medium"
    tags: ["resources", "limits", "oom", "qos"]
    question: "A Java application Pod is repeatedly OOMKilled despite the JVM heap being set to 512Mi. The container memory limit is 512Mi. What is the root cause and fix?"
    choices:
      - "A. The JVM uses memory beyond heap (metaspace, thread stacks, native buffers). Increase the container memory limit above the JVM heap size."
      - "B. Reduce the JVM heap to 128Mi so the container limit is sufficient."
      - "C. Remove the memory limit entirely so the JVM can use unlimited node memory."
      - "D. Switch the container runtime from containerd to CRI-O to fix memory accounting."
    answerIndex: 0
    explanation: "JVM total memory consumption includes heap, metaspace, thread stacks, direct buffers, and GC overhead. A container limit equal to the heap alone leaves no room for non-heap allocations, causing the kernel OOM killer to terminate the process. The limit should account for total JVM memory footprint."
    refs:
      - "https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/"
    author: "ThanhNguyxn"

  - id: "cka-extra-003"
    difficulty: "hard"
    tags: ["etcd", "encryption", "secrets", "security"]
    question: "A security audit requires all Secret data to be encrypted at rest in etcd. After creating an EncryptionConfiguration with aescbc provider, existing Secrets in etcd remain unencrypted. How do you remediate this?"
    choices:
      - "A. Read and rewrite all existing Secrets using kubectl get secrets --all-namespaces -o json | kubectl replace -f - to force re-encryption."
      - "B. Restart etcd; it automatically re-encrypts all existing data on startup."
      - "C. Delete and recreate all Secrets manually from source."
      - "D. Change the encryption provider from aescbc to identity and restart kube-apiserver."
    answerIndex: 0
    explanation: "Encryption configuration only applies to new writes through the API server. Existing etcd data must be rewritten through the API to trigger encryption. A bulk read-and-replace forces each Secret through the API server write path with the new encryption provider. Simply restarting etcd does not re-encrypt stored data."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/encrypt-data/"
    author: "ThanhNguyxn"

  - id: "cka-extra-004"
    difficulty: "medium"
    tags: ["dns", "pod-dns-policy", "networking"]
    question: "A Pod with dnsPolicy set to Default resolves external domains but cannot resolve cluster services like my-svc.my-ns.svc.cluster.local. What change fixes in-cluster DNS resolution?"
    choices:
      - "A. Change dnsPolicy to ClusterFirst so the Pod uses CoreDNS for cluster-internal names."
      - "B. Add a hostAlias for every cluster service the Pod needs."
      - "C. Restart CoreDNS Pods to register the service."
      - "D. Set the Pod's dnsPolicy to None and leave dnsConfig empty."
    answerIndex: 0
    explanation: "dnsPolicy Default inherits the node's resolv.conf, which typically does not include the cluster DNS search domain. ClusterFirst directs queries to CoreDNS first, enabling resolution of cluster service names. Policy None without dnsConfig removes all DNS resolution capability."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/"
    author: "ThanhNguyxn"

  - id: "cka-extra-005"
    difficulty: "hard"
    tags: ["certificates", "kubeadm", "troubleshooting", "tls"]
    question: "After exactly one year without maintenance, kubectl commands fail with x509 certificate has expired. The cluster was bootstrapped with kubeadm. What is the correct recovery procedure?"
    choices:
      - "A. Run kubeadm certs renew all on the control-plane node, then restart control-plane static pods and regenerate kubeconfig files."
      - "B. Reinstall the cluster from scratch since expired certificates cannot be renewed."
      - "C. Set the system clock back one year to make certificates valid again."
      - "D. Delete the /etc/kubernetes/pki directory and let kubelet regenerate all certificates automatically."
    answerIndex: 0
    explanation: "kubeadm issues certificates with a one-year validity by default. The kubeadm certs renew command regenerates them using the existing CA. After renewal, static pods must be restarted to load new certificates, and admin kubeconfigs need regeneration. Clock manipulation is not a valid solution and deleting PKI would break the trust chain."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/kubeadm/kubeadm-certs/"
    author: "ThanhNguyxn"

  - id: "cka-extra-006"
    difficulty: "easy"
    tags: ["static-pods", "kubelet", "manifests"]
    question: "You need to run a critical monitoring agent as a static Pod on a specific node. Where should the Pod manifest be placed?"
    choices:
      - "A. In the directory configured by kubelet's staticPodPath (default /etc/kubernetes/manifests/) on that node."
      - "B. Applied via kubectl apply -f to the API server like any other Pod."
      - "C. Added as a container in the kube-scheduler static pod manifest."
      - "D. Stored in a ConfigMap in kube-system namespace."
    answerIndex: 0
    explanation: "Static Pods are managed directly by the kubelet on a specific node. Placing a manifest in the staticPodPath directory causes kubelet to create and manage the Pod independently of the API server. kubectl-applied Pods are not static pods and can be rescheduled to other nodes."
    refs:
      - "https://kubernetes.io/docs/tasks/configure-pod-container/static-pod/"
    author: "ThanhNguyxn"

  - id: "cka-extra-007"
    difficulty: "medium"
    tags: ["storage", "volume-snapshot", "csi", "backup"]
    question: "A database team needs point-in-time snapshots of a PVC before schema migrations. The CSI driver supports snapshots. What resources must be created to take a snapshot?"
    choices:
      - "A. A VolumeSnapshotClass referencing the CSI driver, and a VolumeSnapshot referencing the source PVC."
      - "B. A StorageClass with snapshot: true and a new PVC with the same name."
      - "C. A CronJob that runs dd to copy the block device."
      - "D. A ConfigMap containing the snapshot schedule and a matching DaemonSet."
    answerIndex: 0
    explanation: "Kubernetes volume snapshots require a VolumeSnapshotClass (analogous to StorageClass) that identifies the CSI snapshot driver, and a VolumeSnapshot object referencing the source PVC. The CSI external-snapshotter controller handles the actual snapshot creation. Manual dd or CronJob approaches bypass CSI and lack proper lifecycle management."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/volume-snapshots/"
    author: "ThanhNguyxn"

  - id: "cka-extra-008"
    difficulty: "hard"
    tags: ["rbac", "clusterrole", "aggregation", "authorization"]
    question: "You want all custom CRD resources with label rbac.example.com/aggregate-to-view: true to automatically appear in the built-in view ClusterRole. How should this be configured?"
    choices:
      - "A. Create a ClusterRole granting access to the CRD resources with label rbac.authorization.k8s.io/aggregate-to-view: true; the aggregation controller merges it into view."
      - "B. Edit the view ClusterRole directly and add rules for each CRD resource."
      - "C. Create a ClusterRoleBinding that binds the CRD resources to the view ClusterRole."
      - "D. Patch kube-apiserver with a flag to auto-aggregate all CRDs."
    answerIndex: 0
    explanation: "Built-in ClusterRoles like view, edit, and admin use aggregation rules that match labels on other ClusterRoles. Creating a new ClusterRole with the appropriate aggregation label causes the controller to merge its rules into the aggregate role automatically. Direct edits to built-in roles are overwritten during upgrades."
    refs:
      - "https://kubernetes.io/docs/reference/access-authn-authz/rbac/#aggregated-clusterroles"
    author: "ThanhNguyxn"

  - id: "cka-extra-009"
    difficulty: "medium"
    tags: ["coredns", "dns", "configmap", "forwarding"]
    question: "Applications in the cluster must resolve names in a private corporate domain corp.internal using internal DNS servers at 10.0.0.53. How should CoreDNS be configured?"
    choices:
      - "A. Add a forward block for corp.internal to 10.0.0.53 in the CoreDNS ConfigMap Corefile."
      - "B. Replace the default forward . /etc/resolv.conf with forward . 10.0.0.53 for all queries."
      - "C. Create a NetworkPolicy allowing DNS traffic only to 10.0.0.53."
      - "D. Add corp.internal to the cluster's clusterDomain kubelet configuration."
    answerIndex: 0
    explanation: "CoreDNS Corefile supports conditional forwarding by adding a server block for the specific domain pointing to the corporate DNS server. This preserves default resolution for all other domains while routing corp.internal queries correctly. Replacing the default forwarder would break resolution of public domains."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/dns-custom-nameservers/"
    author: "ThanhNguyxn"

  - id: "cka-extra-010"
    difficulty: "hard"
    tags: ["kubelet", "certificates", "rotation", "security"]
    question: "A long-running cluster has nodes whose kubelet client certificates are approaching expiration. The cluster uses kubeadm. How do you ensure kubelet certificates are renewed without manual intervention?"
    choices:
      - "A. Verify that kubelet is configured with rotateCertificates: true and the RotateKubeletClientCertificate feature is active so kubelet automatically requests new certificates."
      - "B. Manually copy new certificates from the control-plane PKI directory to each worker node."
      - "C. Delete the node objects and re-join them with kubeadm join."
      - "D. Set certificate validity to 100 years in the kubeadm ClusterConfiguration."
    answerIndex: 0
    explanation: "Kubelet certificate rotation automatically requests a new client certificate from the API server before the current one expires. This requires the rotateCertificates kubelet config flag and appropriate RBAC for the certificates API. Manual certificate copying is error-prone and does not scale."
    refs:
      - "https://kubernetes.io/docs/tasks/tls/certificate-rotation/"
    author: "ThanhNguyxn"

  - id: "cka-extra-011"
    difficulty: "medium"
    tags: ["pdb", "availability", "disruption", "scheduling"]
    question: "A critical three-replica stateless API must tolerate node drain during maintenance without downtime. What Kubernetes resource should be configured and with what setting?"
    choices:
      - "A. A PodDisruptionBudget with minAvailable: 2 (or maxUnavailable: 1) selecting the API Pods."
      - "B. A HorizontalPodAutoscaler with minReplicas: 3."
      - "C. A LimitRange in the namespace restricting Pod eviction."
      - "D. A ResourceQuota preventing Pod deletion in the namespace."
    answerIndex: 0
    explanation: "PodDisruptionBudgets control voluntary disruptions like node drains by ensuring a minimum number of Pods remain available. With three replicas and minAvailable: 2, the drain controller evicts at most one Pod at a time, maintaining service availability. HPA manages scaling, not disruption control."
    refs:
      - "https://kubernetes.io/docs/tasks/run-application/configure-pdb/"
    author: "ThanhNguyxn"

  - id: "cka-extra-012"
    difficulty: "hard"
    tags: ["kubeadm", "upgrade", "etcd", "control-plane"]
    question: "During a kubeadm upgrade apply, the process fails partway through leaving the API server on the new version but etcd on the old version. What is the safest recovery approach?"
    choices:
      - "A. Re-run kubeadm upgrade apply for the target version to resume the upgrade, as kubeadm is designed to be idempotent."
      - "B. Manually downgrade kube-apiserver by editing its static pod manifest to match the old etcd version."
      - "C. Delete the etcd data directory and restore from the last backup taken before the upgrade."
      - "D. Remove the node from the cluster and add a fresh control-plane node."
    answerIndex: 0
    explanation: "kubeadm upgrade apply is designed to be idempotent and can be safely re-run if it fails partway. It will detect the current state of each component and continue the upgrade from where it left off. Manual manifest edits during a partial upgrade risk version skew issues."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/kubeadm/kubeadm-upgrade/"
    author: "ThanhNguyxn"

  - id: "cka-extra-013"
    difficulty: "easy"
    tags: ["volumes", "emptydir", "storage", "pod-lifecycle"]
    question: "A sidecar container needs to share temporary log files with the main application container within the same Pod. Which volume type is most appropriate?"
    choices:
      - "A. emptyDir, which provides a shared temporary directory that exists for the lifetime of the Pod."
      - "B. persistentVolumeClaim, which requires a StorageClass and provisioner."
      - "C. hostPath pointing to /tmp on the node."
      - "D. configMap with binary data."
    answerIndex: 0
    explanation: "emptyDir is the simplest volume for sharing ephemeral data between containers in the same Pod. It is created when the Pod starts and deleted when the Pod is removed. PVCs add unnecessary complexity for temporary data, and hostPath introduces security and portability concerns."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/volumes/#emptydir"
    author: "ThanhNguyxn"

  - id: "cka-extra-014"
    difficulty: "medium"
    tags: ["endpointslice", "service", "networking", "scalability"]
    question: "After scaling a Deployment to 500 replicas, you notice the corresponding Endpoints object has become very large and updates are slow. What Kubernetes feature addresses this scalability concern?"
    choices:
      - "A. EndpointSlices, which split endpoint information across multiple smaller objects for better performance."
      - "B. Increasing the kube-proxy sync period to reduce update frequency."
      - "C. Switching the Service to ExternalName type to avoid endpoint tracking."
      - "D. Disabling endpoint reconciliation in kube-controller-manager."
    answerIndex: 0
    explanation: "EndpointSlices partition endpoint data into smaller, more manageable objects (default 100 endpoints per slice). This reduces the size of individual API objects and the volume of data transferred during updates, significantly improving performance for large Services. Increasing sync periods masks the problem without solving it."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/endpoint-slices/"
    author: "ThanhNguyxn"

  - id: "cka-extra-015"
    difficulty: "hard"
    tags: ["troubleshooting", "control-plane", "scheduler", "leader-election"]
    question: "In an HA cluster with three control-plane nodes, newly created Pods remain Pending indefinitely. The kube-scheduler Pods are Running on all three nodes, but scheduler logs show repeated leader election failures. What should you investigate?"
    choices:
      - "A. Check network connectivity between control-plane nodes and verify the kube-scheduler lease object in kube-system for stale holder identity."
      - "B. Delete all Pending Pods and recreate the Deployments."
      - "C. Increase the replica count of the affected Deployments to overcome the scheduling issue."
      - "D. Disable leader election by setting --leader-elect=false on all scheduler instances."
    answerIndex: 0
    explanation: "Leader election failures prevent any scheduler instance from becoming the active leader, halting all scheduling decisions. Network partitions between control-plane nodes or stale lease objects are common causes. Disabling leader election would cause multiple schedulers to make conflicting decisions, creating race conditions."
    refs:
      - "https://kubernetes.io/docs/reference/command-line-tools-reference/kube-scheduler/"
    author: "ThanhNguyxn"

  - id: "cka-extra-016"
    difficulty: "medium"
    tags: ["init-containers", "pod-lifecycle", "dependencies"]
    question: "An application Pod must wait for a database migration Job to complete before starting. The migration creates a specific database table. What is the Kubernetes-native approach to enforce this ordering?"
    choices:
      - "A. Add an init container that polls the database or checks for the migration completion signal before the main container starts."
      - "B. Set a higher priorityClassName on the application Pod."
      - "C. Use a preStop lifecycle hook on the migration Job."
      - "D. Add a finalizer to the application Pod that references the Job."
    answerIndex: 0
    explanation: "Init containers run sequentially before main containers start and can implement readiness gates such as polling a database for schema completion. This provides a clean ordering guarantee. Pod priority affects scheduling order, not startup sequencing between independent workloads."
    refs:
      - "https://kubernetes.io/docs/concepts/workloads/pods/init-containers/"
    author: "ThanhNguyxn"

  - id: "cka-extra-017"
    difficulty: "hard"
    tags: ["serviceaccount", "token", "security", "projected-volume"]
    question: "A security policy requires that ServiceAccount tokens be audience-bound, time-limited, and automatically rotated. The cluster currently uses legacy auto-mounted tokens stored as Secrets. What should be configured?"
    choices:
      - "A. Use projected ServiceAccount token volumes with specified audience and expirationSeconds, and set automountServiceAccountToken: false on the default ServiceAccount."
      - "B. Create a CronJob that deletes and recreates ServiceAccount token Secrets every hour."
      - "C. Configure kube-apiserver with --service-account-extend-token-expiration=false and take no other action."
      - "D. Mount the ServiceAccount token from a ConfigMap instead of a Secret."
    answerIndex: 0
    explanation: "Projected ServiceAccount token volumes use the TokenRequest API to issue time-limited, audience-bound tokens that kubelet automatically rotates before expiration. This is the modern replacement for legacy non-expiring Secret-based tokens. Disabling automount on the default SA prevents legacy token creation."
    refs:
      - "https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/"
    author: "ThanhNguyxn"

  - id: "cka-extra-018"
    difficulty: "easy"
    tags: ["troubleshooting", "image", "imagepullbackoff"]
    question: "A newly deployed Pod shows status ImagePullBackOff. The image name in the spec is myregistry.internal:5000/app:v2. What should you check first?"
    choices:
      - "A. Verify the image name and tag exist in the registry, and that imagePullSecrets with valid credentials are configured for the Pod's ServiceAccount."
      - "B. Increase the Pod's CPU request to allow faster image downloads."
      - "C. Change the Service type to LoadBalancer to improve registry connectivity."
      - "D. Delete the node's kubelet cache directory and reboot."
    answerIndex: 0
    explanation: "ImagePullBackOff indicates the container runtime failed to pull the specified image. Common causes are wrong image name/tag, missing or expired registry credentials in imagePullSecrets, or network connectivity to the registry. CPU requests and Service types do not affect image pulling."
    refs:
      - "https://kubernetes.io/docs/concepts/containers/images/"
    author: "ThanhNguyxn"

  - id: "cka-extra-019"
    difficulty: "medium"
    tags: ["job", "completions", "parallelism", "workloads"]
    question: "A batch workload must process exactly 10 items with at most 3 workers running concurrently. If any single item fails, the Job should retry that item up to 4 times before marking the Job as failed. How should the Job be configured?"
    choices:
      - "A. Set completions: 10, parallelism: 3, and backoffLimit: 4 in the Job spec."
      - "B. Create 10 separate Jobs each with parallelism: 1 and manage them with a CronJob."
      - "C. Use a Deployment with replicas: 3 and add a completions label."
      - "D. Set completions: 10 and parallelism: 10, and use a PodDisruptionBudget to limit concurrency."
    answerIndex: 0
    explanation: "The Job controller uses completions to track how many successful Pod completions are needed, parallelism to cap concurrent Pods, and backoffLimit to control retries before failure. This combination provides exact control over work distribution, concurrency, and failure tolerance in a single Job resource."
    refs:
      - "https://kubernetes.io/docs/concepts/workloads/controllers/job/"
    author: "ThanhNguyxn"

  - id: "cka-extra-020"
    difficulty: "hard"
    tags: ["kube-proxy", "ipvs", "networking", "performance"]
    question: "A cluster with over 5,000 Services experiences high latency in Service routing. kube-proxy is running in iptables mode. Network engineers recommend switching to IPVS mode. What must be verified before and during the transition?"
    choices:
      - "A. Ensure IPVS kernel modules (ip_vs, ip_vs_rr, ip_vs_wrr, ip_vs_sh, nf_conntrack) are loaded on all nodes, update the kube-proxy ConfigMap to mode ipvs, and restart kube-proxy Pods."
      - "B. Simply change the kube-proxy mode flag; IPVS modules are always available in Linux kernels."
      - "C. Install a new CNI plugin, as IPVS mode requires Calico specifically."
      - "D. Drain all nodes, switch the mode, and re-add them to the cluster one by one."
    answerIndex: 0
    explanation: "IPVS mode uses kernel-level load balancing with O(1) connection processing, but requires specific kernel modules to be loaded. The transition involves verifying module availability, updating the kube-proxy configuration, and rolling restart of kube-proxy. IPVS is CNI-agnostic and does not require full node drain."
    refs:
      - "https://kubernetes.io/docs/reference/networking/virtual-ips/"

  - id: "cka-v1-d3-003"
    difficulty: "easy"
    tags: ["service", "nodeport", "exposure"]
    question: "In an on-prem cluster without a cloud load balancer, you need temporary external access to an internal web app. Which Service type is appropriate?"
    choices:
      - "A. ClusterIP"
      - "B. NodePort"
      - "C. ExternalName"
      - "D. Headless Service"
    answerIndex: 1
    explanation: "NodePort exposes the service on a static port across all nodes, which works without cloud-provider integration. ClusterIP is internal only, and ExternalName only maps DNS names. Headless services do not provide node-level external exposure by themselves."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/service/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d3-004"
    difficulty: "medium"
    tags: ["ingress", "ingressclass", "controller"]
    question: "An NGINX Ingress controller is installed with class nginx, but a newly created Ingress never gets configured. What is the likely fix?"
    choices:
      - "A. Set spec.ingressClassName: nginx on the Ingress resource."
      - "B. Change the backing Service selector to app=nginx-ingress."
      - "C. Restart kubectl on the admin workstation."
      - "D. Enable hostPID in the backend Deployment."
    answerIndex: 0
    explanation: "Ingress controllers watch only resources matching their configured class. Setting ingressClassName ensures the NGINX controller picks up and programs routes. Service selector changes are unrelated to controller selection."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/ingress/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d3-005"
    difficulty: "medium"
    tags: ["gateway-api", "httproute", "traffic-routing"]
    question: "You are using Gateway API and need canary routing when HTTP header x-canary=true is present. Where should this rule be defined?"
    choices:
      - "A. In the Service object using selector-based header rules."
      - "B. In an HTTPRoute attached to the Gateway listener via parentRefs."
      - "C. In a ConfigMap referenced by kube-proxy."
      - "D. In a PodDisruptionBudget for the canary Deployment."
    answerIndex: 1
    explanation: "Gateway API places Layer-7 matching and routing logic in HTTPRoute resources. HTTPRoute rules can match headers and direct traffic to canary backends while attached to a Gateway listener. Services and PDBs do not define HTTP header routing."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/gateway/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d3-006"
    difficulty: "medium"
    tags: ["service", "endpoints", "selector"]
    question: "A Service exists, but client requests time out. Pods are Running, yet the Service has no endpoints. What is the most likely issue?"
    choices:
      - "A. Service selector labels do not match Pod labels, so endpoints are never populated."
      - "B. CoreDNS cache is stale and requires manual flush."
      - "C. The container image was built on a different Linux distro."
      - "D. The Service should be changed to type LoadBalancer immediately."
    answerIndex: 0
    explanation: "Endpoint objects are generated when Service selectors match running Pod labels. Empty endpoints with healthy pods strongly suggests selector mismatch. DNS cache or Service type changes cannot fix incorrect label selection."
    refs:
      - "https://kubernetes.io/docs/tasks/debug/debug-application/debug-service/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d4-001"
    difficulty: "medium"
    tags: ["storageclass", "pvc", "dynamic-provisioning"]
    question: "A PVC remains Pending in a cluster where no default StorageClass is configured. What is the correct remediation?"
    choices:
      - "A. Specify a valid storageClassName on the PVC or mark an existing StorageClass as default."
      - "B. Convert the PVC manifest into a ConfigMap and mount it."
      - "C. Set accessMode to ReadWriteMany regardless of backend capability."
      - "D. Restart kube-controller-manager and wait for automatic class creation."
    answerIndex: 0
    explanation: "Dynamic provisioning depends on a StorageClass and matching provisioner. Without a default class, PVCs need an explicit storageClassName or a defined default class. Access mode changes alone do not trigger provisioning."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/storage-classes/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d4-002"
    difficulty: "hard"
    tags: ["persistent-volumes", "access-modes", "rwx"]
    question: "A content service needs the same writable data mounted by multiple Pods across different nodes. Which storage approach is appropriate?"
    choices:
      - "A. hostPath volume with ReadWriteOnce"
      - "B. NFS or CSI-backed storage that supports ReadWriteMany, requested via a PVC"
      - "C. emptyDir volume with medium: Memory"
      - "D. local PersistentVolume tied to a single node"
    answerIndex: 1
    explanation: "Multi-node shared writes require a backend supporting ReadWriteMany. NFS or compatible CSI drivers are typical solutions for this access pattern. hostPath, emptyDir, and local node-bound volumes do not satisfy durable multi-node RWX requirements."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/persistent-volumes/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d4-003"
    difficulty: "medium"
    tags: ["pv", "pvc", "reclaim-policy"]
    question: "Before deleting a claim, an administrator must ensure underlying data is preserved for forensic analysis. Which PV setting is required?"
    choices:
      - "A. Set persistentVolumeReclaimPolicy to Retain on the PV."
      - "B. Set persistentVolumeReclaimPolicy to Delete to avoid stale data."
      - "C. Change access mode to ReadOnlyMany."
      - "D. Remove all finalizers from the namespace."
    answerIndex: 0
    explanation: "Retain prevents automatic backend deletion when the PVC is removed, preserving data for manual recovery. Delete would remove the volume and violate the requirement. Access modes do not control reclaim lifecycle."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/persistent-volumes/#reclaiming"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-001"
    difficulty: "medium"
    tags: ["troubleshooting", "nodes", "kubelet"]
    question: "A worker node shows NotReady after a reboot, and workloads stop scheduling there. What should you inspect first?"
    choices:
      - "A. Node conditions/events and kubelet logs on that node to identify runtime, CNI, or cert errors."
      - "B. Delete all Pods from healthy nodes to rebalance the cluster."
      - "C. Rotate the entire cluster CA immediately."
      - "D. Remove the node from etcd membership manually."
    answerIndex: 0
    explanation: "Node status and kubelet logs are the fastest path to root cause for NotReady conditions. They reveal runtime connectivity, networking, and certificate issues directly. Broad destructive actions should come only after targeted diagnosis."
    refs:
      - "https://kubernetes.io/docs/tasks/debug/debug-cluster/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-002"
    difficulty: "hard"
    tags: ["control-plane", "static-pods", "apiserver"]
    question: "After editing control-plane settings, kubectl commands time out and the API server appears down. In kubeadm, where should you investigate first?"
    choices:
      - "A. Check /etc/kubernetes/manifests/kube-apiserver.yaml and inspect container logs with crictl on the control-plane node."
      - "B. Reinstall kubectl on admin laptops."
      - "C. Drain all worker nodes before any debugging."
      - "D. Recreate the kube-system namespace from backup."
    answerIndex: 0
    explanation: "kubeadm runs control-plane components as static pods sourced from manifest files under /etc/kubernetes/manifests. A bad manifest change can immediately break API server startup. Local control-plane manifest and runtime logs are the primary diagnostics."
    refs:
      - "https://kubernetes.io/docs/tasks/debug/debug-cluster/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-003"
    difficulty: "easy"
    tags: ["monitoring", "resource-usage", "kubectl-top"]
    question: "During an incident, you need a quick view of top CPU consumers across namespaces. Which command is most appropriate?"
    choices:
      - "A. kubectl top pod -A"
      - "B. kubectl get pod -A -o wide"
      - "C. kubectl describe node | grep Image"
      - "D. kubectl api-resources"
    answerIndex: 0
    explanation: "kubectl top provides live CPU and memory usage from the metrics pipeline for fast triage. It is the standard built-in command for utilization checks. Basic get/describe outputs do not show current runtime consumption."
    refs:
      - "https://kubernetes.io/docs/reference/kubectl/generated/kubectl_top/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-004"
    difficulty: "easy"
    tags: ["logs", "containers", "crashloop"]
    question: "A sidecar container in a multi-container Pod is CrashLoopBackOff. You need logs from the previous failed container instance. Which command pattern is correct?"
    choices:
      - "A. kubectl logs <pod-name> -c <sidecar-name> --previous"
      - "B. kubectl get events --watch-only=false"
      - "C. kubectl describe node <node-name>"
      - "D. kubectl top pod <pod-name>"
    answerIndex: 0
    explanation: "The --previous flag fetches logs from the prior terminated container, which is crucial for crash-loop root-cause analysis. Adding -c targets the specific sidecar in a multi-container pod. Events and metrics are useful context but do not replace previous stdout/stderr logs."
    refs:
      - "https://kubernetes.io/docs/concepts/cluster-administration/logging/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-005"
    difficulty: "medium"
    tags: ["scheduling", "failedscheduling", "resources"]
    question: "A Pod is stuck Pending with event '0/5 nodes are available: 5 Insufficient cpu'. What is the best next step?"
    choices:
      - "A. Describe the Pod to confirm scheduling details, then reduce CPU requests or add node capacity."
      - "B. Delete the kube-scheduler Pod and let kubelet reschedule workloads directly."
      - "C. Change the Service type to ClusterIP."
      - "D. Set imagePullPolicy to Never for the Pod."
    answerIndex: 0
    explanation: "FailedScheduling events already indicate a resource-fit problem. You should validate details and either adjust workload requests or provide more cluster capacity. Service settings and image pull behavior do not affect scheduler CPU fit checks."
    refs:
      - "https://kubernetes.io/docs/tasks/debug/debug-application/debug-running-pod/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-006"
    difficulty: "hard"
    tags: ["service", "nodeport", "kube-proxy"]
    question: "A NodePort service works through two nodes but times out on one specific node. What should you verify first on the failing node?"
    choices:
      - "A. kube-proxy health and host firewall/iptables rules affecting NodePort traffic"
      - "B. CoreDNS deployment replica count"
      - "C. Whether the Service has an ExternalName"
      - "D. TLS certificates for the kube-apiserver"
    answerIndex: 0
    explanation: "NodePort traffic depends on per-node packet handling configured by kube-proxy and host networking rules. A single-node failure pattern strongly points to node-local kube-proxy or firewall issues. DNS and API server certificates are unrelated to this datapath symptom."
    refs:
      - "https://kubernetes.io/docs/tasks/debug/debug-application/debug-service/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-007"
    difficulty: "hard"
    tags: ["etcd", "backup", "restore"]
    question: "After disk corruption on a control-plane node, etcd reports unhealthy and API requests intermittently fail. Which recovery path is most appropriate?"
    choices:
      - "A. Restore etcd from a recent snapshot and restart control-plane static pods with the restored data directory."
      - "B. Delete all namespaces to reduce etcd object count."
      - "C. Disable RBAC to simplify API operations during incident response."
      - "D. Reinstall kubelet on all worker nodes first."
    answerIndex: 0
    explanation: "When etcd state is corrupted, snapshot restore is the reliable recovery mechanism. In kubeadm environments, etcd and apiserver static pod configuration must reference restored data correctly. Namespace deletion and RBAC changes do not repair datastore integrity."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/configure-upgrade-etcd/"
    author: "ThanhNguyxn"

  - id: "cka-v1-d5-008"
    difficulty: "medium"
    tags: ["networkpolicy", "dns", "egress", "troubleshooting"]
    question: "Only Pods in namespace payments fail DNS lookups to external domains after a new egress policy rollout. What is the most likely fix?"
    choices:
      - "A. Update NetworkPolicy to allow egress DNS traffic (UDP/TCP 53) to CoreDNS and required external destinations."
      - "B. Change the CoreDNS Service type to NodePort for all namespaces."
      - "C. Enable hostPID on payments Pods so DNS bypasses policy."
      - "D. Remove readiness probes from the affected Deployments."
    answerIndex: 0
    explanation: "Restrictive egress policies commonly break DNS if traffic to CoreDNS is not explicitly allowed. Allowing UDP/TCP 53 plus required destinations restores name resolution and outbound connectivity. Pod process namespace settings and probes do not fix network policy blocks."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/network-policies/"
    author: "ThanhNguyxn"

  - id: "cka-extra-021"
    difficulty: "easy"
    tags: ["rbac", "rolebinding", "scope"]
    question: "A user should have read-only access to Pods only in the namespace dev. Which binding best matches this least-privilege requirement?"
    choices:
      - "A. RoleBinding in namespace dev that binds a Role to the user"
      - "B. ClusterRoleBinding that binds cluster-admin to the user"
      - "C. RoleBinding in kube-system that binds a ClusterRole to the user"
      - "D. Disable RBAC and rely on namespace naming"
    answerIndex: 0
    explanation: "A Role and RoleBinding scoped to the dev namespace limits permissions to that namespace only. ClusterRoleBinding grants cluster-wide privileges, which violates least privilege and can expose unrelated namespaces."
    refs:
      - "https://kubernetes.io/docs/reference/access-authn-authz/rbac/"
    author: "ThanhNguyxn"

  - id: "cka-extra-022"
    difficulty: "easy"
    tags: ["taints", "tolerations", "noexecute"]
    question: "A node is tainted key=maintenance:NoExecute. What happens to a running Pod on that node that does not have a matching toleration?"
    choices:
      - "A. The Pod is evicted from the node"
      - "B. The Pod continues running but new Pods cannot be scheduled"
      - "C. The Pod becomes Ready with degraded networking"
      - "D. The Pod is automatically converted into a DaemonSet"
    answerIndex: 0
    explanation: "NoExecute taints both prevent scheduling and evict existing Pods that do not tolerate the taint. NoSchedule would only block new scheduling and would not evict already running Pods."
    refs:
      - "https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/"
    author: "ThanhNguyxn"

  - id: "cka-extra-023"
    difficulty: "easy"
    tags: ["ingress", "controllers", "troubleshooting"]
    question: "You create an Ingress resource, but traffic never reaches the backend Service. The cluster has no Ingress controller installed. What is the most accurate explanation?"
    choices:
      - "A. Ingress is only a resource definition; it requires an Ingress controller to implement routing"
      - "B. Ingress works automatically as soon as kube-proxy is running"
      - "C. Ingress is a replacement for Services, so the Service should be deleted"
      - "D. Ingress only works if Pods use hostNetwork"
    answerIndex: 0
    explanation: "Kubernetes Ingress objects describe desired HTTP(S) routing but do not perform routing themselves. Without an Ingress controller, no component programs the data plane, so requests will not be forwarded to backends."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/ingress/"
    author: "ThanhNguyxn"

  - id: "cka-extra-024"
    difficulty: "easy"
    tags: ["scheduling", "affinity", "node-affinity"]
    question: "A Pod must run only on nodes labeled disktype=ssd. Which scheduling feature enforces this requirement?"
    choices:
      - "A. requiredDuringSchedulingIgnoredDuringExecution nodeAffinity"
      - "B. preferredDuringSchedulingIgnoredDuringExecution podAffinity"
      - "C. A PodDisruptionBudget"
      - "D. A Service selector"
    answerIndex: 0
    explanation: "Required node affinity enforces hard placement constraints so the Pod will not schedule unless a node matches. A Service selector matches Pods for traffic routing and does not influence the scheduler."
    refs:
      - "https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/"
    author: "ThanhNguyxn"

  - id: "cka-extra-025"
    difficulty: "easy"
    tags: ["storage", "pvc", "pv"]
    question: "A Pod mounts a PersistentVolumeClaim, but the PVC is still Pending and no PV is bound. In a cluster without dynamic provisioning, what must exist for the PVC to bind?"
    choices:
      - "A. A matching PersistentVolume that satisfies capacity, access modes, and storageClassName"
      - "B. A Deployment with the same name as the PVC"
      - "C. A ConfigMap containing the PV YAML"
      - "D. A Service of type LoadBalancer"
    answerIndex: 0
    explanation: "Without dynamic provisioning, Kubernetes can only bind a PVC to an existing PV that matches requested attributes. Services and ConfigMaps do not create or satisfy PV objects for storage binding."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/persistent-volumes/"
    author: "ThanhNguyxn"

  - id: "cka-extra-026"
    difficulty: "easy"
    tags: ["resource-quotas", "policy", "namespaces"]
    question: "A namespace should be limited to a maximum of 10 Pods and 4 CPU total requests across all workloads. Which Kubernetes object enforces this?"
    choices:
      - "A. ResourceQuota"
      - "B. Ingress"
      - "C. PriorityClass"
      - "D. DaemonSet"
    answerIndex: 0
    explanation: "ResourceQuota enforces aggregate limits within a namespace, such as counts of objects and total requested/limited CPU and memory. PriorityClass affects scheduling priority, but it does not enforce per-namespace resource ceilings."
    refs:
      - "https://kubernetes.io/docs/concepts/policy/resource-quotas/"
    author: "ThanhNguyxn"

  - id: "cka-extra-027"
    difficulty: "easy"
    tags: ["helm", "package-management", "basics"]
    question: "A team wants to install a chart and be able to upgrade or roll back it later using a named release. Which tool is designed for this workflow?"
    choices:
      - "A. Helm"
      - "B. kubeadm"
      - "C. etcdctl"
      - "D. crictl"
    answerIndex: 0
    explanation: "Helm manages application packaging as charts and tracks installations as releases with history for upgrades and rollbacks. kubeadm bootstraps clusters, and etcdctl/crictl are troubleshooting/admin tools rather than application release managers."
    refs:
      - "https://helm.sh/docs/intro/using_helm/"
    author: "ThanhNguyxn"

  - id: "cka-extra-028"
    difficulty: "medium"
    tags: ["taints", "tolerations", "noexecute", "eviction"]
    question: "A node is tainted dedicated=batch:NoExecute. A Job should tolerate this taint but only for 300 seconds, then be evicted if it is still running. What is required in the Pod spec?"
    choices:
      - "A. A toleration with effect NoExecute, operator Exists or matching value, and tolerationSeconds: 300"
      - "B. A toleration with effect NoSchedule and tolerationSeconds: 300"
      - "C. A nodeSelector for dedicated=batch only"
      - "D. A PodDisruptionBudget with maxUnavailable: 1"
    answerIndex: 0
    explanation: "NoExecute tolerations support tolerationSeconds, which controls how long a Pod may remain on a tainted node before eviction. NoSchedule does not evict running Pods, and nodeSelector alone does not implement time-bound eviction behavior."
    refs:
      - "https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/"
    author: "ThanhNguyxn"

  - id: "cka-extra-029"
    difficulty: "medium"
    tags: ["scheduling", "pod-anti-affinity", "availability"]
    question: "A Deployment has 3 replicas and must avoid placing more than one replica on the same node to reduce single-node failure impact. Which setting is most direct?"
    choices:
      - "A. required podAntiAffinity on the app label with topologyKey kubernetes.io/hostname"
      - "B. A Service of type ClusterIP"
      - "C. A Secret mounted as a volume"
      - "D. A ConfigMap with replica count"
    answerIndex: 0
    explanation: "Pod anti-affinity can enforce replica separation by hostname so replicas do not co-locate on the same node. Services and configuration objects do not control where the scheduler places replicas."
    refs:
      - "https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/"
    author: "ThanhNguyxn"

  - id: "cka-extra-030"
    difficulty: "medium"
    tags: ["networkpolicy", "egress", "dns"]
    question: "A namespace has default-deny egress NetworkPolicies. Pods now fail name resolution because they cannot reach CoreDNS. What is the best fix?"
    choices:
      - "A. Add an egress rule allowing UDP/TCP 53 to the kube-dns Service/Pods"
      - "B. Change every application image to include a /etc/hosts file"
      - "C. Run Pods with hostNetwork to bypass policy"
      - "D. Disable the CNI plugin on affected nodes"
    answerIndex: 0
    explanation: "With default-deny egress, DNS traffic must be explicitly allowed to CoreDNS to restore resolution. hostNetwork and disabling CNI are broad changes that increase risk and are not appropriate for a targeted DNS break caused by policy."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/network-policies/"
    author: "ThanhNguyxn"

  - id: "cka-extra-031"
    difficulty: "medium"
    tags: ["ingress", "exposure", "bare-metal"]
    question: "In a bare-metal cluster without a cloud load balancer, an NGINX Ingress controller is deployed. What is a common way to expose the controller externally?"
    choices:
      - "A. Expose the Ingress controller Service as NodePort (or via MetalLB)"
      - "B. Change all backend Services to ExternalName"
      - "C. Disable kube-proxy to force direct routing"
      - "D. Convert all Deployments to hostNetwork"
    answerIndex: 0
    explanation: "Without a cloud LoadBalancer, NodePort is a common exposure method, and projects like MetalLB can provide LoadBalancer semantics on-prem. Changing backend service types or disabling kube-proxy does not correctly expose the Ingress controller entry point."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport"
    author: "ThanhNguyxn"

  - id: "cka-extra-032"
    difficulty: "medium"
    tags: ["helm", "values", "release-management"]
    question: "A chart installs correctly in dev, but prod needs different resource limits and an extra Ingress host. What is the most maintainable Helm approach?"
    choices:
      - "A. Use a separate values file for prod and pass it with -f during helm install/upgrade"
      - "B. Edit live Kubernetes objects manually after every upgrade"
      - "C. Fork the chart and permanently hardcode prod settings"
      - "D. Use kubectl edit on the Helm Secret storage"
    answerIndex: 0
    explanation: "Values files allow environment-specific customization while keeping the chart upgradeable and minimizing drift. Manual edits after install are overwritten by future upgrades and create hard-to-audit configuration drift."
    refs:
      - "https://helm.sh/docs/chart_template_guide/values_files/"
    author: "ThanhNguyxn"

  - id: "cka-extra-033"
    difficulty: "medium"
    tags: ["etcd", "backup", "snapshot"]
    question: "You need to back up the Kubernetes datastore in a kubeadm cluster. Which action best represents an etcd backup?"
    choices:
      - "A. Take an etcd snapshot using etcdctl snapshot save with the correct endpoint and certificates"
      - "B. Export all Deployments with kubectl get deploy -o yaml"
      - "C. Copy /var/log/containers to external storage"
      - "D. Backup only the kubelet config files from worker nodes"
    answerIndex: 0
    explanation: "The authoritative cluster state is stored in etcd, and a snapshot is the canonical backup artifact for restore operations. Exporting workload YAML or copying logs does not capture the full datastore state required to recover the control plane."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/configure-upgrade-etcd/"
    author: "ThanhNguyxn"

  - id: "cka-extra-034"
    difficulty: "medium"
    tags: ["storageclass", "volumeBindingMode", "scheduling"]
    question: "A StorageClass sets volumeBindingMode: WaitForFirstConsumer. What is the primary effect of this setting?"
    choices:
      - "A. Volume provisioning and binding wait until a Pod is scheduled, improving topology-aware placement"
      - "B. PVCs are immediately deleted after the first Pod uses them"
      - "C. Pods can mount volumes across all nodes regardless of topology"
      - "D. PersistentVolumes are encrypted automatically"
    answerIndex: 0
    explanation: "WaitForFirstConsumer delays binding so the scheduler can choose a node first and then provision/bind storage in a compatible zone or topology. It does not enable cross-topology mounts or automatic encryption by itself."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/storage-classes/#volume-binding-mode"
    author: "ThanhNguyxn"

  - id: "cka-extra-035"
    difficulty: "hard"
    tags: ["rbac", "nonresourceurls", "security"]
    question: "A monitoring team needs to GET the Kubernetes API non-resource endpoint /metrics but must not access any namespaced resources. Which RBAC rule is required?"
    choices:
      - "A. A ClusterRole with nonResourceURLs: ['/metrics'] and verbs: ['get'] bound via ClusterRoleBinding"
      - "B. A Role in kube-system with resources: ['pods'] and verbs: ['list']"
      - "C. A RoleBinding that grants edit to the monitoring ServiceAccount"
      - "D. A NetworkPolicy that allows traffic to the API server"
    answerIndex: 0
    explanation: "Non-resource URLs are authorized with ClusterRoles using nonResourceURLs rather than resource rules, so this must be expressed at cluster scope. NetworkPolicy controls network reachability, but it does not grant authorization to access API endpoints."
    refs:
      - "https://kubernetes.io/docs/reference/access-authn-authz/rbac/#referring-to-resources"
    author: "ThanhNguyxn"

  - id: "cka-extra-036"
    difficulty: "hard"
    tags: ["networkpolicy", "namespace-selector", "segmentation"]
    question: "Namespace backend has a default-deny ingress policy. You must allow ingress only from Pods labeled app=web in namespace frontend to TCP 8080 on backend Pods. What is required?"
    choices:
      - "A. A NetworkPolicy selecting backend Pods with an ingress from a namespaceSelector for frontend and a podSelector for app=web, plus port 8080"
      - "B. Change the backend Service type to NodePort"
      - "C. Enable hostNetwork on backend Pods"
      - "D. Add an Ingress resource to the frontend namespace"
    answerIndex: 0
    explanation: "NetworkPolicies can combine namespaceSelector and podSelector to precisely scope allowed sources, which is the least-privilege approach for cross-namespace access. Service type and hostNetwork changes bypass or ignore the segmentation intent rather than implementing it."
    refs:
      - "https://kubernetes.io/docs/concepts/services-networking/network-policies/"
    author: "ThanhNguyxn"

  - id: "cka-extra-037"
    difficulty: "hard"
    tags: ["crd", "versioning", "apiextensions"]
    question: "You add a new CRD version v2 while keeping v1 for backward compatibility. You want clients to read/write both versions, but etcd should store only one canonical version. Which CRD configuration supports this?"
    choices:
      - "A. Mark both versions as served: true, and set exactly one version as storage: true"
      - "B. Set storage: true on all versions so etcd stores multiple copies"
      - "C. Disable the OpenAPI schema so any version is accepted"
      - "D. Use a ConfigMap instead of a CRD for versioning"
    answerIndex: 0
    explanation: "CRD versioning supports multiple served versions while requiring exactly one storage version for etcd persistence. Marking multiple storage versions is invalid and can lead to inconsistent storage behavior."
    refs:
      - "https://kubernetes.io/docs/tasks/extend-kubernetes/custom-resources/custom-resource-definition-versioning/"
    author: "ThanhNguyxn"

  - id: "cka-extra-038"
    difficulty: "hard"
    tags: ["etcd", "restore", "control-plane"]
    question: "After restoring an etcd snapshot on a kubeadm control-plane node, the API server still fails because it points to the old data directory. What is the most direct fix?"
    choices:
      - "A. Update the etcd static Pod manifest to use the restored data-dir path, then let kubelet restart the static Pod"
      - "B. Reinstall kubectl on all admin workstations"
      - "C. Delete all worker nodes and rejoin them"
      - "D. Change CoreDNS to NodePort"
    answerIndex: 0
    explanation: "In kubeadm, etcd commonly runs as a static pod, and the manifest controls the data directory location. If the manifest points to the wrong data-dir, etcd cannot start with the restored snapshot data."
    refs:
      - "https://kubernetes.io/docs/tasks/administer-cluster/configure-upgrade-etcd/"
    author: "ThanhNguyxn"

  - id: "cka-extra-039"
    difficulty: "hard"
    tags: ["storage", "volume-expansion", "pvc"]
    question: "A PVC needs to be expanded from 10Gi to 20Gi with minimal disruption. The underlying CSI driver supports expansion. What must be true for Kubernetes to allow this change?"
    choices:
      - "A. The StorageClass must set allowVolumeExpansion: true and the PVC spec.resources.requests.storage must be increased"
      - "B. The PV reclaim policy must be Retain"
      - "C. The Service type must be LoadBalancer"
      - "D. The Pod must use hostPath volumes instead of PVCs"
    answerIndex: 0
    explanation: "PVC expansion requires StorageClass allowVolumeExpansion and a supported driver, after which increasing the requested storage triggers resize. Reclaim policies and Service types are unrelated to volume expansion behavior."
    refs:
      - "https://kubernetes.io/docs/concepts/storage/persistent-volumes/#expanding-persistent-volumes-claims"
    author: "ThanhNguyxn"

  - id: "cka-extra-040"
    difficulty: "hard"
    tags: ["resource-quotas", "limitrange", "resources", "troubleshooting"]
    question: "A namespace has a ResourceQuota that requires CPU requests on Pods. A Deployment without any resource requests fails admission. Which object can set default requests/limits automatically for Pods in that namespace?"
    choices:
      - "A. LimitRange"
      - "B. PodDisruptionBudget"
      - "C. IngressClass"
      - "D. StorageClass"
    answerIndex: 0
    explanation: "LimitRange can apply default resource requests and limits when Pods omit them, which helps satisfy ResourceQuota policies consistently. PodDisruptionBudgets manage voluntary disruption, not resource defaults, and do not affect admission requirements for requests."
    refs:
      - "https://kubernetes.io/docs/concepts/policy/limit-range/"
    author: "ThanhNguyxn"
