    explanation: "Restrictive egress policies commonly break DNS if traffic to CoreDNS is not explicitly allowed. Allowing UDP/TCP 53 plus required destinations restores name resolution and outbound connectivity. Pod process namespace settings and probes do not fix network policy blocks."
