  - id: "az104-expand-053"
    difficulty: "hard"
    tags: ["virtual-machine", "availability-zones", "high-availability"]
    question: "A mission-critical application requires VMs to survive a full datacenter outage within an Azure region. The application needs at least three VMs with each in a separate physical datacenter. Which deployment strategy meets this requirement?"
    choices:
      - "A. Deploy one VM in each of three availability zones within the region"
      - "B. Deploy all VMs in a single availability set with 3 fault domains"
      - "C. Deploy VMs in two paired regions"
      - "D. Deploy VMs with proximity placement groups across racks"
    answerIndex: 0
    explanation: "Availability zones are physically separate datacenters within an Azure region, each with independent power, cooling, and networking. Deploying across three zones ensures survival of a full datacenter failure. Availability sets protect against rack and host failures within a single datacenter, not full datacenter outages."
    refs:
      - "https://learn.microsoft.com/en-us/azure/reliability/availability-zones-overview"
    author: "ThanhNguyxn"

  - id: "az104-expand-054"
    difficulty: "hard"
    tags: ["kubernetes-service", "compute", "containers"]
    question: "A team is deploying microservices on Azure Kubernetes Service (AKS). They need the cluster to automatically add more nodes when pod scheduling fails due to insufficient resources and remove idle nodes during low traffic. Which AKS feature should they enable?"
    choices:
      - "A. Cluster autoscaler"
      - "B. Horizontal pod autoscaler"
      - "C. Virtual nodes with ACI"
      - "D. Manual node pool scaling"
    answerIndex: 0
    explanation: "The cluster autoscaler adjusts the number of nodes based on pending pods that cannot be scheduled due to resource constraints and removes underutilized nodes. The horizontal pod autoscaler scales the number of pod replicas, not the underlying node infrastructure."
    refs:
      - "https://learn.microsoft.com/en-us/azure/aks/cluster-autoscaler"
    author: "ThanhNguyxn"

