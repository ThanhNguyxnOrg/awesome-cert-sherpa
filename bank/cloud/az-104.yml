  - id: "az104-extra-027"
    difficulty: "easy"
    tags: ["azure-backup", "recovery-services-vault", "retention"]
    question: "A production VM must be backed up daily with 30-day retention. Administrators must be able to restore the VM if it is deleted or corrupted. Which Azure service should you configure?"
    choices:
      - "A. Azure Backup in a Recovery Services vault"
      - "B. Azure Site Recovery only"
      - "C. Azure Policy only"
      - "D. A resource group delete lock only"
    answerIndex: 0
