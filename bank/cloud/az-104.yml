  - id: "az104-expand-060"
    difficulty: "hard"
    tags: ["virtual-network", "nat-gateway", "networking"]
    question: "Multiple VMs in a subnet need outbound internet access through a static public IP address for whitelisting by an external partner. No inbound connectivity from the internet is required. Which Azure resource should be associated with the subnet?"
    choices:
      - "A. NAT gateway with a static public IP"
      - "B. Public Load Balancer with outbound rules"
      - "C. Azure Firewall with SNAT configuration"
      - "D. Public IP addresses on each VM"
    answerIndex: 0
    explanation: "A NAT gateway provides outbound-only internet connectivity through a static public IP for all resources in the associated subnet, ideal for scenarios requiring a predictable outbound IP. Assigning public IPs to each VM provides both inbound and outbound connectivity, which is unnecessary and increases the attack surface."
    refs:
      - "https://learn.microsoft.com/en-us/azure/nat-gateway/nat-overview"
    author: "ThanhNguyxn"
