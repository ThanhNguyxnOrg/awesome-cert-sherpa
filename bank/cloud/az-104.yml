  - id: "az104-extra-026"
    difficulty: "easy"
    tags: ["managed-identities", "entra-id", "least-privilege"]
    question: "A VM-hosted application must access a storage account without storing credentials in configuration files. The team wants Azure to manage the identity lifecycle and token issuance automatically. What should you use?"
    choices:
      - "A. System-assigned managed identity for the VM and Azure RBAC on the storage account"
      - "B. A shared access signature (SAS) token stored in the VM registry"
      - "C. A user account with a password hardcoded into the application"
      - "D. A storage account key stored in a local text file"
