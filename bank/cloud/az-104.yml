  - id: "az104-extra-035"
    difficulty: "hard"
    tags: ["managed-identities", "key-vault", "rbac", "least-privilege"]
    question: "An App Service must read a secret from Key Vault at runtime. Security requires no stored credentials and least-privilege access only to that one secret, with full auditability. What should you configure?"
    choices:
      - "A. Store the Key Vault secret value in the app settings file"
      - "B. Assign a managed identity to the App Service and grant it Key Vault permissions to read only the required secret"
      - "C. Use a personal user account to fetch secrets and hardcode them into the application"
      - "D. Grant Contributor on the Key Vault to the App Service"
    answerIndex: 1
    explanation: "A managed identity eliminates credential storage and can be granted narrowly scoped permissions (for example, read access to a specific secret) with auditing in Azure logs. Option D is incorrect because Contributor is far broader than required and grants administrative capabilities that violate least privilege."
    refs:
      - "https://learn.microsoft.com/en-us/azure/active-directory/managed-identities-azure-resources/overview"
      - "https://learn.microsoft.com/en-us/azure/key-vault/general/overview"
