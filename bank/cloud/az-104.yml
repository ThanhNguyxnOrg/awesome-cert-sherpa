  - id: "az104-extra-039"
    difficulty: "hard"
    tags: ["azure-backup", "immutability", "ransomware", "vault"]
    question: "A security team wants to improve ransomware resilience for Azure VM backups. They require that backup data cannot be deleted immediately, even by an attacker with elevated permissions, and they want an additional safety net for recovery. What should you enable?"
    choices:
      - "A. Turn off backup and rely on RAID"
      - "B. Enable soft delete and use Multi-User Authorization (MUA) for critical operations where available"
      - "C. Store backups only on a local USB drive"
      - "D. Use an NSG to block backup traffic"
    answerIndex: 1
    explanation: "Soft delete helps protect recovery points from accidental or malicious deletion for a retention period, and Multi-User Authorization adds an additional approval control for sensitive actions in supported scenarios. Option D is incorrect because NSGs do not provide immutability or protection against deletion of backup items in the vault."
    refs:
      - "https://learn.microsoft.com/en-us/azure/backup/backup-azure-security-features"
