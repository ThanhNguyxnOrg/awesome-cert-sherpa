  - id: "az104-extra-023"
    difficulty: "easy"
    tags: ["application-gateway", "waf", "path-based-routing"]
    question: "A web application must route requests for '/api' to one backend pool and '/static' to another. Security also requires OWASP web application firewall protection. Which Azure service should you deploy?"
