      - "D. Create a public IP on each spoke VM"
    answerIndex: 1
    explanation: "UDRs can override system routing so that default internet traffic is routed to the Azure Firewall as the next hop for centralized inspection. Option A is incorrect because peering alone does not guarantee that internet-bound traffic from spokes is forced through a hub firewall."
