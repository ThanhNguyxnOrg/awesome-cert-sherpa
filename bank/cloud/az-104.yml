      - "D. Threat intelligence-based filtering"
    answerIndex: 0
    explanation: "Application rules in Azure Firewall operate at Layer 7 and support FQDN-based filtering, allowing wildcard domain filtering like *.microsoft.com. Network rules operate at Layer 3/4 with IP addresses and ports, and cannot filter by domain name."
