  - id: "az104-extra-025"
    difficulty: "easy"
    tags: ["key-vault", "secrets", "certificates"]
    question: "An application team needs a managed service to store TLS certificates and application secrets securely, with centralized access control and auditing. Which Azure service should they use?"
