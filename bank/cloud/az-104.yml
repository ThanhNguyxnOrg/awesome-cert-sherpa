      - "B. Site-to-site VPN over IPsec"
      - "C. Azure Virtual WAN with VPN hub"
      - "D. Azure Peering Service"
    answerIndex: 0
    explanation: "ExpressRoute provides a private, dedicated connection from on-premises to Azure through a connectivity provider, bypassing the public internet for higher reliability and lower latency. Site-to-site VPN traverses the public internet with IPsec encryption, which does not meet the requirement of no public internet transit."
