  - id: "az104-extra-027"
    difficulty: "easy"
    tags: ["azure-backup", "recovery-services-vault", "retention"]
    question: "A production VM must be backed up daily with 30-day retention. Administrators must be able to restore the VM if it is deleted or corrupted. Which Azure service should you configure?"
    choices:
      - "A. Azure Backup in a Recovery Services vault"
      - "B. Azure Site Recovery only"
      - "C. Azure Policy only"
      - "D. A resource group delete lock only"
    answerIndex: 0
    explanation: "Azure Backup provides policy-based VM backups, retention, and restore operations through a Recovery Services vault. Option B is incorrect because Site Recovery focuses on replication and failover for disaster recovery, not point-in-time backup retention and restore for accidental deletion."
