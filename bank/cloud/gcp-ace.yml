    explanation: "The Horizontal Pod Autoscaler automatically scales the number of pods based on observed CPU utilization or custom metrics. Cluster Autoscaler scales nodes, not pods."
    refs:
      - "https://cloud.google.com/kubernetes-engine/docs/concepts/horizontalpodautoscaler"
