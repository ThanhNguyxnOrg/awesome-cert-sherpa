  - id: "saa-extra-017"
    difficulty: "hard"
    tags: ["eks", "iam", "irsa", "security"]
    question: "A team runs workloads on Amazon EKS and needs pods to call AWS APIs (for example, to put objects to S3) without using node instance profile permissions. The solution must follow least privilege per Kubernetes service account. What should be implemented?"
    choices:
      - "A. Store IAM access keys in Kubernetes Secrets and mount them into pods."
      - "B. Grant S3 permissions to the EKS worker node IAM role and reuse it for all pods."
      - "C. Use IAM roles for service accounts (IRSA) with an OIDC provider and attach a least-privilege IAM role to the pod service account."
      - "D. Place the EKS cluster in a public subnet so pods can call S3 anonymously."
    answerIndex: 2
    explanation: "IRSA maps a Kubernetes service account to a dedicated IAM role, enabling fine-grained AWS permissions per workload without distributing long-term credentials. Option B is incorrect because node-wide permissions are overly broad and violate least privilege when multiple applications share the same nodes."
    refs:
      - "https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html"
    author: "ThanhNguyxn"

