  - id: "saa-extra-015"
    difficulty: "hard"
    tags: ["dynamodb", "global-tables", "multi-region", "active-active"]
    question: "A globally distributed application must support active-active writes in two AWS Regions with local read/write latency and automatic replication. The team wants a managed NoSQL solution that keeps data synchronized and continues operating during a regional impairment. Which design is best?"
    choices:
      - "A. Use DynamoDB Global Tables across both Regions."
      - "B. Use an RDS Multi-AZ database and enable cross-Region snapshots."
      - "C. Use one DynamoDB table in a single Region and rely on CloudFront caching for writes."
      - "D. Use S3 cross-Region replication and store each record as an object."
    answerIndex: 0
    explanation: "DynamoDB Global Tables provide multi-Region replication with local reads and writes, supporting active-active patterns with managed conflict resolution behavior. Option B is incorrect because Multi-AZ is within a single Region and snapshot copy is not an active-active write replication mechanism."
