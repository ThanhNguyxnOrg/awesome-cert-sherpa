      - "C. Enable S3 Transfer Acceleration on the bucket."
      - "D. Convert the bucket to S3 One Zone-IA at creation time."
    answerIndex: 0
    explanation: "S3 Standard-IA is designed for infrequently accessed data that still requires millisecond retrieval, and a lifecycle rule automates the transition. Option B is incorrect because Glacier Deep Archive has retrieval times of 12-48 hours, which does not meet the minutes-level availability requirement."
    refs:
      - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/lifecycle-transition-general-considerations.html"
