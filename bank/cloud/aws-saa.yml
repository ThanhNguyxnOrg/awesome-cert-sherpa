    difficulty: "easy"
    tags: ["lambda", "eventbridge", "scheduling"]
    question: "A finance team needs a serverless job that runs every night at 2 AM UTC to generate a report and store it in S3. The job should not require running servers continuously. Which solution is best?"
    choices:
      - "A. Use Amazon EventBridge Scheduler (or an EventBridge rule) to trigger a Lambda function on a cron schedule."
      - "B. Run a t3.small EC2 instance and use cron to run a shell script nightly."
      - "C. Use an S3 event notification to trigger the job at 2 AM."
      - "D. Use AWS CloudTrail to invoke the job on schedule."
    answerIndex: 0
    explanation: "EventBridge schedules can trigger Lambda on a cron expression without keeping compute running, which matches the serverless requirement. Option B is incorrect because maintaining an always-on EC2 instance adds patching and uptime overhead for a simple scheduled task."
