      - "C. $0.01 per GB for cross-AZ traffic."
      - "D. $0.02 per GB for VPC-internal traffic."
    answerIndex: 0
    explanation: "Data transfer between instances within the same Availability Zone using private IP addresses in the same VPC is free. Option C is incorrect because cross-AZ charges only apply when traffic crosses Availability Zone boundaries, which is not the case here."
