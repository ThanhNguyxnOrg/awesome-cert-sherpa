      - "C. AWS Snowcone only"
      - "D. AWS Glue ETL jobs running once per day"
    answerIndex: 0
    explanation: "AWS DMS supports full load plus ongoing CDC replication, which enables near-zero downtime cutovers for many database engines. Option D is incorrect because daily batch ETL cannot meet minimal-downtime requirements and can lose recent changes between runs."
