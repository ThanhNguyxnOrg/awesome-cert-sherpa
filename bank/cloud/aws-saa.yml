  - id: "saa-expand-061"
    difficulty: "medium"
    tags: ["fsx", "windows", "storage"]
    question: "A company migrating Windows workloads to AWS needs a fully managed shared file system that supports SMB protocol, Active Directory integration, and Windows ACLs. Which service should the architect recommend?"
    choices:
      - "A. Amazon FSx for Windows File Server."
      - "B. Amazon EFS."
      - "C. Amazon S3 with Windows clients using AWS CLI."
      - "D. Self-managed Samba server on EC2."
    answerIndex: 0
    explanation: "FSx for Windows File Server is a fully managed Windows-native file system supporting SMB, AD integration, DFS, and Windows NTFS ACLs. Option B is incorrect because EFS is a Linux NFS file system that does not natively support SMB protocol or Windows ACLs."
