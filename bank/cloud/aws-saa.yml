    tags: ["data-transfer", "cost", "architecture"]
    question: "An architect is designing a multi-tier application where the web tier in a public subnet communicates with an application tier in a private subnet, which queries an RDS database in another private subnet. All tiers are in the same AZ and VPC. Which data transfer charges apply for traffic between these tiers?"
    choices:
