    question: "A team stores 10 TB of compressed CSV log files in S3 and needs to run ad-hoc SQL queries filtering by date and error code without setting up a database or loading data into a cluster. They want a serverless, pay-per-query approach. Which service is most appropriate?"
    choices:
      - "A. Amazon Athena with the data cataloged in AWS Glue Data Catalog."
      - "B. Amazon Redshift Serverless with data loaded from S3."
      - "C. Amazon RDS for PostgreSQL with the data imported via COPY."
      - "D. Amazon EMR with Spark SQL."
    answerIndex: 0
    explanation: "Athena is a serverless query service that runs SQL directly against S3 data with per-query pricing and requires no infrastructure management; Glue Data Catalog provides schema discovery. Option C is incorrect because importing 10 TB into RDS requires significant provisioned storage and compute, and RDS is not designed for ad-hoc analytical queries at this scale."
