    tags: ["migration", "snowball", "data-transfer", "s3"]
    question: "A company must migrate 120 TB of archived files from an on-premises data center to Amazon S3 within three weeks. The WAN link is 200 Mbps and cannot be upgraded in time. What is the fastest practical approach?"
    choices:
      - "A. Use AWS Snowball devices for offline transfer and import the data to S3."
      - "B. Use multipart upload over the WAN link and accept the longer timeline."
      - "C. Use VPC peering between the data center and S3 to increase bandwidth."
      - "D. Store the files in EFS first, then copy to S3 later."
    answerIndex: 0
    explanation: "AWS Snowball is designed for large-scale offline data transfers when network bandwidth is insufficient for the required timeline. Option C is incorrect because VPC peering is for VPC-to-VPC connectivity and does not create a higher-bandwidth path from on-premises to S3."
    refs:
      - "https://docs.aws.amazon.com/snowball/latest/developer-guide/whatissnowball.html"
