  - id: "saa-expand-066"
    difficulty: "hard"
    tags: ["privatelink", "vpc", "microservices"]
    question: "Two teams in separate AWS accounts each run microservices in their own VPCs. Team A needs to expose an internal NLB-based API to Team B without traversing the public internet and without creating a full VPC peering connection. Which approach provides targeted, private connectivity?"
    choices:
      - "A. AWS PrivateLink with Team A creating a VPC endpoint service backed by their NLB, and Team B creating an interface VPC endpoint."
      - "B. VPC peering between the two accounts."
      - "C. Transit Gateway connecting both VPCs."
      - "D. An API Gateway public endpoint with IAM authentication."
    answerIndex: 0
    explanation: "PrivateLink provides private, targeted connectivity to a specific service without exposing the entire VPC network, following the principle of least privilege for network access. Option B is incorrect because VPC peering opens bidirectional network-level connectivity between the entire VPCs, which is broader access than needed for a single API."
    refs:
      - "https://docs.aws.amazon.com/vpc/latest/privatelink/what-is-privatelink.html"
    author: "ThanhNguyxn"

