    tags: ["vpc", "flow-logs", "monitoring"]
    question: "A network engineer needs to troubleshoot why traffic between two EC2 instances in the same VPC is being dropped. They need to see accepted and rejected traffic at the network interface level. Which feature provides this visibility?"
    choices:
      - "A. VPC Flow Logs configured at the ENI level capturing ACCEPT and REJECT traffic."
      - "B. AWS CloudTrail API logs."
      - "C. Amazon Inspector network reachability analysis."
      - "D. AWS X-Ray service map."
    answerIndex: 0
    explanation: "VPC Flow Logs capture IP-level traffic information including accepted and rejected flows at the ENI, subnet, or VPC level for network troubleshooting. Option B is incorrect because CloudTrail logs AWS API calls, not network traffic flow between instances."
