  - id: "saa-extra-016"
    difficulty: "hard"
    tags: ["api-gateway", "private-api", "vpc-endpoints", "hybrid"]
    question: "A company exposes internal microservices through Amazon API Gateway but must ensure the API is reachable only from a corporate network over a Site-to-Site VPN. No public internet access is allowed. Which option best meets this requirement?"
    choices:
      - "A. Use an edge-optimized API Gateway endpoint and restrict it with an AWS WAF IP set."
      - "B. Create a private API Gateway endpoint and access it through an interface VPC endpoint (AWS PrivateLink)."
      - "C. Use a regional API Gateway endpoint and allow access only from 0.0.0.0/0 on port 443."
      - "D. Put the API behind CloudFront and require signed URLs."
    answerIndex: 1
    explanation: "Private API Gateway endpoints are accessible only from within a VPC through an interface endpoint, which can be reached from on-premises via VPN/Direct Connect routing. Option A is incorrect because edge-optimized endpoints are still internet-facing and WAF IP filtering does not satisfy a strict no-internet-access requirement."
    refs:
      - "https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-private-apis.html"
