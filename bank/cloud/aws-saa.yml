  - id: "saa-expand-062"
    difficulty: "medium"
    tags: ["transfer-acceleration", "s3", "performance"]
    question: "A global media company needs contributors worldwide to upload large video files (10-50 GB) to a central S3 bucket in us-east-1. Upload speeds from Asia and Europe are slow. Which S3 feature accelerates these uploads?"
    choices:
      - "A. S3 Transfer Acceleration using CloudFront edge locations."
      - "B. S3 multipart upload alone."
      - "C. S3 Cross-Region Replication from local regions."
      - "D. AWS Snowball for each upload."
    answerIndex: 0
    explanation: "Transfer Acceleration routes uploads through the nearest CloudFront edge location and uses the optimized AWS backbone network to reach the bucket region, significantly improving upload speed for distant clients. Option C is incorrect because Cross-Region Replication copies existing objects between buckets but does not accelerate the initial upload from a client."
    refs:
      - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/transfer-acceleration.html"
    author: "ThanhNguyxn"

  - id: "saa-expand-063"
    difficulty: "medium"
    tags: ["acm", "alb", "tls", "security"]
    question: "A company needs to terminate TLS on their Application Load Balancer using a certificate for their custom domain. They want automatic renewal and no manual certificate management. Which approach is recommended?"
    choices:
      - "A. Request a public certificate from AWS Certificate Manager and associate it with the ALB HTTPS listener."
      - "B. Purchase a certificate from a third-party CA and upload it annually."
      - "C. Use a self-signed certificate on the ALB."
      - "D. Terminate TLS on EC2 instances behind the ALB using Let's Encrypt."
    answerIndex: 0
    explanation: "ACM provides free public certificates with automatic renewal that integrate directly with ALB for TLS termination with zero manual effort. Option D is incorrect because terminating TLS on EC2 instances adds operational overhead for certificate management on each instance and prevents the ALB from inspecting HTTP traffic for routing."
    refs:
      - "https://docs.aws.amazon.com/acm/latest/userguide/acm-overview.html"
    author: "ThanhNguyxn"

