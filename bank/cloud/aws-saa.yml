      - "A. Use AWS DataSync to migrate data to EFS, then deploy AWS Storage Gateway File Gateway on-premises for NFS access to the data in AWS."
      - "B. Use AWS Snowball Edge to ship data and mount EFS directly from on-premises."
      - "C. Set up a Direct Connect link and mount EFS directly from on-premises servers."
      - "D. Use rsync over a VPN to copy data and maintain two copies manually."
    answerIndex: 0
    explanation: "DataSync efficiently migrates large datasets to EFS, and Storage Gateway File Gateway provides a local NFS cache that transparently backs to AWS storage for ongoing hybrid access. Option B is incorrect because EFS cannot be mounted directly from on-premises without a VPN/Direct Connect, and Snowball Edge is for data transfer, not ongoing NFS access."
    refs:
      - "https://docs.aws.amazon.com/datasync/latest/userguide/what-is-datasync.html"
      - "https://docs.aws.amazon.com/storagegateway/latest/userguide/WhatIsStorageGateway.html"
    author: "ThanhNguyxn"

  - id: "saa-expand-058"
    difficulty: "easy"
    tags: ["s3", "access-points", "management"]
    question: "A company has a shared S3 bucket used by five different applications, each requiring distinct access permissions. Managing a single complex bucket policy is becoming error-prone. Which S3 feature simplifies per-application access management?"
    choices:
      - "A. S3 Access Points, one per application, each with its own access policy."
      - "B. Creating five separate S3 buckets with individual policies."
      - "C. Using IAM policy variables in a single bucket policy."
      - "D. S3 Object Lambda to filter access per application."
    answerIndex: 0
    explanation: "S3 Access Points provide dedicated endpoints with independent policies for each application, simplifying access management for shared buckets. Option B is incorrect because creating separate buckets fragments the data and increases operational overhead with data duplication or cross-bucket references."
    refs:
      - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-points.html"
    author: "ThanhNguyxn"

