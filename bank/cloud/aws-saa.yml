    question: "A company has 100 TB of NFS file data on-premises that must be migrated to Amazon EFS. After migration, a small subset of data must remain accessible on-premises for legacy applications via NFS while the primary copy lives in AWS. Which combination of services handles both the migration and ongoing access?"
