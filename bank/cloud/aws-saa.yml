  - id: "saa-extra-014"
    difficulty: "medium"
    tags: ["step-functions", "map-state", "lambda", "parallelism"]
    question: "A workflow must resize up to 5,000 images stored in S3. Each image can be processed independently, but the team needs to limit concurrency to avoid throttling downstream services. Which Step Functions feature best fits this requirement?"
