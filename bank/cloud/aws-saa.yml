  - id: "saa-extra-008"
    difficulty: "medium"
    tags: ["api-gateway", "sqs", "lambda", "decoupling"]
    question: "A public API occasionally receives 10x traffic bursts that overwhelm a downstream database. The team wants to accept requests quickly, avoid losing data, and process asynchronously at a controlled rate. Which architecture should the architect recommend?"
    choices:
      - "A. Increase the database instance size to handle peak traffic and keep synchronous writes."
      - "B. Integrate API Gateway with an SQS queue and process messages with Lambda using reserved concurrency and a dead-letter queue."
      - "C. Cache POST requests in CloudFront to reduce writes to the database."
      - "D. Move the API to an EC2 instance and disable retries from clients."
    answerIndex: 1
    explanation: "SQS buffers bursts and decouples ingestion from processing, while Lambda reserved concurrency limits throughput to protect downstream systems and DLQs preserve failed messages for investigation. Option A is incorrect because scaling the database for peak does not address burst smoothing and can be very expensive for infrequent spikes."
    refs:
      - "https://docs.aws.amazon.com/apigateway/latest/developerguide/http-api-develop-integrations-aws-services.html"
      - "https://docs.aws.amazon.com/lambda/latest/dg/with-sqs.html"
    author: "ThanhNguyxn"

  - id: "saa-extra-009"
    difficulty: "medium"
    tags: ["lambda", "rds", "rds-proxy", "connection-pooling"]
    question: "A Lambda-based API connects to Amazon RDS for PostgreSQL. During traffic spikes, the database hits connection limits and starts rejecting new connections. The team wants to reduce connection churn without rewriting the application. What should be implemented?"
    choices:
      - "A. Place the Lambda function in a public subnet so it can reuse shared connections."
      - "B. Use Amazon RDS Proxy in front of the database and configure the Lambda function to connect through the proxy endpoint."
      - "C. Disable TLS to reduce handshake overhead and connection count."
      - "D. Replace RDS with Amazon S3 and store rows as objects."
    answerIndex: 1
    explanation: "RDS Proxy pools and multiplexes database connections, which is a common way to stabilize connection usage for serverless workloads like Lambda. Option C is incorrect because disabling TLS reduces security and does not solve the underlying connection management pattern."
    refs:
      - "https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy.html"
      - "https://docs.aws.amazon.com/lambda/latest/dg/configuration-vpc.html"
    author: "ThanhNguyxn"

  - id: "saa-extra-010"
    difficulty: "medium"
    tags: ["dynamodb", "data-modeling", "partition-key"]
    question: "An IoT platform writes device telemetry to DynamoDB at very high scale. After launch, CloudWatch shows throttling on a small number of partitions even though overall write capacity is high. What is the most likely design issue to fix first?"
    choices:
      - "A. The table is encrypted with AWS KMS instead of SSE-S3."
      - "B. The partition key has low cardinality, causing hot partitions."
      - "C. The table does not have enough global secondary indexes."
      - "D. The table is using on-demand capacity mode."
    answerIndex: 1
    explanation: "Hot partitions commonly occur when many requests target the same partition key values, so improving key cardinality or adding write sharding is often the first fix. Option D is incorrect because on-demand capacity can still experience partition-level hot spots when the access pattern is skewed."
    refs:
      - "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/bp-partition-key-design.html"
    author: "ThanhNguyxn"

