      - "D. Replace the database first and postpone application migration indefinitely"
    answerIndex: 1
    explanation: "App2Container accelerates packaging existing applications into containers, and ECS on Fargate reduces server management overhead. Migrating scheduled tasks to managed services supports gradual modernization and better operational resilience. Option A is incorrect because vertical scaling on manually managed servers does not materially improve operational model or modernization outcomes."
