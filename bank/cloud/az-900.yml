      - "B. 99.99%"
      - "C. 99.8%"
      - "D. 99.81%"
    answerIndex: 2
    explanation: "When two services are both required (in series), the composite SLA is calculated by multiplying: 0.999 × 0.999 = 0.998001, approximately 99.8%. The composite availability is always lower than the individual SLAs."
    refs:
      - "https://learn.microsoft.com/en-us/azure/well-architected/reliability/metrics"
    author: "ThanhNguyxn"

  - id: "az900-expand-060"
    difficulty: "hard"
    tags: ["management", "tco-calculator"]
    question: "A CFO wants to compare the cost of running existing on-premises workloads versus migrating them to Azure over three years. Which tool provides this analysis?"
    choices:
      - "A. Azure Pricing Calculator"
      - "B. Azure Total Cost of Ownership (TCO) Calculator"
      - "C. Azure Cost Management"
      - "D. Azure Advisor"
    answerIndex: 1
    explanation: "The TCO Calculator estimates cost savings by comparing on-premises infrastructure costs (servers, power, networking, labour) with equivalent Azure services over time. The Pricing Calculator estimates Azure-only costs without on-premises comparison."
    refs:
      - "https://learn.microsoft.com/en-us/azure/cloud-adoption-framework/strategy/business-outcomes/fiscal-outcomes"
    author: "ThanhNguyxn"

  - id: "az900-expand-061"
    difficulty: "hard"
    tags: ["security", "conditional-access"]
    question: "An organisation wants to require MFA only when users sign in from outside the corporate network or from unmanaged devices. Which feature enables this?"
    choices:
      - "A. Azure RBAC"
      - "B. Conditional Access policies in Microsoft Entra ID"
      - "C. Network Security Groups"
      - "D. Azure Firewall"
    answerIndex: 1
    explanation: "Conditional Access policies evaluate signals like user location, device state, and risk level to make adaptive access decisions such as requiring MFA. RBAC controls what users can do, not how they authenticate."
    refs:
      - "https://learn.microsoft.com/en-us/entra/identity/conditional-access/overview"
    author: "ThanhNguyxn"

  - id: "az900-expand-062"
    difficulty: "hard"
    tags: ["azure-services", "data", "synapse"]
    question: "A data engineering team needs to combine big data analytics and enterprise data warehousing in a single unified service. Which Azure service should they evaluate?"
    choices:
      - "A. Azure SQL Database"
      - "B. Azure Synapse Analytics"
      - "C. Azure Cosmos DB"
      - "D. Azure Table Storage"
    answerIndex: 1
    explanation: "Azure Synapse Analytics brings together data integration, enterprise data warehousing, and big data analytics in one unified platform. Azure SQL Database is for transactional workloads, not big data analytics."
    refs:
      - "https://learn.microsoft.com/en-us/azure/synapse-analytics/overview-what-is"
    author: "ThanhNguyxn"

  - id: "az900-expand-063"
    difficulty: "easy"
    tags: ["management", "subscription"]
    question: "What is an Azure subscription?"
    choices:
      - "A. A physical datacenter location"
      - "B. A logical unit of Azure services that is linked to an Azure account and is a billing boundary"
      - "C. A type of virtual machine"
      - "D. A DNS domain"
    answerIndex: 1
    explanation: "An Azure subscription is a logical container that links to an Azure account and serves as both a billing boundary and an access control boundary for Azure resources."
    refs:
      - "https://learn.microsoft.com/en-us/azure/cloud-adoption-framework/ready/azure-setup-guide/organize-resources"
