  - id: "az900-extra-020"
    difficulty: "medium"
    tags: ["azure-ad", "identity", "subscriptions"]
    question: "A company wants strict separation between two subsidiaries so that administrators in one subsidiary cannot manage identities in the other. Both still want to use Azure services. What is the best approach?"
    choices: ["A. Use one Entra tenant and two resource groups", "B. Use one subscription and different tags", "C. Use separate Entra tenants for identity isolation, and associate subscriptions as needed", "D. Use one management group only"]
    answerIndex: 2
    explanation: "Separate Entra tenants create distinct identity directories and administrative boundaries, which is the strongest isolation model for identity management. Option A is wrong because resource groups do not isolate identity administration; they only scope Azure resource management inside the same tenant and subscription."
    refs: ["https://learn.microsoft.com/en-us/azure/active-directory/fundamentals/active-directory-whatis"]
    author: "ThanhNguyxn"
