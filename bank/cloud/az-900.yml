  - id: "az900-extra-012"
    difficulty: "medium"
    tags: ["availability", "availability-sets", "fault-domains"]
    question: "A region does not support Availability Zones for the VM SKU you need. You still want protection from planned maintenance and single-rack hardware failures for a two-VM application. What should you use?"
    choices: ["A. Availability set", "B. Resource group", "C. Azure Advisor", "D. Azure Arc"]
    answerIndex: 0
    explanation: "Availability sets distribute VMs across fault and update domains to reduce the impact of planned maintenance and localized hardware failures. Option B is wrong because resource groups are administrative containers and do not influence physical placement or fault isolation."
    refs: ["https://learn.microsoft.com/en-us/azure/virtual-machines/availability"]
    author: "ThanhNguyxn"

  - id: "az900-extra-013"
    difficulty: "medium"
    tags: ["azure-ad", "conditional-access", "mfa"]
    question: "A company wants to require MFA only when users sign in from outside trusted network locations. Which Microsoft Entra feature should be used?"
    choices: ["A. Conditional Access", "B. Tags", "C. Azure Policy", "D. Azure Monitor metrics"]
    answerIndex: 0
    explanation: "Conditional Access evaluates sign-in context such as location and can require controls like MFA based on policy conditions. Option C is wrong because Azure Policy governs Azure resource configurations, not user sign-in requirements."
    refs: ["https://learn.microsoft.com/en-us/azure/active-directory/conditional-access/overview"]
    author: "ThanhNguyxn"

  - id: "az900-extra-014"
    difficulty: "medium"
    tags: ["slas", "architecture", "shared-responsibility"]
    question: "A customer asks whether an Azure SLA guarantees their application will meet a business uptime target. What is the most accurate response?"
    choices: ["A. Yes, the SLA guarantees the app will always be available regardless of architecture", "B. No, SLAs apply to specific services; the application uptime depends on how you design and deploy those services", "C. Yes, if you use any PaaS service", "D. No, Azure does not publish SLAs"]
    answerIndex: 1
    explanation: "Azure publishes SLAs for individual services, but end-to-end application availability depends on design choices like redundancy, failover, and operational practices. Option A is wrong because architecture and configuration strongly influence real application uptime beyond the underlying service SLA."
    refs: ["https://learn.microsoft.com/en-us/azure/architecture/framework/resiliency/reliability"]
    author: "ThanhNguyxn"

  - id: "az900-extra-015"
    difficulty: "hard"
    tags: ["sla", "calculations", "availability"]
    question: "An Azure service has a 99.9% monthly SLA. Approximately how much total downtime does that allow in a 30-day month?"
    choices: ["A. About 43 minutes", "B. About 4.3 hours", "C. About 1 day", "D. About 4 minutes"]
    answerIndex: 0
    explanation: "A 99.9% SLA allows 0.1% downtime. In a 30-day month there are about 43,200 minutes, and 0.1% of that is about 43.2 minutes, so option A is the closest. Option B is wrong because 4.3 hours is closer to a 99% SLA, not 99.9%."
    refs: ["https://learn.microsoft.com/en-us/azure/architecture/framework/resiliency/reliability"]
    author: "ThanhNguyxn"

  - id: "az900-extra-016"
    difficulty: "hard"
    tags: ["pricing", "vm", "billing"]
    question: "A VM is stopped (deallocated) but the OS disk remains in the subscription. Which cost is most likely to continue accruing?"
    choices: ["A. Compute charges for the VM vCPU", "B. Managed disk storage charges", "C. Charges for Availability Zones", "D. Charges for Azure Boards"]
    answerIndex: 1
    explanation: "When a VM is deallocated, compute charges typically stop, but storage for managed disks and other retained resources continues to be billed. Option A is wrong because compute charges are generally tied to running allocation, not deallocated state."
    refs: ["https://learn.microsoft.com/en-us/azure/virtual-machines/billing"]
    author: "ThanhNguyxn"

