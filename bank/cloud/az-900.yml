    answerIndex: 0
    explanation: "A 99.9% SLA allows 0.1% downtime. In a 30-day month there are about 43,200 minutes, and 0.1% of that is about 43.2 minutes, so option A is the closest. Option B is wrong because 4.3 hours is closer to a 99% SLA, not 99.9%."
    refs: ["https://learn.microsoft.com/en-us/azure/architecture/framework/resiliency/reliability"]
