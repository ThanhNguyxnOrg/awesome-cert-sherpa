  - id: "az900-expand-067"
    difficulty: "medium"
    tags: ["management", "cloud-shell"]
    question: "What is a key benefit of Azure Cloud Shell compared to installing Azure CLI locally?"
    choices:
      - "A. Cloud Shell requires no installation and is accessible from any browser with Azure authentication"
