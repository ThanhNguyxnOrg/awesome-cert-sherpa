  - id: "az900-extra-019"
    difficulty: "medium"
    tags: ["pricing", "pricing-calculator", "planning"]
    question: "A solutions architect wants to estimate monthly costs for a planned deployment before any resources are created. Which capability is most appropriate?"
    choices: ["A. Azure Pricing Calculator", "B. Cost analysis for last month", "C. Azure Service Health", "D. Azure Advisor"]
    answerIndex: 0
    explanation: "The Azure Pricing Calculator is intended for pre-deployment cost estimates based on selected services and configurations. Option B is wrong because cost analysis is used for analyzing costs after resources are running."
