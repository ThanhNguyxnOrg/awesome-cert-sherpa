    choices: ["A. Yes, the SLA guarantees the app will always be available regardless of architecture", "B. No, SLAs apply to specific services; the application uptime depends on how you design and deploy those services", "C. Yes, if you use any PaaS service", "D. No, Azure does not publish SLAs"]
    answerIndex: 1
    explanation: "Azure publishes SLAs for individual services, but end-to-end application availability depends on design choices like redundancy, failover, and operational practices. Option A is wrong because architecture and configuration strongly influence real application uptime beyond the underlying service SLA."
