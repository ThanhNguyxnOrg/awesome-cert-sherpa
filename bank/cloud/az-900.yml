  - id: "az900-expand-065"
    difficulty: "easy"
    tags: ["management", "portal"]
    question: "Which tool provides a web-based, unified console for building, managing, and monitoring all Azure resources?"
    choices:
      - "A. Azure CLI"
      - "B. Azure portal"
      - "C. Azure PowerShell"
      - "D. Azure Cloud Shell"
    answerIndex: 1
    explanation: "The Azure portal is a web-based GUI that provides a unified console for managing all Azure resources. CLI and PowerShell are command-line tools; Cloud Shell provides a browser-based shell experience."
