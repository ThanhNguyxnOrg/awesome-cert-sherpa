  - id: "az900-extra-018"
    difficulty: "hard"
    tags: ["regions", "data-residency", "compliance"]
    question: "A company must store customer data within a specific country for regulatory reasons and also wants low latency for users in that country. What should they prioritize when selecting where to deploy resources?"
    choices: ["A. Choose any region and rely on encryption to satisfy residency", "B. Choose an Azure region that is located in the required geography and meets the compliance requirement", "C. Choose only the paired region", "D. Use Availability Sets instead of choosing a region"]
    answerIndex: 1
    explanation: "Region selection is the primary control for data residency and latency because resources are deployed into a specific Azure region in a geography. Option A is wrong because encryption does not change the physical location where data is stored and does not by itself satisfy residency requirements."
    refs: ["https://learn.microsoft.com/en-us/azure/availability-zones/az-overview"]
