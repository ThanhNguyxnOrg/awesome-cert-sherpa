  - id: "az900-expand-066"
    difficulty: "medium"
    tags: ["azure-services", "networking", "cdn"]
    question: "A media company wants to deliver video content to users worldwide with low latency by caching content at edge locations. Which Azure service should they use?"
    choices:
      - "A. Azure ExpressRoute"
      - "B. Azure CDN"
      - "C. Azure DNS"
      - "D. Azure VPN Gateway"
    answerIndex: 1
    explanation: "Azure CDN caches content at strategically placed edge locations around the world to minimise latency for end users. ExpressRoute is for private connectivity, not content caching."
    refs:
      - "https://learn.microsoft.com/en-us/azure/cdn/cdn-overview"
