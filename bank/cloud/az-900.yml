    author: "ThanhNguyxn"

  - id: "az900-expand-068"
    difficulty: "hard"
    tags: ["security", "sovereign-regions"]
    question: "A government agency requires that all data and services remain within a specific country to meet data sovereignty requirements. Which Azure concept addresses this?"
    choices:
