  - id: "az900-extra-011"
    difficulty: "medium"
    tags: ["azure-devops", "boards", "agile"]
    question: "A product owner wants to manage backlogs, track work items, and visualize sprint progress with Kanban boards. Which Azure DevOps service supports these needs?"
    choices: ["A. Azure Boards", "B. Azure Pipelines", "C. Azure Repos", "D. Azure DNS"]
    answerIndex: 0
    explanation: "Azure Boards is used for Agile planning, work item tracking, and dashboards/boards for managing delivery. Option B is wrong because Pipelines is for CI/CD automation and does not provide backlog and sprint planning features."
    refs: ["https://learn.microsoft.com/en-us/azure/devops/boards/get-started/what-is-azure-boards?view=azure-devops"]
