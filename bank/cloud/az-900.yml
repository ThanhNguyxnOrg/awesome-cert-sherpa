      - "B. Costs shift from capital expenditure to operational expenditure"
      - "C. There is no change in cost classification"
      - "D. Azure requires upfront hardware purchases"
    answerIndex: 1
    explanation: "Moving to the cloud shifts spending from CapEx (buying hardware) to OpEx (pay-as-you-go consumption). Azure does not require purchasing physical hardware."
    refs:
      - "https://learn.microsoft.com/en-us/azure/cloud-adoption-framework/strategy/business-outcomes/fiscal-outcomes"
