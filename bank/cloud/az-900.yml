      - "B. High availability"
      - "C. Elasticity"
      - "D. Agility"
    answerIndex: 1
    explanation: "High availability is the characteristic that keeps services running despite component-level failures, typically through redundancy. Scalability refers to handling increased load, not surviving failures."
