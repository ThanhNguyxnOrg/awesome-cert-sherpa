  - id: "pmp-expand-029"
    difficulty: "hard"
    tags: ["predictive", "schedule", "crashing"]
    question: "A project is 3 weeks behind schedule. The PM considers crashing the schedule by adding resources to critical path activities. What is a key risk of this approach?"
    choices:
      - "A. Increased costs and potential diminishing returns as communication overhead grows"
      - "B. The project will automatically finish early"
      - "C. Crashing always reduces quality"
      - "D. New resources will immediately be as productive as existing ones"
    answerIndex: 0
    explanation: "Crashing adds resources to compress the schedule but increases costs. Adding people to a late project can also increase communication overhead (Brooks's Law), reduce per-person productivity, and may not compress the schedule proportionally."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-030"
    difficulty: "hard"
    tags: ["predictive", "scope", "gold-plating"]
    question: "A developer adds an extra feature to the deliverable that was not in the approved scope, believing it will delight the customer. What is this practice called and why is it problematic?"
    choices:
      - "A. Gold plating — it adds unapproved scope, introduces risk, and consumes resources without authorization"
      - "B. Value engineering — it improves the product"
      - "C. Scope creep — the customer requested it informally"
      - "D. Progressive elaboration — it refines the scope"
    answerIndex: 0
    explanation: "Gold plating is adding unapproved extras. It's problematic because it consumes time/budget, introduces untested functionality, and was not evaluated for impact. Scope creep involves uncontrolled changes. Progressive elaboration is planned refinement."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
