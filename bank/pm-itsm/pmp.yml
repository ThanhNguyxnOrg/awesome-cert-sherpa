      - "https://www.pmi.org/disciplined-agile"
    author: "ThanhNguyxn"

  - id: "pmp-expand-070"
    difficulty: "hard"
    tags: ["business", "complexity", "adaptive"]
    question: "A project operates in a highly uncertain environment where requirements change weekly based on market feedback. Which project management approach is most appropriate?"
    choices:
      - "A. An adaptive (agile) approach with short iterations and frequent stakeholder feedback loops"
      - "B. A fully predictive approach with detailed upfront planning"
      - "C. No formal approach — let the team self-organize without any framework"
      - "D. A sequential waterfall approach with sign-offs at each phase gate"
    answerIndex: 0
    explanation: "High uncertainty and frequent requirement changes call for adaptive approaches. Short iterations allow rapid feedback incorporation, reducing the cost of change. Predictive approaches assume stable requirements and struggle with frequent changes."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"