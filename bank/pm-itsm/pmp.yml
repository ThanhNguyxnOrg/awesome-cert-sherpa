      - "C. Disbanding the team immediately"
      - "D. Sending a project completion email to stakeholders"
    answerIndex: 0
    explanation: "Lessons learned capture what worked, what didn't, and recommendations for future projects. Updating organizational process assets (templates, checklists, historical data) enables continuous improvement across the organization."
