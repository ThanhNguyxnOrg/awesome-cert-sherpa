      - "C. The project will exceed its budget by exactly 50%"
      - "D. Fast-tracking always reduces quality"
    answerIndex: 0
    explanation: "Fast-tracking overlaps sequential activities, which risks rework if earlier activities produce output that changes what was assumed by the overlapped activities. It can only be applied to activities that can logically overlap and increases risk but not necessarily cost."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
