      - "A. Self-regulation — pause, manage the emotion, and respond professionally"
      - "B. Self-awareness — recognize the emotion but send the email anyway"
      - "C. Social awareness — forward the email to the team for feedback"
      - "D. Motivation — channel frustration into working overtime"
    answerIndex: 0
    explanation: "Self-regulation is the ability to manage disruptive emotions and respond constructively. Recognizing frustration (self-awareness) is step one, but acting on it by self-regulating the response is the actionable skill needed here."
