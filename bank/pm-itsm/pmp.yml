    question: "A control chart for a manufacturing process shows seven consecutive data points above the mean. No points are outside the control limits. What should the PM conclude?"
    choices:
      - "A. The process is out of control due to the Rule of Seven, indicating a non-random pattern"
      - "B. The process is performing perfectly"
      - "C. The control limits need to be widened"
      - "D. No action is needed since all points are within limits"
    answerIndex: 0
    explanation: "The Rule of Seven states that seven or more consecutive points on one side of the mean indicate a non-random pattern (assignable cause), even if within control limits. The process should be investigated for a systematic shift."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
