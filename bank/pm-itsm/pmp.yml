      - "D. Risk category and a generic response plan"
    answerIndex: 0
    explanation: "A comprehensive risk register includes unique ID, description, category, probability, impact, priority score, risk owner, response strategy, triggers (early warning signs), and current status. This enables effective risk monitoring and response."
