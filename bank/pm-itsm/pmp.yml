  - id: "pmp-expand-035"
    difficulty: "hard"
    tags: ["agile", "user-story", "estimation"]
    question: "An agile team uses story points for estimation. What do story points measure?"
    choices:
      - "A. Relative effort considering complexity, uncertainty, and volume of work"
      - "B. The exact number of hours to complete the story"
      - "C. The number of team members required"
      - "D. The monetary cost of implementation"
    answerIndex: 0
    explanation: "Story points measure relative effort — they account for complexity, uncertainty, and the amount of work compared to a reference story. They are intentionally abstract to avoid the false precision of hour-based estimates."
    refs:
      - "https://www.pmi.org/disciplined-agile"
    author: "ThanhNguyxn"

  - id: "pmp-expand-036"
    difficulty: "hard"
    tags: ["agile", "velocity"]
    question: "An agile team's velocity for the last four sprints was 20, 24, 18, and 22 story points. A stakeholder asks when 120 remaining story points will be completed. What is the best estimate?"
    choices:
      - "A. Approximately 5-6 sprints based on an average velocity of 21 story points per sprint"
      - "B. Exactly 5 sprints"
      - "C. 4 sprints because the team is improving"
      - "D. It cannot be estimated without detailed task breakdowns"
    answerIndex: 0
    explanation: "Average velocity = (20+24+18+22)/4 = 21 story points/sprint. 120/21 ≈ 5.7 sprints. The range accounts for velocity variance. Providing a range (5-6 sprints) is more honest than a precise number given the inherent uncertainty."
    refs:
      - "https://www.pmi.org/disciplined-agile"
    author: "ThanhNguyxn"

  - id: "pmp-expand-037"
    difficulty: "hard"
    tags: ["people", "ethics", "pmi-code"]
    question: "A PM discovers that a team member has been inflating progress reports to make the project look on track. What should the PM do?"
    choices:
      - "A. Address the issue privately with the team member, correct the reports, and report accurate status to stakeholders"
      - "B. Ignore it since the project will eventually catch up"
      - "C. Cover it up and gradually correct the reports over time"
      - "D. Immediately terminate the team member"
    answerIndex: 0
    explanation: "The PMI Code of Ethics requires honesty, transparency, and responsible behavior. The PM must address the behavior, ensure accurate reporting, and communicate truthful status. Covering it up or ignoring it violates ethical standards."
