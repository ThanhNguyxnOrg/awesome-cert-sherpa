      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-011"
    difficulty: "medium"
    tags: ["process", "schedule", "critical-path"]
    question: "A project's critical path has a duration of 120 days. Activity F is on the critical path with a duration of 10 days. If Activity F takes 15 days instead, what happens to the project?"
    choices:
      - "A. The project end date is delayed by 5 days"
      - "B. The project end date is unchanged because other paths absorb the delay"
      - "C. Only Activity F's milestone shifts; the project finishes on time"
      - "D. The entire critical path needs to be recalculated from scratch"
    answerIndex: 0
    explanation: "Activities on the critical path have zero float. Any delay directly extends the project end date. A 5-day overrun on Activity F pushes the project to 125 days. Non-critical path activities might absorb delays using their float, but critical path activities cannot."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-012"
    difficulty: "medium"
    tags: ["process", "risk", "qualitative"]
    question: "During qualitative risk analysis, a risk is assessed as high probability and high impact. What should the PM do next?"
    choices:
      - "A. Prioritize this risk for further analysis or immediate response planning"
      - "B. Accept the risk since qualitative analysis is just an estimate"
      - "C. Remove the risk from the risk register"
      - "D. Wait until the risk materializes to respond"
    answerIndex: 0
    explanation: "High probability and high impact risks are top priority. They should be escalated for quantitative analysis if needed, and response strategies (mitigate, avoid, transfer, etc.) should be developed promptly. Waiting for materialization increases exposure."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-013"
    difficulty: "medium"
    tags: ["process", "earned-value", "cost"]
    question: "A project has PV = $100,000, EV = $80,000, and AC = $90,000. What is the Cost Performance Index (CPI) and what does it indicate?"
    choices:
      - "A. CPI = 0.89, indicating the project is over budget"
      - "B. CPI = 1.13, indicating the project is under budget"
      - "C. CPI = 0.80, indicating the project is behind schedule"
      - "D. CPI = 1.25, indicating the project is ahead of schedule"
    answerIndex: 0
    explanation: "CPI = EV/AC = 80,000/90,000 = 0.89. A CPI less than 1.0 means the project is spending more than planned for the work completed (over budget). For every dollar spent, only $0.89 of value is earned."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-014"
    difficulty: "medium"
    tags: ["process", "change-control"]
    question: "A stakeholder requests a significant scope change midway through execution. The PM believes it adds value. What is the correct next step?"
    choices:
      - "A. Submit a change request through the integrated change control process for CCB review"
      - "B. Implement the change immediately since it adds value"
      - "C. Reject the change because execution has already started"
      - "D. Ask the team to add it without updating the project plan"
    answerIndex: 0
    explanation: "All scope changes must go through the integrated change control process, regardless of perceived value. The Change Control Board (CCB) evaluates impact on scope, schedule, cost, and other constraints before approving or rejecting."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-015"
    difficulty: "medium"
    tags: ["process", "quality", "testing"]
    question: "A PM reviews the project's defect rate and finds it increasing during recent sprints. Root cause analysis reveals unclear acceptance criteria. Which process should be improved?"
    choices:
      - "A. Plan Quality Management — ensure acceptance criteria are defined clearly in the quality management plan"
      - "B. Close Project — document lessons learned"
      - "C. Manage Communications — send more status reports"
      - "D. Control Procurements — renegotiate vendor contracts"
    answerIndex: 0
    explanation: "Unclear acceptance criteria is a planning issue. Improving the Plan Quality Management process ensures that quality metrics, acceptance criteria, and testing standards are clearly defined before work begins, reducing defects."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-016"
    difficulty: "medium"
    tags: ["process", "procurement"]
    question: "A project requires specialized hardware from an external vendor. The PM needs the vendor to deliver to exact specifications with minimal flexibility. Which contract type is most appropriate?"
    choices:
      - "A. Firm Fixed Price (FFP)"
      - "B. Cost Plus Incentive Fee (CPIF)"
      - "C. Time and Materials (T&M)"
      - "D. Cost Plus Fixed Fee (CPFF)"
    answerIndex: 0
    explanation: "FFP contracts set a fixed price for well-defined deliverables, placing cost risk on the seller. This is ideal when requirements are clear and the buyer wants price certainty. T&M and cost-plus contracts are better when scope is uncertain."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-017"
    difficulty: "medium"
    tags: ["process", "wbs"]
    question: "A PM creates a WBS and the lowest level contains work packages. What characteristic defines a good work package?"
    choices:
      - "A. It can be estimated, scheduled, monitored, and assigned to a single responsible owner"
      - "B. It represents an entire phase of the project"
      - "C. It cannot be decomposed further under any circumstances"
      - "D. It must be completed within one calendar day"
    answerIndex: 0
    explanation: "A work package is the lowest level of the WBS that can be meaningfully estimated (cost and duration), scheduled, monitored for progress, and controlled. It can be further decomposed into activities for scheduling purposes."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-018"
    difficulty: "medium"
    tags: ["process", "risk", "response"]
    question: "A project faces a risk of a key vendor going bankrupt. The PM decides to identify a backup vendor and include switching costs in the budget. Which risk response strategy is being used?"
    choices:
      - "A. Mitigate"
      - "B. Avoid"
      - "C. Transfer"
      - "D. Accept"
    answerIndex: 0
    explanation: "Mitigation reduces the probability or impact of a risk. Having a backup vendor reduces the impact if the primary vendor fails. Avoidance eliminates the threat entirely. Transfer shifts the impact (e.g., insurance). Acceptance takes no proactive action."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-019"
    difficulty: "medium"
    tags: ["process", "schedule", "estimation"]
    question: "A PM uses three-point estimation for a task: Optimistic = 4 days, Most Likely = 7 days, Pessimistic = 16 days. Using the PERT formula, what is the expected duration?"
    choices:
      - "A. 8 days"
      - "B. 7 days"
      - "C. 9 days"
      - "D. 10 days"
    answerIndex: 0
    explanation: "PERT expected duration = (O + 4M + P) / 6 = (4 + 28 + 16) / 6 = 48 / 6 = 8 days. The PERT formula weights the most likely estimate most heavily (4x) to account for the typical skew in task duration distributions."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-020"
    difficulty: "medium"
    tags: ["process", "integration", "lessons-learned"]
    question: "During a sprint retrospective, the team identifies that their estimation accuracy has improved but deployment automation is still causing delays. What should the PM prioritize?"
    choices:
      - "A. Document both findings in the lessons learned register and create action items for deployment automation improvement"
      - "B. Only celebrate the estimation improvement"
      - "C. Delay addressing deployment until the next project"
      - "D. Assign blame to the DevOps team"
    answerIndex: 0
    explanation: "Lessons learned should capture both successes and areas for improvement. Creating actionable items for the deployment issue ensures continuous improvement. Delaying fixes wastes the retrospective's value. Blame undermines team trust."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-021"
    difficulty: "medium"
    tags: ["business", "benefits", "value"]
    question: "A project sponsor asks the PM to calculate the project's Return on Investment (ROI). The project costs $500,000 and is expected to generate $750,000 in benefits. What is the ROI?"
    choices:
      - "A. 50%"
      - "B. 33%"
      - "C. 150%"
      - "D. 25%"
    answerIndex: 0
    explanation: "ROI = (Benefits - Costs) / Costs × 100 = ($750,000 - $500,000) / $500,000 × 100 = 50%. This means for every dollar invested, the project returns $1.50 ($1.00 original + $0.50 profit)."
    refs:
      - "https://www.pmi.org/learning/library"
    author: "ThanhNguyxn"

