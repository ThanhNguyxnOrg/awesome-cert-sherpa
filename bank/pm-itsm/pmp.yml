    question: "A company must choose between two projects. Project A has an NPV of $200,000 and Project B has an NPV of $150,000. All other factors are equal. Which project should be selected and why?"
    choices:
      - "A. Project A because higher NPV indicates greater expected value in today's dollars"
      - "B. Project B because lower NPV means less risk"
      - "C. The project with the shorter duration"
      - "D. The project with fewer resources required"
    answerIndex: 0
    explanation: "NPV (Net Present Value) discounts future cash flows to present value. A higher NPV indicates the project delivers more value after accounting for the time value of money. When other factors are equal, the higher NPV project is preferred."
