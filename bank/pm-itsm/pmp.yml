  - id: "pmp-expand-032"
    difficulty: "hard"
    tags: ["predictive", "cost", "eac"]
    question: "A project has BAC = $200,000, EV = $80,000, AC = $100,000, and the PM expects remaining work to be performed at the current CPI. What is the Estimate at Completion (EAC)?"
    choices:
      - "A. $250,000"
      - "B. $220,000"
      - "C. $200,000"
      - "D. $280,000"
    answerIndex: 0
    explanation: "When using the CPI-based formula: EAC = BAC/CPI. CPI = EV/AC = 80,000/100,000 = 0.80. EAC = 200,000/0.80 = $250,000. The project is expected to cost $50,000 more than originally budgeted."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-033"
    difficulty: "hard"
    tags: ["agile", "scrum", "sprint"]
    question: "During a sprint, a stakeholder requests an urgent change to a user story already in progress. What should the Scrum team do?"
    choices:
      - "A. The Product Owner evaluates the request and may add it to the backlog for the next sprint, or negotiate removing equivalent work from the current sprint"
      - "B. The developer immediately implements the change"
      - "C. The Scrum Master cancels the current sprint"
      - "D. The team votes to extend the sprint by one week"
    answerIndex: 0
    explanation: "Sprint scope is protected. The Product Owner evaluates the urgency and can negotiate scope changes within the sprint or prioritize it for the next sprint. Only the Product Owner can cancel a sprint if the sprint goal becomes obsolete."
    refs:
      - "https://www.pmi.org/disciplined-agile"
    author: "ThanhNguyxn"

  - id: "pmp-expand-034"
    difficulty: "hard"
    tags: ["agile", "kanban", "flow"]
    question: "A Kanban team notices that work items frequently get stuck in the 'Code Review' column, causing a bottleneck. What should the team do?"
    choices:
      - "A. Analyze the bottleneck, reduce WIP limits upstream, and increase review capacity or pair programming"
      - "B. Remove the Code Review column from the board"
      - "C. Increase the WIP limit for Code Review to allow more items"
      - "D. Skip code reviews for low-priority items"
    answerIndex: 0
    explanation: "Kanban principles focus on flow optimization. Addressing bottlenecks involves analyzing root causes, possibly reducing upstream WIP to prevent queue buildup, and increasing capacity at the constraint (more reviewers, pair programming). Increasing WIP worsens the bottleneck."
