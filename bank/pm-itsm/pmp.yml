  - id: "pmp-expand-010"
    difficulty: "easy"
    tags: ["people", "negotiation"]
    question: "During resource negotiation with a functional manager, the PM learns the requested specialist is only available part-time. What should the PM do?"
    choices:
      - "A. Negotiate the critical periods when the specialist is needed most and adjust the schedule accordingly"
      - "B. Reject the offer and demand full-time allocation"
      - "C. Accept the constraint without adjusting the plan"
      - "D. Hire an external consultant immediately"
    answerIndex: 0
    explanation: "Effective negotiation involves finding mutually beneficial solutions. Identifying critical periods maximizes the specialist's impact while respecting the functional manager's constraints. Adjusting the schedule reflects realistic planning."
