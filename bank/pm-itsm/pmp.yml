      - "B. Storming"
      - "C. Norming"
      - "D. Performing"
    answerIndex: 0
    explanation: "In the Forming stage, team members are polite, cautious, and getting to know each other. They avoid conflict and look to the PM for direction. Storming involves conflict and competition. Norming establishes working agreements. Performing is self-managing."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
