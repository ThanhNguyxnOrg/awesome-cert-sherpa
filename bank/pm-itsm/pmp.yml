  - id: "pmp-expand-031"
    difficulty: "hard"
    tags: ["predictive", "risk", "quantitative"]
    question: "A PM uses Monte Carlo simulation to analyze project schedule risk. What does the simulation output provide?"
    choices:
      - "A. A probability distribution of possible project completion dates"
      - "B. A single deterministic end date"
      - "C. A list of all risks in the risk register"
      - "D. The exact critical path activities that will be delayed"
    answerIndex: 0
    explanation: "Monte Carlo simulation runs thousands of iterations with varying task durations to produce a probability distribution of outcomes. It shows the likelihood of completing by various dates (e.g., 80% chance by March 15). It does not produce a single deterministic answer."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
