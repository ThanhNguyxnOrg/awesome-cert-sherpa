      - "C. Communicate only via email to avoid scheduling conflicts"
      - "D. Reduce status meetings to once per month"
    answerIndex: 0
    explanation: "Effective virtual team management uses a combination of overlapping core hours for essential synchronous communication and asynchronous tools (chat, shared documents) for ongoing collaboration, respecting team members' local working hours."
