  - id: "pmp-expand-007"
    difficulty: "easy"
    tags: ["people", "emotional-intelligence"]
    question: "A PM realizes they are frustrated with a vendor's repeated delays and feels like responding harshly in an email. What emotional intelligence skill should the PM apply?"
