      - "B. Start-to-Start (SS)"
      - "C. Finish-to-Finish (FF)"
      - "D. Start-to-Finish (SF)"
    answerIndex: 0
    explanation: "Finish-to-Start is the most common dependency type: the successor (B) cannot start until the predecessor (A) finishes. SS means both start together. FF means both finish together. SF is rare — the successor finishes when the predecessor starts."
