      - "C. Coaching — closely supervise while providing support"
      - "D. Supporting — make all decisions collaboratively regardless of expertise"
    answerIndex: 0
    explanation: "Situational leadership theory suggests matching leadership style to team maturity. Highly experienced teams (high competence, high commitment) perform best with a delegating style that provides autonomy. Directing is for low-maturity teams."
