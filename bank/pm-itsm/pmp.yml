  - id: "pmp-expand-066"
    difficulty: "hard"
    tags: ["predictive", "earned-value", "tcpi"]
    question: "A project has BAC = $300,000, EV = $150,000, AC = $180,000. The To-Complete Performance Index (TCPI) based on BAC is 1.25. What does this mean?"
    choices:
      - "A. For every dollar spent on remaining work, $1.25 of value must be earned to finish on budget"
      - "B. The project is 25% ahead of schedule"
      - "C. The remaining work will cost 25% less than planned"
      - "D. The project needs 25% more budget"
    answerIndex: 0
    explanation: "TCPI = (BAC - EV) / (BAC - AC) = (300K - 150K) / (300K - 180K) = 150K/120K = 1.25. This means the team must achieve a CPI of 1.25 for all remaining work to finish on the original budget — a significant performance improvement requirement."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-067"
    difficulty: "hard"
    tags: ["agile", "technical-debt"]
    question: "During sprint planning, the team wants to allocate 20% of their capacity to addressing technical debt. The Product Owner pushes back, wanting all capacity for new features. What should happen?"
    choices:
      - "A. The team should explain the long-term cost of ignoring technical debt and negotiate a sustainable balance"
      - "B. The PO's decision is final — deliver only new features"
      - "C. The team ignores the PO and works on technical debt secretly"
      - "D. Technical debt should never be worked on during sprints"
    answerIndex: 0
    explanation: "Technical debt reduces velocity over time and increases defect risk. The team should transparently explain the consequences (slower delivery, more bugs) and negotiate a sustainable allocation. The PO prioritizes features, but the team owns quality and sustainability."
    refs:
      - "https://www.pmi.org/disciplined-agile"
    author: "ThanhNguyxn"

  - id: "pmp-expand-068"
    difficulty: "hard"
    tags: ["process", "procurement", "sow"]
    question: "A vendor delivers a system that meets all requirements in the Statement of Work but performs poorly under production load. The SOW did not specify performance benchmarks. Who is responsible?"
    choices:
      - "A. The buying organization — the SOW should have included specific performance requirements and acceptance criteria"
      - "B. The vendor — they should have anticipated performance needs"
      - "C. The PM — they should have tested it before signing the SOW"
      - "D. Neither — performance is always separate from contractual obligations"
    answerIndex: 0
    explanation: "The SOW is the buying organization's responsibility to define completely. If performance requirements were omitted, the vendor met their contractual obligation. This highlights the importance of including non-functional requirements (performance, scalability) in procurement documents."
    refs:
      - "https://www.pmi.org/pmbok-guide-standards"
    author: "ThanhNguyxn"

  - id: "pmp-expand-069"
    difficulty: "medium"
    tags: ["agile", "daily-standup"]
    question: "During a daily standup, a team member consistently goes into lengthy technical details. What should the Scrum Master do?"
    choices:
      - "A. Remind the team of the standup's purpose and suggest taking detailed discussions offline"
      - "B. Let them finish to avoid conflict"
      - "C. Cancel the daily standup"
      - "D. Limit each person to exactly 30 seconds"
    answerIndex: 0
    explanation: "The daily standup is a brief synchronization event focused on three questions: what did I do, what will I do, and what's blocking me. Detailed technical discussions should be taken offline ('parking lot') to respect everyone's time."
