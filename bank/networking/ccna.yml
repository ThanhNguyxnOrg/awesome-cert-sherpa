      - "B. HTTP traffic from any source to 10.0.0.0/24"
      - "C. All TCP traffic from 10.0.0.0/24"
      - "D. SSH traffic from 10.0.0.0/24 to any destination"
    answerIndex: 0
    explanation: "This ACL permits TCP traffic from source 10.0.0.0/24 to any destination on port 443 (HTTPS). Extended ACLs can match source/destination IP, protocol, and port numbers. Port 443 is HTTPS, 80 is HTTP, and 22 is SSH."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/security/ios-firewall/23602-confaccesslists.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-041"
    difficulty: "hard"
