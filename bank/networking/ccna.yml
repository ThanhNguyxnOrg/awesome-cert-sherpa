  - id: "ccna-expand-036"
    difficulty: "medium"
    tags: ["ip-services", "dhcp", "snooping"]
    question: "What is the primary purpose of DHCP snooping on a switch?"
    choices:
      - "A. To prevent rogue DHCP servers from assigning addresses to clients"
      - "B. To encrypt DHCP traffic between client and server"
      - "C. To increase the DHCP lease time"
      - "D. To convert DHCP broadcasts to multicasts"
    answerIndex: 0
    explanation: "DHCP snooping validates DHCP messages by classifying ports as trusted (toward legitimate DHCP server) or untrusted (toward clients). DHCP Offer and Ack messages from untrusted ports are dropped, preventing rogue servers from serving addresses."
    refs:
      - "https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/17-6/configuration_guide/sec/b-176-sec-9300-cg/configuring-dhcp-snooping.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-037"
    difficulty: "medium"
    tags: ["ip-services", "nat", "troubleshooting"]
    question: "A router performs PAT for internal hosts. External users report they cannot initiate connections to an internal web server. What additional NAT configuration is required?"
