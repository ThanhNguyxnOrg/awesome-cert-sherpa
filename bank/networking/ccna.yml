      - "B. It serves as a backup for designated ports on the same segment"
      - "C. It always remains in forwarding state"
      - "D. It connects to the root bridge directly"
    answerIndex: 0
    explanation: "An RSTP alternate port receives a superior BPDU from another bridge and serves as a standby for the root port. If the root port fails, the alternate port transitions to forwarding without the traditional STP convergence delay. A backup port is the standby for a designated port."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/lan-switching/spanning-tree-protocol/24062-146.html"
