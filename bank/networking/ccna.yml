      - "C. line vty 0 4 / no transport input telnet"
      - "D. line vty 0 4 / service ssh enable"
    answerIndex: 0
    explanation: "Setting 'transport input ssh' on VTY lines restricts inbound management access to SSH only. 'login local' requires local username authentication. 'transport output' controls outbound connections. Simply removing telnet without adding ssh may disable all access."
