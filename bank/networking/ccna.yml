      - "C. SNMPv1 with read-only communities"
      - "D. SNMPv3 with noAuthNoPriv security level"
    answerIndex: 0
    explanation: "SNMPv3 authPriv provides both authentication (MD5/SHA) and encryption (DES/AES) for SNMP messages. SNMPv1/v2c use community strings in plaintext. SNMPv3 noAuthNoPriv provides neither authentication nor encryption."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/simple-network-management-protocol-snmp/7282-12.html"
