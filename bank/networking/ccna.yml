  - id: "ccna-expand-039"
    difficulty: "hard"
    tags: ["security-fundamentals", "acl"]
    question: "A standard ACL numbered 10 is applied inbound on interface GigabitEthernet0/1. It contains: 'permit 192.168.1.0 0.0.0.255'. A packet arrives from source 192.168.2.5 destined for 10.0.0.1. What happens?"
    choices:
      - "A. The packet is denied by the implicit deny at the end of the ACL"
      - "B. The packet is permitted because the ACL only checks destination"
      - "C. The packet is forwarded because standard ACLs don't filter"
      - "D. The packet is sent back to the source"
    answerIndex: 0
    explanation: "Standard ACLs filter based on source IP only. The source 192.168.2.5 doesn't match 192.168.1.0/24, so it falls through to the implicit 'deny any' at the end of every ACL. No explicit deny statement is needed — it's always present."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/security/ios-firewall/23602-confaccesslists.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-040"
    difficulty: "hard"
