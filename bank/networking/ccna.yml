      - "D. The TCP window size is too small"
    answerIndex: 0
    explanation: "By default, eBGP expects the peer to be directly connected (TTL=1). Using loopback addresses means packets traverse at least two hops, so 'ebgp-multihop' must be configured. Both AS numbers are in the private range (64512-65534) which is valid for BGP. BGP does not require OSPF."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/border-gateway-protocol-bgp/26634-bgp-toc.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-053"
    difficulty: "hard"
    tags: ["network-access", "vlans", "troubleshooting"]
    question: "A trunk port between two switches shows 'up/up' but traffic for VLAN 50 doesn't cross. 'show vlan brief' shows VLAN 50 active on both switches. What should the admin check?"
    choices:
      - "A. Whether VLAN 50 is in the trunk's allowed VLAN list on both sides"
      - "B. Whether STP is disabled globally"
      - "C. Whether the port speed matches"
      - "D. Whether CDP is enabled"
    answerIndex: 0
    explanation: "Even if a trunk is up and VLAN 50 exists on both switches, the trunk's allowed VLAN list may exclude VLAN 50. Use 'show interfaces trunk' to verify the allowed and active VLANs on each side. STP pruning or explicit allowed VLAN configuration could be the cause."
    refs:
      - "https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/17-6/configuration_guide/vlan/b-176-vlan-9300-cg/configuring-vlan-trunks.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-054"
    difficulty: "hard"
    tags: ["ip-connectivity", "ospf", "areas"]
    question: "A network has OSPF areas 0, 1, and 2. Area 2 is not directly connected to area 0. What must be configured to allow area 2 to participate in OSPF routing?"
    choices:
      - "A. A virtual link through area 1 to connect area 2 to area 0"
      - "B. A static route from area 2 to area 0"
      - "C. BGP redistribution between areas"
      - "D. A tunnel interface between area 2 and area 0"
    answerIndex: 0
    explanation: "OSPF requires all areas to connect to the backbone area 0. If a non-backbone area cannot directly connect, a virtual link through a transit area creates a logical connection to area 0. The transit area must not be a stub area."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/open-shortest-path-first-ospf/47866-ospfdb9.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-055"
    difficulty: "hard"
    tags: ["automation", "restconf", "yang"]
    question: "A network engineer retrieves interface configuration from a Cisco device using RESTCONF. The response Content-Type header shows 'application/yang-data+json'. What does this indicate?"
    choices:
      - "A. The response body is JSON formatted according to a YANG data model"
      - "B. The device only supports XML encoding"
      - "C. The YANG model file itself is being returned"
      - "D. The response is a NETCONF RPC reply"
    answerIndex: 0
    explanation: "The Content-Type 'application/yang-data+json' indicates the payload is JSON-encoded data structured according to YANG models as defined in RESTCONF (RFC 8040). RESTCONF supports both JSON and XML encodings. NETCONF uses XML exclusively."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc8040"
    author: "ThanhNguyxn"

  - id: "ccna-expand-056"
    difficulty: "hard"
    tags: ["automation", "sdwan"]
    question: "In Cisco SD-WAN architecture, which component is responsible for centralized policy configuration and pushing control policies to the network?"
    choices:
      - "A. vSmart controller"
      - "B. vManage"
      - "C. vEdge router"
      - "D. vBond orchestrator"
    answerIndex: 0
    explanation: "The vSmart controller establishes OMP (Overlay Management Protocol) sessions with edge devices and pushes centralized control policies. vManage provides the GUI for management. vBond authenticates and orchestrates initial connections. vEdge/cEdge are the data-plane devices."
    refs:
      - "https://www.cisco.com/c/en/us/solutions/enterprise-networks/sd-wan/index.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-057"
    difficulty: "medium"
    tags: ["network-access", "wireless", "controller"]
    question: "In a Cisco wireless LAN controller (WLC) deployment, lightweight APs operate in which mode by default?"
    choices:
      - "A. Local mode"
      - "B. FlexConnect mode"
      - "C. Monitor mode"
      - "D. Sniffer mode"
    answerIndex: 0
    explanation: "Lightweight APs default to local mode, where all client data is tunneled back to the WLC via CAPWAP. FlexConnect allows local switching at the AP. Monitor mode is for intrusion detection. Sniffer mode captures traffic for analysis."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/wireless/5500-series-wireless-controllers/116978-config-wlc-00.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-058"
    difficulty: "medium"
    tags: ["ip-services", "acl", "nat"]
    question: "When configuring PAT, an ACL is referenced in the NAT statement. What does this ACL define?"
    choices:
      - "A. Which internal source addresses are eligible for translation"
      - "B. Which destination addresses receive translated traffic"
      - "C. Which ports are open on the firewall"
      - "D. Which VLAN traffic is permitted on trunks"
    answerIndex: 0
    explanation: "In a NAT/PAT configuration like 'ip nat inside source list 10 interface Gi0/1 overload', the referenced ACL (list 10) defines which inside source IP addresses should be translated. It does not control firewall rules or VLAN trunking."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/network-address-translation-nat/13772-12.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-059"
    difficulty: "hard"
    tags: ["automation", "dna-center"]
    question: "In Cisco DNA Center's intent-based networking model, what does 'assurance' provide?"
    choices:
      - "A. Continuous monitoring, analytics, and remediation of network issues using AI/ML"
      - "B. Automated device provisioning via templates"
      - "C. Software image management and compliance"
      - "D. Integration with third-party ITSM tools"
    answerIndex: 0
    explanation: "DNA Center Assurance uses AI/ML to continuously monitor network health, detect issues, correlate events, and suggest or apply remediations. Provisioning handles device configuration. Software Image Management (SWIM) handles firmware. ITSM integration is a separate feature."
    refs:
