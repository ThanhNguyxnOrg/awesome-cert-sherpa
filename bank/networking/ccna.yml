      - "D. Kerberos authentication"
    answerIndex: 0
    explanation: "WPA3-Personal replaces PSK with SAE (Simultaneous Authentication of Equals), also known as Dragonfly. SAE provides protection against offline dictionary attacks and forward secrecy, which WPA2-PSK lacks."
    refs:
