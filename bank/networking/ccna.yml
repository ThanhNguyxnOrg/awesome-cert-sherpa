    author: "ThanhNguyxn"

  - id: "ccna-expand-060"
    difficulty: "hard"
    tags: ["automation", "cisco-sdwan", "troubleshooting"]
    question: "A network engineer notices that two SD-WAN edge devices can form control connections to vSmart but cannot establish data-plane tunnels between each other. IPsec SA negotiation fails. What is the most likely cause?"
    choices:
      - "A. A firewall between the sites is blocking UDP port 12346 (IPsec for SD-WAN data plane)"
      - "B. The vBond orchestrator is down"
      - "C. The OMP routes are not being redistributed"
      - "D. The system-ip addresses are identical on both devices"
    answerIndex: 0
    explanation: "If control connections work but data-plane tunnels fail, the issue is typically a firewall or NAT blocking the data-plane ports (default UDP 12346 for IPsec). If vBond were down, control connections wouldn't form. Identical system-IPs would prevent OMP sessions from establishing."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/routers/sd-wan/214509-troubleshoot-control-connections.html"
    author: "ThanhNguyxn"
