      - "C. write network tftp"
      - "D. backup running-config tftp"
    answerIndex: 0
    explanation: "The 'copy running-config tftp:' command exports the current running configuration to a TFTP server. The router prompts for the server IP and filename. 'copy tftp: running-config' does the reverse — restoring from TFTP."
