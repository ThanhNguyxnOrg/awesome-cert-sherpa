  - id: "ccna-expand-043"
    difficulty: "hard"
    tags: ["security-fundamentals", "dai"]
    question: "Dynamic ARP Inspection (DAI) is enabled on a VLAN but the DHCP snooping binding table is empty. What effect does this have on hosts in that VLAN?"
    choices:
      - "A. All ARP packets on untrusted ports are dropped because there are no valid bindings"
      - "B. All ARP traffic is permitted by default"
      - "C. Only gratuitous ARP is blocked"
      - "D. DAI automatically disables until bindings are populated"
    answerIndex: 0
    explanation: "DAI validates ARP packets against the DHCP snooping binding table. Without entries in the table, no ARP packets on untrusted ports match a valid binding, so they are all dropped. Static ARP inspection entries or DHCP snooping bindings must exist first."
    refs:
      - "https://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst9300/software/release/17-6/configuration_guide/sec/b-176-sec-9300-cg/configuring-dynamic-arp-inspection.html"
