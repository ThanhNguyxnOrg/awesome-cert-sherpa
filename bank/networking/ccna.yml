  - id: "ccna-expand-034"
    difficulty: "medium"
    tags: ["ip-services", "syslog"]
    question: "A router is configured with 'logging trap warnings'. Which syslog severity levels will be sent to the syslog server?"
    choices:
      - "A. Emergency, Alert, Critical, Error, and Warning (levels 0-4)"
      - "B. Only Warning (level 4)"
      - "C. Warning, Notice, Informational, Debug (levels 4-7)"
      - "D. All levels (0-7)"
    answerIndex: 0
    explanation: "The 'logging trap' command sets a severity threshold. All messages at or more severe than the specified level are sent. Warning is level 4, so levels 0 (Emergency) through 4 (Warning) are included. More verbose levels (5-7) are excluded."
    refs:
      - "https://www.cisco.com/c/en/us/td/docs/routers/access/800M/software/800MSCG/systemlog.html"
