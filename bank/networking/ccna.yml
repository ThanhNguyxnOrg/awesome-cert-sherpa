      - "D. To assign IP addresses to OSPF neighbors"
    answerIndex: 0
    explanation: "On multi-access networks, the DR reduces OSPF overhead by forming adjacencies with all other routers. Routers send LSAs to the DR, which then floods them to all neighbors. Without a DR, every router would need a full adjacency with every other router."
