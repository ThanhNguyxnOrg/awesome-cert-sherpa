      - "B. All login attempts are denied"
      - "C. The router prompts for the enable password"
      - "D. The router bypasses authentication entirely"
    answerIndex: 0
    explanation: "The method list 'group radius local' tries RADIUS first. If the RADIUS server is unreachable (not if credentials are rejected), it falls back to the local database. If the user had wrong credentials at RADIUS, there would be no fallback."
