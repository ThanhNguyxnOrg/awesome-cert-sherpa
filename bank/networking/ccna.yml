  - id: "ccna-expand-027"
    difficulty: "medium"
    tags: ["ip-connectivity", "ipv6", "slaac"]
    question: "A host uses SLAAC to configure its IPv6 address. Where does it obtain the network prefix?"
    choices:
      - "A. From Router Advertisement (RA) messages"
      - "B. From a DHCPv6 server"
      - "C. From the DNS server"
      - "D. From the link-local address of the default gateway"
    answerIndex: 0
    explanation: "SLAAC (Stateless Address Autoconfiguration) uses Router Advertisement messages sent by routers to learn the /64 prefix. The host then generates its interface ID (via EUI-64 or random). DHCPv6 provides stateful addressing, not SLAAC prefix information."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc4862"
    author: "ThanhNguyxn"

  - id: "ccna-expand-028"
    difficulty: "medium"
    tags: ["ip-connectivity", "routing", "troubleshooting"]
    question: "A router can ping 10.1.1.1 from its directly connected interface but hosts behind the router cannot reach 10.1.1.1. The remote router has no route back to the hosts' subnet. What should be configured?"
    choices:
      - "A. A return route on the remote router for the hosts' subnet"
      - "B. NAT on the local router"
      - "C. A longer subnet mask on the local router"
      - "D. A DNS entry for the hosts"
    answerIndex: 0
    explanation: "Asymmetric routing occurs when the remote device has no return path. The router's directly connected interface works because the remote already has a route to that subnet. Adding a return route (static or via routing protocol) for the hosts' subnet fixes the problem."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/ip-routed-protocols/17046-extroutes.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-029"
    difficulty: "medium"
    tags: ["ip-connectivity", "ospf", "passive-interface"]
    question: "An OSPF router has a LAN interface connected to end-user workstations. The admin wants to advertise this subnet in OSPF but prevent OSPF hellos from being sent on that interface. Which feature should be used?"
    choices:
      - "A. passive-interface"
      - "B. distribute-list in"
      - "C. route-map deny"
      - "D. access-list blocking OSPF"
    answerIndex: 0
    explanation: "The passive-interface command includes the interface's subnet in OSPF advertisements but suppresses hello packets on that interface. This prevents unnecessary neighbor relationships with end hosts while still advertising the network."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/open-shortest-path-first-ospf/13699-29.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-030"
    difficulty: "medium"
    tags: ["ip-connectivity", "subnetting", "vlsm"]
    question: "A company needs to create 4 subnets from the 172.16.0.0/16 network, with the largest subnet requiring 1000 hosts. What is the most efficient subnet mask for the largest subnet?"
    choices:
      - "A. /22 (255.255.252.0)"
      - "B. /20 (255.255.240.0)"
      - "C. /24 (255.255.255.0)"
      - "D. /21 (255.255.248.0)"
    answerIndex: 0
    explanation: "A /22 provides 2^10 - 2 = 1022 usable host addresses, which accommodates 1000 hosts with minimal waste. A /24 only supports 254 hosts. A /21 gives 2046 hosts — more than needed. A /20 provides even more waste."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/routing-information-protocol-rip/13790-8.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-031"
    difficulty: "medium"
    tags: ["ip-services", "dhcp"]
    question: "Hosts in VLAN 10 on Switch A need DHCP addresses from a server in VLAN 20 on Switch B. The Layer 3 switch has SVIs for both VLANs. What must be configured on the VLAN 10 SVI?"
    choices:
      - "A. ip helper-address pointing to the DHCP server's IP"
      - "B. ip dhcp pool for VLAN 10"
      - "C. ip dhcp relay enable"
      - "D. ip forward-protocol tcp"
    answerIndex: 0
    explanation: "The ip helper-address command on the VLAN 10 SVI converts DHCP broadcast Discover messages into unicast messages directed to the DHCP server's IP. This allows the DHCP server in a different VLAN/subnet to receive and respond to DHCP requests."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/dynamic-address-allocation-resolution/27470-100.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-032"
    difficulty: "medium"
    tags: ["ip-services", "ntp"]
    question: "A network has three NTP strata: stratum 1, stratum 2, and stratum 3 servers. Which stratum provides the most accurate time?"
    choices:
      - "A. Stratum 1"
      - "B. Stratum 2"
      - "C. Stratum 3"
      - "D. All strata provide identical accuracy"
    answerIndex: 0
    explanation: "NTP stratum indicates the distance from the reference clock. Stratum 1 is directly connected to a reference clock (GPS, atomic). Each hop adds a stratum level and introduces potential delay/inaccuracy. Stratum 0 is the reference clock itself."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc5905"
    author: "ThanhNguyxn"

  - id: "ccna-expand-033"
    difficulty: "medium"
    tags: ["ip-services", "snmp"]
    question: "Which version of SNMP provides authentication and encryption for management traffic?"
    choices:
      - "A. SNMPv3 with authPriv security level"
