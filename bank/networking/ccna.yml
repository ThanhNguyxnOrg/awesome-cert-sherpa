      - "B. A second PAT pool for inbound traffic"
      - "C. A default route pointing to the internal server"
      - "D. An access list permitting all inbound traffic"
    answerIndex: 0
    explanation: "PAT only translates outbound-initiated connections. For inbound access to a server, a static NAT (or static PAT) entry must map the public IP:port to the server's private IP:port so the router knows where to forward incoming requests."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/ip/network-address-translation-nat/13772-12.html"
    author: "ThanhNguyxn"

  - id: "ccna-expand-038"
