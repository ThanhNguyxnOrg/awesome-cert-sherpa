  - id: "ccna-expand-035"
    difficulty: "medium"
    tags: ["ip-services", "qos"]
    question: "Which QoS mechanism is used to re-mark and drop packets that exceed a defined traffic rate?"
    choices:
      - "A. Policing"
      - "B. Shaping"
      - "C. Queuing"
      - "D. Compression"
    answerIndex: 0
    explanation: "Policing monitors traffic rates and can drop or re-mark packets that exceed the configured rate. Shaping buffers excess traffic and transmits it later. Queuing manages how packets are scheduled for transmission. Compression reduces packet size."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/quality-of-service-qos/qos-policing/19645-policevsshape.html"
