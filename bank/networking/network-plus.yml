    question: "Which IPv4 address range is reserved for multicast traffic?"
    choices:
      - "A. 224.0.0.0 – 239.255.255.255"
      - "B. 240.0.0.0 – 255.255.255.255"
      - "C. 10.0.0.0 – 10.255.255.255"
      - "D. 169.254.0.0 – 169.254.255.255"
    answerIndex: 0
    explanation: "Class D addresses (224.0.0.0/4) are reserved for multicast. 240.0.0.0/4 is reserved (Class E). 10.0.0.0/8 is private (RFC 1918). 169.254.0.0/16 is link-local (APIPA). Multicast allows one-to-many communication without flooding the entire network."
