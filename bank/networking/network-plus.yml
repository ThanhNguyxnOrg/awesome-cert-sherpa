meta:
  category: "networking"
  cert: "Network+"
  vendor: "CompTIA"
  version: 1
  description: "Original practice questions for CompTIA Network+ (N10-009)"
questions:
  - id: "nplus-osi-001"
    difficulty: "easy"
    tags: ["OSI", "DNS", "troubleshooting"]
    question: "A user reports they can ping 8.8.8.8 but cannot open https://example.com by name. Other users are unaffected. Which component is MOST likely failing on the user's workstation?"
    choices:
      - "A. Default gateway configuration"
      - "B. DNS client configuration"
      - "C. Ethernet duplex setting"
      - "D. Layer 2 switch port security"
    answerIndex: 1
    explanation: "This points to a name resolution issue, so the DNS client settings (DNS server, suffix, or local resolver) are the most likely cause. If the default gateway were wrong, the ping to a public IP would typically fail. Duplex mismatches can cause performance problems but do not selectively break hostname resolution."
    refs:
      - "https://www.cloudflare.com/learning/dns/what-is-dns/"
    author: "ThanhNguyxn"

  - id: "nplus-tcpip-002"
    difficulty: "easy"
    tags: ["TCP", "UDP", "applications"]
    question: "A company is deploying a new VoIP system and wants to minimize latency and jitter on the call media stream. Which transport protocol is MOST appropriate for the voice media traffic?"
    choices:
      - "A. TCP"
      - "B. UDP"
      - "C. ICMP"
      - "D. ARP"
    answerIndex: 1
    explanation: "VoIP media is typically carried over UDP because it avoids the retransmission delays and head-of-line blocking common with TCP. TCP's reliability features can increase latency when packets are lost. ICMP and ARP are not used to carry application media streams."
    refs:
      - "https://en.wikipedia.org/wiki/User_Datagram_Protocol"
    author: "ThanhNguyxn"

  - id: "nplus-ports-003"
    difficulty: "easy"
    tags: ["ports", "TLS", "web"]
    question: "A firewall rule must allow users to browse secure websites. Which destination port should be permitted for standard HTTPS traffic?"
    choices:
      - "A. 22"
      - "B. 80"
      - "C. 443"
      - "D. 3389"
    answerIndex: 2
    explanation: "HTTPS commonly uses TCP port 443 for TLS-encrypted web traffic. Port 80 is HTTP and is not encrypted by default. Port 22 is SSH and 3389 is RDP, neither of which is used for standard web browsing."
    refs:
      - "https://www.cloudflare.com/learning/ssl/what-is-https/"
    author: "ThanhNguyxn"

  - id: "nplus-subnet-004"
    difficulty: "easy"
    tags: ["subnetting", "IPv4", "addressing"]
    question: "A small office uses the network 192.168.50.0/24 for user devices. How many usable host IP addresses are available in this subnet?"
    choices:
      - "A. 252"
      - "B. 254"
      - "C. 256"
      - "D. 510"
    answerIndex: 1
    explanation: "A /24 has 256 total addresses; subtract the network and broadcast addresses to get 254 usable hosts. 256 incorrectly counts non-usable addresses as hosts. 510 would apply to a larger subnet (like /23), not a /24."
    refs:
      - "https://en.wikipedia.org/wiki/Classless_Inter-Domain_Routing"
    author: "ThanhNguyxn"

  - id: "nplus-ipv6-005"
    difficulty: "easy"
    tags: ["IPv6", "addressing", "link-local"]
    question: "An engineer sees an interface with the address fe80::1a2b:3c4d:5e6f:7a8b/64. What type of IPv6 address is this?"
    choices:
      - "A. Link-local"
      - "B. Unique local"
      - "C. Global unicast"
      - "D. Multicast"
    answerIndex: 0
    explanation: "Addresses in the fe80::/10 range are link-local and are used for local segment communication like neighbor discovery. Global unicast addresses typically begin with 2000::/3 and are routable on the Internet. Multicast uses ff00::/8, so option D is incorrect."
    refs:
      - "https://www.rfc-editor.org/rfc/rfc8200"
    author: "ThanhNguyxn"

  - id: "nplus-switch-006"
    difficulty: "easy"
    tags: ["switching", "MAC", "Ethernet"]
    question: "A Layer 2 switch receives a unicast frame destined for a MAC address that is not in its MAC address table. What will the switch do by default?"
    choices:
      - "A. Drop the frame silently"
      - "B. Flood the frame out all ports except the incoming port"
      - "C. Forward the frame only to the default gateway"
      - "D. Send an ICMP redirect to the sender"
    answerIndex: 1
    explanation: "For an unknown unicast, a switch floods the frame out all other ports in the VLAN to try to reach the destination. It learns the source MAC on the incoming port while doing so. ICMP redirects are a Layer 3 function and are not sent by a basic Layer 2 switch, making D wrong."
    refs:
      - "https://en.wikipedia.org/wiki/Ethernet_frame"
    author: "ThanhNguyxn"

  - id: "nplus-wifi-007"
    difficulty: "easy"
    tags: ["wireless", "802.11ax", "Wi-Fi 6"]
    question: "A conference center is upgrading Wi-Fi to handle many clients in a dense area. Which IEEE standard is associated with Wi-Fi 6 and improvements like OFDMA?"
    choices:
      - "A. 802.11n"
      - "B. 802.11ac"
      - "C. 802.11ax"
      - "D. 802.11ad"
    answerIndex: 2
    explanation: "Wi-Fi 6 maps to 802.11ax, which includes features like OFDMA to improve efficiency in high-density deployments. 802.11ac is Wi-Fi 5 and does not provide the same OFDMA approach. 802.11ad targets 60 GHz short-range scenarios, so it is not the typical choice for broad dense coverage."
    refs:
      - "https://en.wikipedia.org/wiki/IEEE_802.11ax"
    author: "ThanhNguyxn"

  - id: "nplus-snmp-008"
    difficulty: "easy"
    tags: ["monitoring", "SNMP", "operations"]
    question: "A monitoring system is configured to query interface counters every 5 minutes and also receive unsolicited alerts when a link goes down. Which SNMP mechanisms are being used?"
    choices:
      - "A. Polling and traps"
      - "B. Trunking and tagging"
      - "C. NAT and PAT"
      - "D. Spanning tree and portfast"
    answerIndex: 0
    explanation: "Periodic counter collection is SNMP polling (GET requests), while unsolicited notifications are SNMP traps/informs. The other options describe switching or addressing features unrelated to SNMP. For example, NAT/PAT modifies IP addressing and does not provide device event alerts, so C is wrong."
    refs:
      - "https://en.wikipedia.org/wiki/Simple_Network_Management_Protocol"
    author: "ThanhNguyxn"

  - id: "nplus-syslog-009"
    difficulty: "easy"
    tags: ["logging", "syslog", "operations"]
    question: "A network team wants routers and switches to send timestamped event messages to a central collector for retention and correlation. Which protocol is MOST commonly used for this purpose?"
    choices:
      - "A. Syslog"
      - "B. SMB"
      - "C. LDAP"
      - "D. NTP"
    answerIndex: 0
    explanation: "Syslog is commonly used to export device event and diagnostic logs to a centralized server. NTP provides time synchronization, which helps log accuracy, but it does not transport log messages. LDAP and SMB serve directory and file-sharing functions, so they are not the right answer."
    refs:
      - "https://www.rfc-editor.org/rfc/rfc5424"
    author: "ThanhNguyxn"

  - id: "nplus-method-010"
    difficulty: "easy"
    tags: ["troubleshooting", "methodology", "process"]
    question: "A help desk technician receives a ticket: 'Internet is down.' According to a standard troubleshooting methodology, what should the technician do FIRST?"
    choices:
      - "A. Replace the user's network cable"
      - "B. Identify the problem and gather information"
      - "C. Escalate to the ISP immediately"
      - "D. Implement a permanent solution"
    answerIndex: 1
    explanation: "The first step is to identify the problem by gathering symptoms, scope, and recent changes before taking action. Jumping straight to replacing hardware may waste time and miss a broader outage. Implementing a permanent fix comes later, after testing a hypothesis and confirming the root cause."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-vlan-011"
    difficulty: "medium"
    tags: ["VLAN", "trunking", "implementation"]
    question: "A new switch is added between an access switch and the distribution layer. Users on VLAN 20 lose connectivity to resources beyond their switch, but VLAN 10 users remain fine. The uplink is configured as a trunk on the distribution switch. What is the MOST likely issue on the new switch?"
    choices:
      - "A. The uplink is configured as an access port in VLAN 10"
      - "B. The switch has an incorrect system time"
      - "C. The switch is using a different spanning-tree mode"
      - "D. The DHCP server is down"
    answerIndex: 0
    explanation: "If the uplink on the new switch is mistakenly configured as an access port, only a single VLAN (often the default or configured VLAN) will traverse that link, breaking VLAN 20 upstream access. Incorrect time does not selectively block a VLAN, making B wrong. A DHCP outage would prevent address assignment, but it would not explain one VLAN consistently failing across a trunked path when another works."
    refs:
      - "https://en.wikipedia.org/wiki/IEEE_802.1Q"
    author: "ThanhNguyxn"

  - id: "nplus-stp-012"
    difficulty: "medium"
    tags: ["STP", "switching", "loops"]
    question: "After a wiring change, intermittent outages occur and switch CPU spikes. Two access switches were accidentally connected with two parallel cables, creating a loop. Which feature is designed to prevent Layer 2 loops by blocking redundant paths?"
    choices:
      - "A. STP"
      - "B. NAT"
      - "C. DHCP snooping"
      - "D. GRE"
    answerIndex: 0
    explanation: "Spanning Tree Protocol (STP) prevents Layer 2 loops by logically blocking redundant links while keeping them available for failover. NAT operates at Layer 3/4 translating addresses and does not stop Ethernet loops, so B is wrong. DHCP snooping can improve DHCP security but will not address broadcast storms from switching loops."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/lan-switching/spanning-tree-protocol/5234-5.html"
    author: "ThanhNguyxn"

  - id: "nplus-dhcp-013"
    difficulty: "medium"
    tags: ["DHCP", "operations", "availability"]
    question: "A remote site has 120 wireless tablets but only a /25 DHCP scope. During busy hours, users report they 'can't join Wi-Fi' and devices show APIPA addresses. Which change is the BEST immediate mitigation without readdressing the entire site?"
    choices:
      - "A. Shorten the DHCP lease duration"
      - "B. Disable the SSID"
      - "C. Replace the wireless access points"
      - "D. Turn off NAT on the router"
    answerIndex: 0
    explanation: "Shortening the lease duration can free addresses faster, reducing the chance of scope exhaustion during peak times. It does not increase the total address pool, but it is a practical immediate mitigation. Replacing APs or changing NAT will not create more DHCP leases, so C and D are wrong."
    refs:
      - "https://en.wikipedia.org/wiki/Dynamic_Host_Configuration_Protocol"
    author: "ThanhNguyxn"

  - id: "nplus-nat-014"
    difficulty: "medium"
    tags: ["NAT", "PAT", "edge"]
    question: "A branch office has 200 internal hosts using RFC1918 addresses and a single public IPv4 address from the ISP. Users can browse the web successfully. Which technology is MOST likely allowing many internal connections to share one public IP?"
    choices:
      - "A. Port Address Translation (PAT)"
      - "B. Static routing"
      - "C. Link aggregation"
      - "D. Spanning tree root guard"
    answerIndex: 0
    explanation: "PAT (often called NAT overload) multiplexes multiple internal sessions onto a single public IP by tracking unique source port translations. Static routing affects path selection but does not rewrite addresses, so B is wrong. Link aggregation and root guard are Layer 2 features unrelated to sharing a public IP."
    refs:
      - "https://en.wikipedia.org/wiki/Network_address_translation"
    author: "ThanhNguyxn"

  - id: "nplus-aaa-015"
    difficulty: "medium"
    tags: ["AAA", "802.1X", "RADIUS"]
    question: "A company enables 802.1X on wired switch ports so employees must authenticate before gaining network access. Which back-end AAA protocol is MOST commonly used with 802.1X for network access control?"
    choices:
      - "A. RADIUS"
      - "B. FTP"
      - "C. TFTP"
      - "D. SIP"
    answerIndex: 0
    explanation: "802.1X commonly uses RADIUS between the authenticator (switch) and the authentication server for centralized AAA decisions. FTP and TFTP transfer files and do not provide authentication policies for port access, so B and C are wrong. SIP is used for VoIP signaling, not network access control."
    refs:
      - "https://www.rfc-editor.org/rfc/rfc2865"
      - "https://en.wikipedia.org/wiki/IEEE_802.1X"
    author: "ThanhNguyxn"

  - id: "nplus-vpn-016"
    difficulty: "medium"
    tags: ["VPN", "IPsec", "implementation"]
    question: "Two offices need an always-on encrypted tunnel between their edge firewalls to allow internal subnets to communicate securely over the Internet. What type of VPN best fits this requirement?"
    choices:
      - "A. Client-to-site VPN"
      - "B. Site-to-site VPN"
      - "C. Split-tunnel VPN"
      - "D. SSL inspection"
    answerIndex: 1
    explanation: "A site-to-site VPN is designed for always-on connectivity between two networks via their gateways, commonly using IPsec. Client-to-site VPN is for individual user devices connecting into a network, making A wrong. Split tunneling is a client VPN configuration choice, not the VPN type required here."
    refs:
      - "https://www.cloudflare.com/learning/network-layer/what-is-ipsec/"
    author: "ThanhNguyxn"

  - id: "nplus-idsips-017"
    difficulty: "medium"
    tags: ["security", "IDS", "IPS"]
    question: "A security team wants a device that can automatically block suspicious traffic patterns in-line, rather than only generating alerts. Which solution best meets this requirement?"
    choices:
      - "A. IDS"
      - "B. IPS"
      - "C. NetFlow collector"
      - "D. Packet sniffer in promiscuous mode"
    answerIndex: 1
    explanation: "An IPS is placed in-line and can actively drop or block malicious traffic based on rules or signatures. An IDS typically monitors and alerts but does not enforce blocks by default, so A is wrong. NetFlow and sniffers provide visibility, not automated in-line prevention."
    refs:
      - "https://en.wikipedia.org/wiki/Intrusion_detection_system"
    author: "ThanhNguyxn"

  - id: "nplus-wpa3-018"
    difficulty: "medium"
    tags: ["wireless", "security", "WPA3"]
    question: "A retailer wants to reduce the risk of offline password guessing attacks against a guest Wi-Fi network while still using a shared passphrase. Which wireless security option is the BEST choice?"
    choices:
      - "A. WEP"
      - "B. WPA2-Personal (PSK)"
      - "C. WPA3-Personal (SAE)"
      - "D. Open authentication"
    answerIndex: 2
    explanation: "WPA3-Personal uses SAE, which improves resistance to offline dictionary attacks compared to WPA2-PSK. WEP is cryptographically broken and should not be used, making A clearly wrong. Open authentication provides no encryption at all, so it does not meet the requirement."
    refs:
      - "https://en.wikipedia.org/wiki/Wi-Fi_Protected_Access"
    author: "ThanhNguyxn"

  - id: "nplus-routing-019"
    difficulty: "medium"
    tags: ["routing", "implementation", "static"]
    question: "A small branch office has one WAN link to headquarters and no redundant paths. The network engineer wants simple, predictable routing with minimal overhead. Which routing approach is MOST appropriate?"
    choices:
      - "A. Static routes"
      - "B. BGP"
      - "C. OSPF with multiple areas"
      - "D. EIGRP with route summarization"
    answerIndex: 0
    explanation: "With a single exit path, static routes are simple, stable, and add virtually no protocol overhead. BGP and multi-area OSPF add complexity that is unnecessary for a single-path branch, so B and C are wrong. Dynamic protocols can be valuable, but the scenario specifically prioritizes minimal overhead and predictability."
    refs:
      - "https://en.wikipedia.org/wiki/Static_routing"
    author: "ThanhNguyxn"

  - id: "nplus-doc-020"
    difficulty: "medium"
    tags: ["operations", "documentation", "change-management"]
    question: "During an outage, the on-call engineer cannot quickly identify which switch port connects to a failed access point in a warehouse. Which documentation artifact would MOST directly reduce time to resolution in the future?"
    choices:
      - "A. A port-to-device mapping (rack/port documentation)"
      - "B. A list of default vendor passwords"
      - "C. A marketing network overview slide"
      - "D. A DNS cache on the engineer's laptop"
    answerIndex: 0
    explanation: "A port-to-device map (including patch panel and switch port details) lets responders locate the physical connection rapidly during incidents. Default passwords are a security risk and do not aid cabling identification, so B is wrong. High-level slides lack the needed port-level detail for hands-on troubleshooting."
    refs:
      - "https://www.cisco.com/c/en/us/support/docs/field-notices/639/fn63942.html"
    author: "ThanhNguyxn"

  - id: "nplus-subnet-021"
    difficulty: "hard"
    tags: ["subnetting", "IPv4", "planning"]
    question: "You are given 192.168.10.0/24 and must create subnets that support at least 50 hosts each. Which subnet and prefix provides the FIRST usable host range while meeting the requirement?"
    choices:
      - "A. 192.168.10.0/26 with usable range 192.168.10.1-192.168.10.62"
      - "B. 192.168.10.0/27 with usable range 192.168.10.1-192.168.10.30"
      - "C. 192.168.10.0/28 with usable range 192.168.10.1-192.168.10.14"
      - "D. 192.168.10.0/25 with usable range 192.168.10.1-192.168.10.126"
    answerIndex: 0
    explanation: "A /26 provides 64 total addresses and 62 usable hosts, which satisfies the 50-host requirement and yields the first usable range 192.168.10.1-192.168.10.62. A /27 only provides 30 usable hosts, so it fails the requirement and makes B wrong. While /25 would work, it wastes more addresses than necessary compared to /26 for this requirement."
    refs:
      - "https://en.wikipedia.org/wiki/Subnetwork"
    author: "ThanhNguyxn"

  - id: "nplus-icmpv6-022"
    difficulty: "hard"
    tags: ["IPv6", "ICMPv6", "SLAAC"]
    question: "After a firewall change, IPv6 clients on a LAN can still ping each other by link-local address but no longer receive a default gateway or global IPv6 address. The router interface is up. What traffic is MOST likely being blocked?"
    choices:
      - "A. Router Advertisement (ICMPv6 type 134)"
      - "B. DNS over HTTPS (TCP 443)"
      - "C. ARP broadcasts"
      - "D. DHCPv4 offers"
    answerIndex: 0
    explanation: "SLAAC relies on ICMPv6 Router Advertisements to provide prefix information and the default gateway; blocking RAs prevents hosts from configuring global addresses and routes. ARP is an IPv4 mechanism and is not used in IPv6, so C is wrong. DHCPv4 offers are unrelated to IPv6 addressing and would not explain the loss of IPv6 default gateway information."
    refs:
      - "https://www.rfc-editor.org/rfc/rfc4861"
      - "https://www.rfc-editor.org/rfc/rfc8200"
    author: "ThanhNguyxn"

  - id: "nplus-pmtud-023"
    difficulty: "hard"
    tags: ["TCP", "MTU", "troubleshooting"]
    question: "Users can access most websites, but file uploads to a specific SaaS application consistently fail at around 1,400 bytes when on a VPN. A packet capture shows repeated retransmissions and no progress after TCP SYN/SYN-ACK completes. Which change is MOST likely to resolve this issue?"
    choices:
      - "A. Allow ICMP 'Packet Too Big' messages for Path MTU Discovery"
      - "B. Disable DNS recursion on the internal DNS server"
      - "C. Set the switch ports to half-duplex"
      - "D. Enable STP PortFast on all trunk ports"
    answerIndex: 0
    explanation: "This behavior is consistent with an MTU/PMTUD black-hole where packets larger than the path MTU are dropped and the sender never learns to lower packet size. Allowing ICMP 'Packet Too Big' enables Path MTU Discovery so endpoints can adjust MSS/packet sizing. Half-duplex would likely worsen performance broadly and is not a correct fix, making C wrong."
    refs:
      - "https://www.rfc-editor.org/rfc/rfc8201"
      - "https://www.rfc-editor.org/rfc/rfc1191"
    author: "ThanhNguyxn"

  - id: "nplus-vlansec-024"
    difficulty: "hard"
    tags: ["security", "VLAN", "switch-hardening"]
    question: "A penetration test report warns of potential VLAN hopping via switchport auto-trunking and double-tagging. Which switch configuration is the BEST mitigation on user-facing ports?"
    choices:
      - "A. Force access mode and disable trunk negotiation on edge ports"
      - "B. Enable dynamic routing on all access switches"
      - "C. Increase the DHCP lease time"
      - "D. Disable STP on all VLANs"
    answerIndex: 0
    explanation: "Setting user ports to access mode and disabling trunk negotiation (e.g., disabling DTP) prevents an attacker from forming an unintended trunk and reduces VLAN hopping risk. Dynamic routing does not affect Layer 2 trunk negotiation, so B is wrong. Disabling STP increases the risk of Layer 2 loops and outages, making D both unsafe and unrelated to the core mitigation."
    refs:
      - "https://en.wikipedia.org/wiki/VLAN_hopping"
      - "https://en.wikipedia.org/wiki/IEEE_802.1Q"
    author: "ThanhNguyxn"

  - id: "nplus-dot1x-025"
    difficulty: "hard"
    tags: ["802.1X", "certificates", "NTP"]
    question: "After enabling EAP-TLS for wired 802.1X, several laptops fail to authenticate. The RADIUS logs show 'certificate not yet valid' for the client certificate. What is the MOST likely root cause?"
    choices:
      - "A. The laptop system clocks are incorrect"
      - "B. The switch uplinks are set to the wrong native VLAN"
      - "C. The DHCP server is not authoritative"
      - "D. The firewall is blocking DNS"
    answerIndex: 0
    explanation: "EAP-TLS relies on certificate validity periods, so an incorrect client clock can make a valid certificate appear 'not yet valid' or expired. A native VLAN mismatch affects VLAN tagging on trunks, not certificate timestamps, so B is wrong. DNS issues could affect name resolution, but the explicit error in the RADIUS log points to time/certificate validity rather than DNS."
    refs:
      - "https://en.wikipedia.org/wiki/IEEE_802.1X"
      - "https://www.rfc-editor.org/rfc/rfc5280"
    author: "ThanhNguyxn"

  - id: "nplus-qos-026"
    difficulty: "hard"
    tags: ["QoS", "DSCP", "voice"]
    question: "A hospital experiences choppy VoIP calls only during large file transfers. The WAN link is congested. Which change BEST prioritizes voice traffic end-to-end on an IP network?"
    choices:
      - "A. Mark and queue voice with DSCP EF and enforce QoS policies at the WAN edge"
      - "B. Lower the STP priority on the access switches"
      - "C. Disable WPA3 on the wireless network"
      - "D. Convert all static routes to dynamic routes"
    answerIndex: 0
    explanation: "Voice quality during congestion improves when voice packets are marked (commonly DSCP EF) and placed into priority queues on congested interfaces like the WAN edge. STP priority affects Layer 2 path selection and does not solve WAN queuing problems, so B is wrong. Changing routing protocols does not directly provide traffic prioritization under congestion, making D incorrect."
    refs:
      - "https://en.wikipedia.org/wiki/Differentiated_services"
    author: "ThanhNguyxn"

  - id: "nplus-dns-027"
    difficulty: "hard"
    tags: ["DNS", "operations", "split-horizon"]
    question: "An internal web app should resolve to 10.20.30.40 for employees, but internal users are instead being sent to the public IP of the app and hitting a WAF login page. External users are fine. What is the MOST likely fix?"
    choices:
      - "A. Create or correct an internal DNS zone/record so internal clients resolve the private IP"
      - "B. Disable NAT on the perimeter firewall"
      - "C. Change the app to use UDP instead of TCP"
      - "D. Enable STP BPDU guard on trunk links"
    answerIndex: 0
    explanation: "This is a classic split-horizon DNS issue: internal clients should resolve a private address while external clients resolve the public address. Fixing the internal DNS zone/record ensures internal name resolution returns 10.20.30.40. Disabling NAT would break Internet connectivity and is unrelated to internal name resolution, so B is wrong."
    refs:
      - "https://www.cloudflare.com/learning/dns/dns-records/"
    author: "ThanhNguyxn"

  - id: "nplus-capture-028"
    difficulty: "hard"
    tags: ["tcpdump", "firewall", "troubleshooting"]
    question: "A developer reports that an API call to a partner endpoint resets immediately. A packet capture on the client shows SYN, SYN-ACK, ACK, then an immediate RST from an internal firewall IP. What is the MOST likely explanation?"
    choices:
      - "A. The firewall is actively terminating the session due to policy or inspection"
      - "B. The DNS server returned an NXDOMAIN response"
      - "C. The switch is flooding unknown unicasts"
      - "D. The client has an incorrect subnet mask"
    answerIndex: 0
    explanation: "A TCP RST generated by a firewall address strongly suggests the firewall is enforcing a rule or inspection action that resets the connection after it is established. DNS NXDOMAIN would prevent reaching the partner IP in the first place and would not produce a TCP RST from the firewall, so B is wrong. An incorrect subnet mask would typically cause broader connectivity failures rather than a consistent, policy-like reset after the handshake."
    refs:
      - "https://www.rfc-editor.org/rfc/rfc793"
      - "https://www.cisco.com/c/en/us/support/docs/security/asa-5500-x-series-next-generation-firewalls/200556-TCP-Reset-Issues.html"
    author: "ThanhNguyxn"

  - id: "nplus-cable-029"
    difficulty: "hard"
    tags: ["cabling", "testing", "NEXT"]
    question: "A new Cat6 run passes a basic continuity test but users report frequent CRC errors and low throughput. A cable certifier reports high NEXT (near-end crosstalk). What is the MOST likely cause?"
    choices:
      - "A. Excessive untwisting of pairs at the termination point"
      - "B. The router is missing a default route"
      - "C. The DHCP scope is too small"
      - "D. The access point is using the wrong SSID"
    answerIndex: 0
    explanation: "High NEXT is commonly caused by poor termination practices, such as untwisting too much of the twisted pairs, which increases crosstalk. Routing or DHCP issues would not create physical-layer crosstalk measurements, so B and C are wrong. The SSID selection affects wireless connectivity, not CRC errors on a wired Cat6 link."
    refs:
      - "https://en.wikipedia.org/wiki/Near-end_crosstalk"
    author: "ThanhNguyxn"

  - id: "nplus-dr-030"
    difficulty: "hard"
    tags: ["disaster-recovery", "RPO", "RTO"]
    question: "A business impact analysis states the company can tolerate at most 15 minutes of data loss for its order database. Which metric does this requirement describe?"
    choices:
      - "A. RTO"
      - "B. RPO"
      - "C. MTBF"
      - "D. MTTR"
    answerIndex: 1
    explanation: "The maximum acceptable data loss window is the Recovery Point Objective (RPO), which defines how far back in time data must be recovered. RTO describes how quickly service must be restored, not how much data can be lost, so A is wrong. MTBF and MTTR are reliability/repair metrics and do not specify data loss tolerance."
    refs:
      - "https://www.cloudflare.com/learning/security/glossary/rto-rpo/"
    author: "ThanhNguyxn"

  - id: "nplus-expand-001"
    difficulty: "easy"
    tags: ["networking-concepts", "osi-model"]
    question: "Which OSI layer is responsible for logical addressing and routing packets between networks?"
    choices:
      - "A. Layer 3 — Network"
      - "B. Layer 2 — Data Link"
      - "C. Layer 4 — Transport"
      - "D. Layer 1 — Physical"
    answerIndex: 0
    explanation: "Layer 3 (Network) handles logical addressing (IP addresses) and routing decisions. Layer 2 handles MAC addresses and frame switching. Layer 4 handles transport protocols. Layer 1 handles physical signaling."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-002"
    difficulty: "easy"
    tags: ["networking-concepts", "ipv4"]
    question: "Which IPv4 address class provides a default subnet mask of 255.255.0.0?"
    choices:
      - "A. Class B"
      - "B. Class A"
      - "C. Class C"
      - "D. Class D"
    answerIndex: 0
    explanation: "Class B addresses (128.0.0.0 – 191.255.255.255) have a default mask of 255.255.0.0 (/16). Class A uses 255.0.0.0 (/8). Class C uses 255.255.255.0 (/24). Class D is multicast and has no subnet mask."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc791"
    author: "ThanhNguyxn"

  - id: "nplus-expand-003"
    difficulty: "easy"
    tags: ["networking-concepts", "ports"]
    question: "Which well-known port is used by HTTPS?"
    choices:
      - "A. 443"
      - "B. 80"
      - "C. 22"
      - "D. 3389"
    answerIndex: 0
    explanation: "HTTPS uses TCP port 443 for encrypted web traffic. Port 80 is HTTP (unencrypted). Port 22 is SSH. Port 3389 is RDP (Remote Desktop Protocol)."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc2818"
    author: "ThanhNguyxn"

  - id: "nplus-expand-004"
    difficulty: "easy"
    tags: ["networking-concepts", "dhcp"]
    question: "What is the correct order of the DHCP lease process (DORA)?"
    choices:
      - "A. Discover, Offer, Request, Acknowledge"
      - "B. Discover, Open, Request, Accept"
      - "C. Demand, Offer, Reply, Acknowledge"
      - "D. Detect, Open, Request, Assign"
    answerIndex: 0
    explanation: "The DHCP DORA process consists of Discover (client broadcasts), Offer (server responds), Request (client selects), and Acknowledge (server confirms). This four-step handshake assigns IP configuration to clients dynamically."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc2131"
    author: "ThanhNguyxn"

  - id: "nplus-expand-005"
    difficulty: "easy"
    tags: ["networking-concepts", "topology"]
    question: "Which network topology connects all devices to a single central cable or backbone?"
    choices:
      - "A. Bus"
      - "B. Star"
      - "C. Ring"
      - "D. Mesh"
    answerIndex: 0
    explanation: "A bus topology uses a single shared backbone cable where all devices tap into the same medium. Star connects all devices to a central switch/hub. Ring passes data in a circular path. Mesh has point-to-point links between every pair."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-006"
    difficulty: "easy"
    tags: ["networking-concepts", "wireless"]
    question: "Which wireless frequency band provides greater range but is more susceptible to interference from household devices like microwaves?"
    choices:
      - "A. 2.4 GHz"
      - "B. 5 GHz"
      - "C. 6 GHz"
      - "D. 60 GHz"
    answerIndex: 0
    explanation: "The 2.4 GHz band offers greater range due to lower frequency but has only 3 non-overlapping channels and shares the ISM band with microwaves, Bluetooth, and cordless phones. The 5 GHz band has more channels and less interference but shorter range."
    refs:
      - "https://www.ieee802.org/11/"
    author: "ThanhNguyxn"

  - id: "nplus-expand-007"
    difficulty: "easy"
    tags: ["networking-concepts", "protocols"]
    question: "Which protocol is used to send email from a client to a mail server?"
    choices:
      - "A. SMTP"
      - "B. POP3"
      - "C. IMAP"
      - "D. FTP"
    answerIndex: 0
    explanation: "SMTP (Simple Mail Transfer Protocol, port 25/587) sends email from client to server or between servers. POP3 (port 110) and IMAP (port 143) are used to retrieve email from a server. FTP is for file transfers."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc5321"
    author: "ThanhNguyxn"

  - id: "nplus-expand-008"
    difficulty: "easy"
    tags: ["networking-concepts", "vlans"]
    question: "What is the primary purpose of creating VLANs on a switch?"
    choices:
      - "A. To segment broadcast domains without requiring separate physical switches"
      - "B. To increase the speed of all ports"
      - "C. To encrypt traffic between devices"
      - "D. To provide wireless access"
    answerIndex: 0
    explanation: "VLANs logically segment a switch into separate broadcast domains, improving security and reducing broadcast traffic. They don't increase port speed, encrypt traffic, or provide wireless access."
    refs:
      - "https://www.ieee802.org/1/pages/802.1Q.html"
    author: "ThanhNguyxn"

  - id: "nplus-expand-009"
    difficulty: "easy"
    tags: ["networking-concepts", "nat"]
    question: "What does NAT (Network Address Translation) allow a network to do?"
    choices:
      - "A. Map private IP addresses to public IP addresses for internet access"
      - "B. Encrypt all outbound traffic"
      - "C. Assign IP addresses automatically to hosts"
      - "D. Route traffic between VLANs"
    answerIndex: 0
    explanation: "NAT translates private (RFC 1918) addresses to public addresses, allowing multiple internal hosts to share limited public IPs. Encryption is handled by VPN/TLS. DHCP assigns addresses. Inter-VLAN routing requires a Layer 3 device."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc3022"
    author: "ThanhNguyxn"

  - id: "nplus-expand-010"
    difficulty: "easy"
    tags: ["networking-concepts", "dns"]
    question: "Which DNS record type maps a hostname to an IPv4 address?"
    choices:
      - "A. A record"
      - "B. AAAA record"
      - "C. MX record"
      - "D. CNAME record"
    answerIndex: 0
    explanation: "An A record maps a hostname to an IPv4 address. AAAA maps to IPv6. MX specifies mail exchange servers. CNAME creates an alias from one hostname to another."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc1035"
    author: "ThanhNguyxn"

  - id: "nplus-expand-011"
    difficulty: "easy"
    tags: ["networking-concepts", "subnetting"]
    question: "A network uses the address 10.0.0.0 with a subnet mask of 255.255.255.192 (/26). How many usable host addresses are in each subnet?"
    choices:
      - "A. 62"
      - "B. 64"
      - "C. 30"
      - "D. 126"
    answerIndex: 0
    explanation: "A /26 has 6 host bits, giving 2^6 = 64 total addresses per subnet. Subtracting network and broadcast addresses yields 62 usable hosts. A /27 gives 30 and /25 gives 126."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc1878"
    author: "ThanhNguyxn"

  - id: "nplus-expand-012"
    difficulty: "easy"
    tags: ["networking-concepts", "ipv6"]
    question: "How long is an IPv6 address in bits?"
    choices:
      - "A. 128 bits"
      - "B. 64 bits"
      - "C. 32 bits"
      - "D. 256 bits"
    answerIndex: 0
    explanation: "IPv6 addresses are 128 bits long, represented as 8 groups of 4 hexadecimal digits. IPv4 addresses are 32 bits. The 128-bit space provides approximately 3.4 × 10^38 unique addresses."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc4291"
    author: "ThanhNguyxn"

  - id: "nplus-expand-013"
    difficulty: "easy"
    tags: ["infrastructure", "switches"]
    question: "What type of device operates at Layer 2 and uses MAC address tables to forward frames?"
    choices:
      - "A. Switch"
      - "B. Router"
      - "C. Firewall"
      - "D. Access point"
    answerIndex: 0
    explanation: "A switch operates at Layer 2 and builds a MAC address table to forward frames to the correct port. Routers operate at Layer 3. Firewalls operate at Layers 3-7. Access points bridge wireless to wired at Layer 2 but don't maintain MAC tables the same way."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-014"
    difficulty: "easy"
    tags: ["infrastructure", "cabling"]
    question: "What is the maximum cable length for a single Cat5e/Cat6 copper Ethernet run?"
    choices:
      - "A. 100 meters (328 feet)"
      - "B. 50 meters (164 feet)"
      - "C. 200 meters (656 feet)"
      - "D. 55 meters (180 feet)"
    answerIndex: 0
    explanation: "The TIA/EIA-568 standard specifies a maximum of 100 meters for a horizontal copper Ethernet run (90m permanent link + 10m patch cables). Beyond this distance, signal attenuation causes errors."
    refs:
      - "https://www.tiaonline.org/"
    author: "ThanhNguyxn"

  - id: "nplus-expand-015"
    difficulty: "easy"
    tags: ["infrastructure", "fiber"]
    question: "Which type of fiber optic cable uses a larger core (typically 50 or 62.5 micrometers) and supports multiple light paths?"
    choices:
      - "A. Multimode fiber (MMF)"
      - "B. Single-mode fiber (SMF)"
      - "C. Coaxial cable"
      - "D. Shielded twisted pair"
    answerIndex: 0
    explanation: "Multimode fiber has a larger core (50 or 62.5 µm) that allows multiple light paths (modes). It's used for short distances (up to ~550m for 10GbE). Single-mode fiber has a 9 µm core and supports much longer distances using a single light path."
    refs:
      - "https://www.thefoa.org/tech/ref/basic/fiber.html"
    author: "ThanhNguyxn"

  - id: "nplus-expand-016"
    difficulty: "medium"
    tags: ["infrastructure", "routing"]
    question: "A company has two WAN links — a primary 100 Mbps fiber and a backup 10 Mbps DSL. The admin wants the DSL link to be used only when the fiber link fails. Which routing concept achieves this?"
    choices:
      - "A. Floating static route with a higher administrative distance on the DSL path"
      - "B. Equal-cost multipath routing"
      - "C. Policy-based routing to prefer DSL"
      - "D. VLAN trunking between the two links"
    answerIndex: 0
    explanation: "A floating static route has a higher administrative distance than the primary route. It stays in the routing table but is only used when the primary route disappears. ECMP would use both links simultaneously. VLAN trunking is unrelated to WAN failover."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-017"
    difficulty: "medium"
    tags: ["infrastructure", "wireless", "security"]
    question: "An enterprise deploys WPA2-Enterprise for wireless security. Which authentication framework does this use?"
    choices:
      - "A. 802.1X with EAP and a RADIUS server"
      - "B. Pre-shared key (PSK) entered on each client"
      - "C. MAC address filtering on the access point"
      - "D. WEP with a shared secret"
    answerIndex: 0
    explanation: "WPA2-Enterprise uses 802.1X with EAP (Extensible Authentication Protocol) and a RADIUS server for centralized authentication. WPA2-Personal uses PSK. MAC filtering and WEP are outdated and insecure methods."
    refs:
      - "https://www.wi-fi.org/discover-wi-fi/security"
    author: "ThanhNguyxn"

  - id: "nplus-expand-018"
    difficulty: "medium"
    tags: ["infrastructure", "poe"]
    question: "Which IEEE standard defines PoE+ that can deliver up to 30W per port?"
    choices:
      - "A. 802.3at"
      - "B. 802.3af"
      - "C. 802.3bt"
      - "D. 802.3az"
    answerIndex: 0
    explanation: "802.3at (PoE+) delivers up to 30W per port, sufficient for devices like PTZ cameras and dual-radio APs. 802.3af (original PoE) delivers 15.4W. 802.3bt (PoE++) delivers up to 90W. 802.3az is Energy Efficient Ethernet."
    refs:
      - "https://www.ieee802.org/3/"
    author: "ThanhNguyxn"

  - id: "nplus-expand-019"
    difficulty: "medium"
    tags: ["infrastructure", "load-balancer"]
    question: "A web application receives traffic through a load balancer configured with round-robin scheduling. What does this mean?"
    choices:
      - "A. Each new request is sent to the next server in sequential order"
      - "B. All requests go to the server with the fewest active connections"
      - "C. Requests are directed based on the client's geographic location"
      - "D. The load balancer randomly selects a server for each request"
    answerIndex: 0
    explanation: "Round-robin distributes requests sequentially across available servers in rotation. Least-connections sends to the server with fewest active sessions. Geographic distribution is content-based routing. Random selection is a different algorithm."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-020"
    difficulty: "medium"
    tags: ["infrastructure", "vpn"]
    question: "Which VPN type creates a secure tunnel between two sites (e.g., branch offices) and encrypts all traffic between the site gateways?"
    choices:
      - "A. Site-to-site VPN"
      - "B. Remote access VPN"
      - "C. SSL VPN portal"
      - "D. Split tunnel VPN"
    answerIndex: 0
    explanation: "A site-to-site VPN establishes a permanent encrypted tunnel between two network gateways, encrypting all inter-site traffic. Remote access VPN connects individual users. SSL VPN portal provides browser-based access. Split tunnel routes some traffic outside the VPN."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc6071"
    author: "ThanhNguyxn"

  - id: "nplus-expand-021"
    difficulty: "medium"
    tags: ["infrastructure", "dns", "hierarchy"]
    question: "In the DNS hierarchy, which server type is queried first by a recursive DNS resolver when it doesn't have a cached answer?"
    choices:
      - "A. Root name server"
      - "B. TLD (Top-Level Domain) name server"
      - "C. Authoritative name server"
      - "D. The client's local hosts file"
    answerIndex: 0
    explanation: "A recursive resolver first queries a root name server, which directs it to the appropriate TLD server, which then directs it to the authoritative server for the specific domain. The hosts file is checked by the client OS before DNS is queried."
    refs:
      - "https://www.iana.org/domains/root/servers"
    author: "ThanhNguyxn"

  - id: "nplus-expand-022"
    difficulty: "medium"
    tags: ["operations", "monitoring", "snmp"]
    question: "An admin sets up SNMP monitoring and wants the network device to proactively send alerts when thresholds are exceeded. Which SNMP message type enables this?"
    choices:
      - "A. Trap"
      - "B. Get"
      - "C. Set"
      - "D. Walk"
    answerIndex: 0
    explanation: "SNMP traps are unsolicited notifications sent from agents to the NMS when events or thresholds are triggered. Get retrieves a specific OID value. Set modifies a value. Walk iterates through a MIB tree."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc3411"
    author: "ThanhNguyxn"

  - id: "nplus-expand-023"
    difficulty: "medium"
    tags: ["operations", "documentation"]
    question: "A technician is troubleshooting a connectivity issue and needs to verify the physical cable path from patch panel to switch. Which documentation should they consult?"
    choices:
      - "A. Network wiring diagram and cable management records"
      - "B. The firewall rule set"
      - "C. The DNS zone file"
      - "D. The DHCP scope options"
    answerIndex: 0
    explanation: "Network wiring diagrams show physical cable paths, patch panel assignments, and switch port mappings. Firewall rules control traffic flow. DNS zone files contain name records. DHCP scope options define address assignments."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-024"
    difficulty: "medium"
    tags: ["operations", "change-management"]
    question: "Before implementing a major switch firmware upgrade across the enterprise, what should be completed according to change management best practices?"
    choices:
      - "A. Submit a change request with a rollback plan and schedule a maintenance window"
      - "B. Immediately deploy to all switches during business hours"
      - "C. Test only on the core switches first"
      - "D. Update the firmware and inform users afterward"
    answerIndex: 0
    explanation: "Change management requires a formal change request, impact analysis, rollback plan, and a scheduled maintenance window to minimize disruption. Testing should occur in a lab or on non-critical devices first, not directly on core infrastructure."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-025"
    difficulty: "medium"
    tags: ["operations", "backup"]
    question: "An organization performs a full backup every Sunday and incremental backups Monday through Saturday. On Wednesday, the server crashes. Which backups are needed to restore?"
    choices:
      - "A. Sunday's full backup plus Monday's, Tuesday's, and Wednesday's incremental backups"
      - "B. Only Wednesday's incremental backup"
      - "C. Sunday's full backup only"
      - "D. All seven daily backups from the previous week"
    answerIndex: 0
    explanation: "Incremental backups capture only changes since the last backup (full or incremental). To restore, you need the last full backup (Sunday) plus all subsequent incrementals (Monday, Tuesday, Wednesday) applied in order."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-026"
    difficulty: "medium"
    tags: ["operations", "syslog"]
    question: "A syslog server receives a message with severity level 3. What does this severity represent?"
    choices:
      - "A. Error — error conditions requiring attention"
      - "B. Warning — warning conditions"
      - "C. Critical — critical conditions"
      - "D. Emergency — system is unusable"
    answerIndex: 0
    explanation: "Syslog severity 3 is Error. The scale runs from 0 (Emergency) to 7 (Debug): 0=Emergency, 1=Alert, 2=Critical, 3=Error, 4=Warning, 5=Notice, 6=Informational, 7=Debug."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc5424"
    author: "ThanhNguyxn"

  - id: "nplus-expand-027"
    difficulty: "medium"
    tags: ["operations", "scanning"]
    question: "A security admin runs a port scan on a server and discovers TCP port 3306 is open. Which service is most likely running?"
    choices:
      - "A. MySQL database"
      - "B. Microsoft SQL Server"
      - "C. PostgreSQL"
      - "D. Apache web server"
    answerIndex: 0
    explanation: "MySQL defaults to TCP port 3306. Microsoft SQL Server uses 1433. PostgreSQL uses 5432. Apache uses 80/443. Identifying open ports helps assess the attack surface of a system."
    refs:
      - "https://www.iana.org/assignments/service-names-port-numbers"
    author: "ThanhNguyxn"

  - id: "nplus-expand-028"
    difficulty: "medium"
    tags: ["operations", "performance"]
    question: "Users complain about slow file transfers to a NAS. The admin checks the switch port and sees high utilization at 95%. What is the most effective short-term solution?"
    choices:
      - "A. Configure link aggregation (LACP) to increase available bandwidth"
      - "B. Reboot the NAS"
      - "C. Change the DNS server"
      - "D. Replace the switch with a hub"
    answerIndex: 0
    explanation: "Link aggregation (LACP/EtherChannel) bundles multiple physical links into one logical link, increasing available bandwidth. Rebooting doesn't fix capacity limits. DNS is unrelated to file transfer speed. A hub would reduce performance by sharing bandwidth."
    refs:
      - "https://www.ieee802.org/3/ad/"
    author: "ThanhNguyxn"

  - id: "nplus-expand-029"
    difficulty: "medium"
    tags: ["operations", "ipam"]
    question: "A network team notices IP address conflicts appearing on the network. Which tool or practice would best prevent this?"
    choices:
      - "A. IP Address Management (IPAM) system with centralized DHCP"
      - "B. Assigning all addresses statically"
      - "C. Disabling ARP on all hosts"
      - "D. Using a single /8 subnet for the entire network"
    answerIndex: 0
    explanation: "An IPAM system tracks all address assignments and coordinates with DHCP to prevent duplicates. All-static is error-prone at scale. Disabling ARP breaks communication. A huge subnet doesn't prevent conflicts — it makes them harder to detect."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc6632"
    author: "ThanhNguyxn"

  - id: "nplus-expand-030"
    difficulty: "medium"
    tags: ["security", "firewall"]
    question: "Which type of firewall inspects traffic at the application layer and can make decisions based on the content of HTTP headers, URIs, and payloads?"
    choices:
      - "A. Next-generation firewall (NGFW) / Layer 7 firewall"
      - "B. Stateless packet filter"
      - "C. Circuit-level gateway"
      - "D. NAT firewall"
    answerIndex: 0
    explanation: "NGFWs / Layer 7 firewalls perform deep packet inspection including application-layer content. Stateless packet filters only check headers (L3/L4). Circuit-level gateways monitor TCP handshakes. NAT firewalls translate addresses but don't inspect application content."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-031"
    difficulty: "medium"
    tags: ["security", "ids-ips"]
    question: "What is the key difference between an IDS and an IPS?"
    choices:
      - "A. An IDS detects and alerts on threats; an IPS actively blocks them"
      - "B. An IDS blocks traffic; an IPS only logs events"
      - "C. An IDS operates at Layer 2; an IPS operates at Layer 7"
      - "D. An IDS requires a TAP; an IPS requires a hub"
    answerIndex: 0
    explanation: "An Intrusion Detection System (IDS) passively monitors traffic and generates alerts. An Intrusion Prevention System (IPS) sits inline and can actively block or drop malicious traffic. Both can use signatures or anomaly detection."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-032"
    difficulty: "medium"
    tags: ["security", "802.1x"]
    question: "In an 802.1X network access control deployment, which three roles are involved?"
    choices:
      - "A. Supplicant, authenticator, authentication server"
      - "B. Client, switch, DHCP server"
      - "C. Host, gateway, DNS server"
      - "D. User, firewall, proxy server"
    answerIndex: 0
    explanation: "802.1X defines three roles: the supplicant (client requesting access), the authenticator (switch/AP controlling the port), and the authentication server (typically RADIUS). DHCP and DNS play no role in 802.1X authentication."
    refs:
      - "https://www.ieee802.org/1/pages/802.1x-2020.html"
    author: "ThanhNguyxn"

  - id: "nplus-expand-033"
    difficulty: "medium"
    tags: ["security", "vpn", "ipsec"]
    question: "Which two protocols make up the IPsec suite for VPN encryption and authentication?"
    choices:
      - "A. ESP (Encapsulating Security Payload) and AH (Authentication Header)"
      - "B. SSL and TLS"
      - "C. SSH and SCP"
      - "D. PPTP and L2TP"
    answerIndex: 0
    explanation: "IPsec uses ESP for encryption and integrity, and AH for authentication and integrity (without encryption). SSL/TLS are separate protocols. SSH/SCP are for remote administration. PPTP and L2TP are tunneling protocols that can work with IPsec."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc4301"
    author: "ThanhNguyxn"

  - id: "nplus-expand-034"
    difficulty: "medium"
    tags: ["security", "acl"]
    question: "An admin creates an ACL on a router to deny all traffic from 192.168.5.0/24 to the server at 10.0.0.50. Where should this ACL be applied for optimal performance?"
    choices:
      - "A. As close to the source as possible (inbound on the interface facing 192.168.5.0/24)"
      - "B. As close to the destination as possible"
      - "C. On the loopback interface"
      - "D. On all interfaces simultaneously"
    answerIndex: 0
    explanation: "Extended ACLs should be applied as close to the source as possible to prevent unwanted traffic from consuming bandwidth across the network. Standard ACLs are placed near the destination. Placing on all interfaces wastes processing."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-035"
    difficulty: "medium"
    tags: ["security", "social-engineering"]
    question: "An employee receives a phone call from someone claiming to be from IT support, asking for their password to 'fix an urgent issue.' What type of attack is this?"
    choices:
      - "A. Vishing (voice phishing)"
      - "B. Smishing (SMS phishing)"
      - "C. Tailgating"
      - "D. Evil twin"
    answerIndex: 0
    explanation: "Vishing is voice-based phishing where attackers impersonate trusted entities over the phone to extract sensitive information. Smishing uses SMS. Tailgating is physical access by following authorized personnel. An evil twin is a rogue wireless AP."
