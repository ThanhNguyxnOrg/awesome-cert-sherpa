      - "C. The DHCP relay agent"
      - "D. The switch port VLAN assignment"
    answerIndex: 0
    explanation: "When nslookup returns the correct IP but ping by name fails, the local hosts file may contain a stale or incorrect entry for that hostname. The OS checks the hosts file before DNS, so a conflicting entry overrides the DNS response."
    refs:
      - "https://www.comptia.org/certifications/network"
