      - "A. SYN flood attack"
      - "B. DNS amplification attack"
      - "C. ARP spoofing"
      - "D. VLAN hopping"
    answerIndex: 0
    explanation: "A SYN flood sends many TCP SYN packets with spoofed sources. The server allocates resources for half-open connections that never complete, exhausting its connection table. Mitigation includes SYN cookies, rate limiting, and firewall rules."
