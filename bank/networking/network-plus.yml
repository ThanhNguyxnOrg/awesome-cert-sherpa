      - "C. The DHCP lease expired at the branch"
      - "D. A VLAN mismatch on the branch switch"
    answerIndex: 0
    explanation: "When traceroute stops at a specific hop, that device likely has a routing problem — either a missing route for the destination or a routing loop. DNS doesn't affect traceroute (it uses IP). DHCP and VLAN issues would affect local connectivity, not a mid-path failure."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

