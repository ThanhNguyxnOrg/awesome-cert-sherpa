    answerIndex: 0
    explanation: "SD-WAN provides application-aware routing, dynamically steering traffic across MPLS, broadband, and LTE based on real-time performance metrics. It doesn't increase physical bandwidth, still requires encryption for non-MPLS links, and doesn't provide physical redundancy."
