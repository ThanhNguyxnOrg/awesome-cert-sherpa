    author: "ThanhNguyxn"

  - id: "nplus-expand-059"
    difficulty: "hard"
    tags: ["troubleshooting", "mtu"]
    question: "A user can browse websites but fails to download large files over a VPN tunnel. Small pings succeed but large pings (1400+ bytes with DF bit) fail. What is the most likely issue?"
    choices:
      - "A. MTU/MSS mismatch — the VPN overhead causes packets exceeding the path MTU to be dropped"
      - "B. The DNS server is returning incorrect addresses"
      - "C. The VPN license has expired"
      - "D. The user's MAC address is blocked"
    answerIndex: 0
    explanation: "VPN encapsulation adds overhead (typically 50-80 bytes for IPsec), reducing the effective MTU. If the Don't Fragment bit is set and a packet exceeds the path MTU, it's dropped. Adjusting TCP MSS clamping on the VPN gateway resolves this."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc1191"
    author: "ThanhNguyxn"

