  - id: "nplus-expand-039"
    difficulty: "hard"
    tags: ["troubleshooting", "wireless"]
    question: "Users in a large office report intermittent Wi-Fi disconnections. A site survey reveals excessive co-channel interference. What is the best remediation?"
    choices:
      - "A. Adjust AP channel assignments to minimize overlap and reduce AP transmit power"
      - "B. Increase all AP transmit power to maximum"
      - "C. Switch all APs to the same channel for consistency"
      - "D. Replace all APs with newer models"
    answerIndex: 0
    explanation: "Co-channel interference occurs when nearby APs use the same channel. The fix is to assign non-overlapping channels (1, 6, 11 for 2.4 GHz) and reduce power so AP coverage areas don't overlap excessively. Maximum power worsens interference. Same channel guarantees interference."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-040"
