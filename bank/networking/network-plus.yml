      - "C. It provides DNS resolution for external domains"
      - "D. It encrypts all internal LAN traffic"
    answerIndex: 0
    explanation: "A forward proxy acts on behalf of clients, forwarding their requests to the internet. It can cache content and filter URLs. A reverse proxy (load balancer) distributes traffic to backend servers. DNS and encryption are separate functions."
    refs:
