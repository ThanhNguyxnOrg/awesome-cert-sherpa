  - id: "nplus-expand-070"
    difficulty: "hard"
    tags: ["troubleshooting", "spanning-tree"]
    question: "After a network topology change, some switches show ports stuck in STP blocking state for an extended period. Users on those segments lose connectivity for 30-50 seconds. What is the recommended improvement?"
    choices:
      - "A. Migrate from legacy STP (802.1D) to RSTP (802.1w) for faster convergence"
      - "B. Disable STP entirely on all switches"
      - "C. Increase the STP hello timer to 10 seconds"
      - "D. Set all ports to PortFast mode"
    answerIndex: 0
    explanation: "Legacy STP (802.1D) can take 30-50 seconds to converge. RSTP (802.1w) converges in seconds by proactively negotiating port roles. Disabling STP risks loops. Increasing hello timers slows convergence. PortFast on non-edge ports creates loop risk."
    refs:
      - "https://www.ieee802.org/1/pages/802.1w.html"
    author: "ThanhNguyxn"