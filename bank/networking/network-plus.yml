      - "D. Disable DHCP for IoT devices"
    answerIndex: 0
    explanation: "Network segmentation via VLANs with ACLs isolates IoT devices into their own broadcast domain and controls what traffic can flow between segments. Static IPs and DHCP settings don't provide isolation. Crossover cables don't segment networks."
    refs:
      - "https://www.comptia.org/certifications/network"
