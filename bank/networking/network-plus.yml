      - "D. Switch from TCP to UDP for all applications"
    answerIndex: 0
    explanation: "High utilization causing latency/loss requires both traffic management (QoS to prioritize critical apps) and possibly a bandwidth upgrade. Disabling VLANs reduces segmentation. Rebooting is a band-aid. Switching to UDP would cause data loss in applications expecting reliability."
    refs:
      - "https://www.comptia.org/certifications/network"
