      - "D. DSCP 10 (AF11)"
    answerIndex: 0
    explanation: "DSCP 46 (Expedited Forwarding) is the standard marking for voice traffic, ensuring low latency, low jitter, and low loss. DSCP 0 is best effort (no priority). CS1 is scavenger class. AF11 is assured forwarding with low drop probability."
    refs:
      - "https://datatracker.ietf.org/doc/html/rfc2598"
    author: "ThanhNguyxn"

