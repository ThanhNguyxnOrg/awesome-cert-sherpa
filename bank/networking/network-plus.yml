      - "D. RADIUS separates authentication and authorization while TACACS+ combines them"
    answerIndex: 0
    explanation: "TACACS+ encrypts the entire packet payload providing better security, while RADIUS only encrypts the password field. RADIUS uses UDP (1812/1813); TACACS+ uses TCP (49). RADIUS is the open standard; TACACS+ is Cisco-developed. TACACS+ separates AAA functions; RADIUS combines authentication and authorization."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

  - id: "nplus-expand-055"
    difficulty: "hard"
