      - "D. On the same VLAN as the database servers"
    answerIndex: 0
    explanation: "A DMZ is a network segment that sits between the internet and internal network, protected by firewalls on both sides. Public-facing servers in the DMZ can be accessed from the internet while the internal network remains protected from direct exposure."
    refs:
      - "https://www.comptia.org/certifications/network"
    author: "ThanhNguyxn"

