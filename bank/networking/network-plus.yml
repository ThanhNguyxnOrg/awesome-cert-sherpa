      - "C. Loopback plug"
      - "D. Protocol analyzer"
    answerIndex: 0
    explanation: "A cable certifier tests against TIA/EIA standards including crosstalk (NEXT/FEXT), attenuation, return loss, and delay skew. A tone generator traces cable paths. A loopback plug tests interface functionality. A protocol analyzer captures packets, not cable performance."
