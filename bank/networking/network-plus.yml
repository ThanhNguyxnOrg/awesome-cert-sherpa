      - "C. Only the first device that booted retains connectivity"
      - "D. The switch port for both devices goes into err-disabled state"
    answerIndex: 0
    explanation: "IP address conflicts cause intermittent connectivity because ARP responses from both devices update neighbors' ARP caches alternately. Traffic is randomly sent to one or the other. Modern OSes often detect and warn about conflicts, but network behavior remains unpredictable."
    refs:
      - "https://www.comptia.org/certifications/network"
