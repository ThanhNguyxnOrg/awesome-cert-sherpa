      - "B. AES-256"
      - "C. ChaCha20"
      - "D. AES-128"
    answerIndex: 0
    explanation: "DES uses a 56-bit key and is vulnerable to brute-force attacks with modern hardware. AES-128, AES-256, and ChaCha20 are all considered secure. 3DES is also deprecated due to the Sweet32 attack. AES is the current standard."
    refs:
      - "https://www.nist.gov/publications/data-encryption-standard-des"
    author: "ThanhNguyxn"

