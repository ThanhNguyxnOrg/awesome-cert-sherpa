      - "C. Increase the MTU on all switches"
      - "D. Configure all ports as trunk ports"
    answerIndex: 0
    explanation: "Broadcast storms are caused by Layer 2 loops, and STP's primary purpose is to prevent loops by blocking redundant paths. Re-enabling STP on the new switch immediately breaks the loop. Trunk configurations and MTU are unrelated to loop prevention."
