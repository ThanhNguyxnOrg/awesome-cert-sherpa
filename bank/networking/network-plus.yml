      - "D. Implement the solution and verify functionality"
    answerIndex: 0
    explanation: "The CompTIA troubleshooting methodology starts with identifying the problem: gather information, question users, identify symptoms, and determine scope. Theorizing before gathering information leads to misdiagnosis."
